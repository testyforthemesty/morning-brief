  {n:"Nexus Housing",c:"Fukuoka",co:"Japan",y:1991,ar:"Rem Koolhaas",w:"The Nexus housing block in Fukuoka was part of a development that invited several international architects to design adjacent housing blocks, and OMA's contribution uses a typology of stacked L-shaped apartments in which each unit wraps around a private outdoor space. The building's section is a stack of interlocking L-shapes, each unit having a private terrace that is the roof of the unit below. The building explores a section type that the standard slab block cannot provide.",d:"The apartments are L-shaped in section, with the upper level of each unit extending over the terrace of the unit below, creating private outdoor spaces that are simultaneously roofed by the apartment above and open to the sky at one end.",lat:33.5904,lng:130.4017},
  {n:"Villa dall'Ava",c:"Paris",co:"France",y:1991,ar:"Rem Koolhaas",w:"The Villa dall'Ava in Saint-Cloud uses a rooftop swimming pool positioned to frame a view of the Eiffel Tower, making the pool an optical instrument rather than purely a recreational facility. The house is designed as a diagram of the programme with each decision exposed as a deliberate formal and conceptual choice.",d:"The rooftop swimming pool is precisely positioned so that swimmers floating on their back see the Eiffel Tower framed at the end of the pool as if through an architectural telescope.",lat:48.8566,lng:2.3522},
  {n:"Maison Bordeaux",c:"Bordeaux",co:"France",y:1998,ar:"Rem Koolhaas",w:"The Bordeaux House was designed for a client who used a wheelchair following a car accident, and the architectural response to his disability was radical: a hydraulic platform rises through the entire height of the house, so the client can access every level by moving through the building on the platform itself. The platform is the house's primary room, furnished with books and tools, and its movement relative to the three fixed floors creates a continuously changing spatial relationship between the occupant and the building. The house was designed as a machine for a specific life.",d:"The hydraulic platform that gives the wheelchair-using client access to all floors is large enough to serve as a room in itself, furnished with bookshelves and work surfaces that align with different storage systems on each floor as the platform rises or descends.",lat:44.8378,lng:-0.5792},
  {n:"Kunsthal Rotterdam",c:"Rotterdam",co:"Netherlands",y:1992,ar:"Rem Koolhaas",w:"The Kunsthal is a building with no permanent collection, designed entirely for temporary exhibitions. The complex programme — four galleries, an auditorium, a restaurant, all accessible simultaneously from different routes — is organised as a loop of ramps that connect the park level above with the road level below, with the exhibitions distributed along the circuit. The building's section is as important as its plan, the ramp system making every visit a spatial journey through the whole building rather than a sequential room-by-room procession.",d:"A public pedestrian ramp passes through the building at an angle, connecting the higher park level to the lower road level, so the city's movement through the building is part of its spatial organisation whether or not exhibitions are open.",lat:51.9244,lng:4.4777},
  {n:"Netherlands Embassy Berlin",c:"Berlin",co:"Germany",y:2003,ar:"Rem Koolhaas",w:"The Dutch Embassy in Berlin uses a cube perforated by a single looping trajectory that climbs from the entrance through a series of spaces — offices, a library, a meeting room, a roof terrace — before returning to the entrance. The trajectory creates an interconnection between all the different embassy functions that the conventional floor-by-floor organisation of an office building would prevent. The cube's exterior is punctured by the path only at specific moments, creating a legible diagram of the route from outside.",d:"A single continuous ramp-and-stair trajectory winds through the cube from ground to roof, connecting eight different programme elements in a single spatial sequence that makes the conventional office building's floor-by-floor separation impossible.",lat:52.52,lng:13.405},
  {n:"Yokohama International Port Terminal",c:"Yokohama",co:"Japan",y:2002,ar:"Foreign Office Architects",w:"The Yokohama terminal was built from a ground landscape that folds up to form a covered space and back down to the sea, with the structure derived from a folded plate geometry that makes the distinction between floor, wall, and roof irrelevant. The circulation ramps are the building, the structure is the ramps, and the public deck on the roof is the continuation of the ground plane. The building was the first major public building by Farshid Moussavi and Alejandro Zaera-Polo.",d:"The building has no conventional walls — the floor surface folds upward to form the roof, the structural elements follow the geometry of the fold, and the public space continues from the approach ramp through the terminal to the rooftop deck without interruption.",lat:35.4437,lng:139.638},
  {n:"Ravensbourne College",c:"London",co:"United Kingdom",y:2010,ar:"Foreign Office Architects",w:"The Ravensbourne College of Design building at the Greenwich Peninsula uses a ceramic tile facade patterned with circles of different sizes, the pattern derived from natural tiling systems that produce non-repeating arrangements. The tiles cover the entire building including the roof, treating the building as a single continuous surface rather than separate facade planes.",d:"The ceramic tile pattern is derived from Penrose tiling — a mathematical non-repeating pattern — so the building's surface has local regularity but never repeats exactly across its full extent.",lat:51.5074,lng:-0.1278},
  {n:"John Lewis Department Store",c:"Leicester",co:"United Kingdom",y:2008,ar:"Foreign Office Architects",w:"The John Lewis store uses a pixelated ceramic tile facade that creates a pattern of varying density across the building's surfaces, the pattern generated from a pixel-based design system. The tiles create an optical effect of depth and movement across the facade without any three-dimensional projection from the surface.",d:"The ceramic tile pattern is generated by a pixel-based algorithm that creates varying densities of colour across the facade, producing moiré patterns that appear to move as the observer's position changes.",lat:52.6369,lng:-1.1398},
  {n:"Carabanchel Social Housing",c:"Madrid",co:"Spain",y:2007,ar:"Foreign Office Architects",w:"The social housing block in the southern Madrid suburb of Carabanchel uses a bamboo screen that wraps the balconies of the entire building, the screen of thin bamboo rods providing shade and privacy while reading from the street as a continuous textured surface rather than a conventional facade of windows and balconies.",d:"The bamboo screens that wrap the building's balconies are hinged to open or close for privacy and shade, so the building's facade changes throughout the day as residents adjust their screens to different positions.",lat:40.4168,lng:-3.7038},
  {n:"Bodegas Ysios",c:"Laguardia",co:"Spain",y:2001,ar:"Santiago Calatrava",w:"The Ysios winery uses a corrugated aluminium roof that undulates along the building's length in a wave profile that references the mountains of the Sierra de Cantabria behind it. The roof profile is simultaneously aesthetic and functional — the undulations allow for the natural convection ventilation that the winery requires. The building is long and low in the vineyard landscape, its aluminium surface reflecting the sky.",d:"The aluminium roof undulates in a wave profile calibrated to create air movement through the building by convection, so the dramatic visual form also serves as the building's ventilation system.",lat:42.5594,lng:-2.5758},
  {n:"Stadelhofen Station",c:"Zurich",co:"Switzerland",y:1990,ar:"Santiago Calatrava",w:"The Stadelhofen station was cut into the hillside below the old town of Zurich, and Calatrava used the constraint of the excavated section to develop a structural system of cast iron tree-like columns that support the platform canopies while referencing the geological strata of the hillside face. The station is entirely below street level and the structure is both the engineering solution and the architectural expression.",d:"The platform canopies are supported by steel columns that branch into multiple arms like trees, their profiles derived from the structural requirement to span the platform width while clearing the train height.",lat:47.3769,lng:8.5417},
  {n:"BCE Place",c:"Toronto",co:"Canada",y:1992,ar:"Santiago Calatrava",w:"The BCE Place galleria in Toronto uses a series of steel tree structures whose branches interlock overhead to create a continuous canopy over the pedestrian street between two office towers. The structural trees are freestanding, their branches meeting at mid-span without touching the buildings on either side. The galleria connects two separate towers with a public interior street that is accessible throughout the day.",d:"The branching steel trees that form the galleria roof are entirely freestanding — their branches meet overhead without any connection to the flanking office towers, the canopy structure carrying itself through pure geometry.",lat:43.6532,lng:-79.3832},
  {n:"Kuwait Pavilion Expo",c:"Seville",co:"Spain",y:1992,ar:"Santiago Calatrava",w:"The Kuwait Pavilion for the Seville Expo uses a wooden roof structure that opens and closes like the leaves of a plant, the moving fins providing shade while creating a kinetic architectural display. The mechanism was one of the most complex moving structures built for a temporary pavilion.",d:"The wooden roof fins rotate on a central axis to open and close over the course of the day, providing calibrated shade while creating a building that literally moves in response to the sun.",lat:37.3891,lng:-5.9845},
  {n:"Montjuïc Communications Tower",c:"Barcelona",co:"Spain",y:1992,ar:"Santiago Calatrava",w:"The telecommunications tower on Montjuïc was designed as a marker for the 1992 Barcelona Olympics, its inclined mast and ring of structural arms giving it a profile that references a human figure holding a torch. The tower is a structural demonstration as much as a communication facility, the inclined mast supported by a system of cables and tension rings that make the engineering legible as architecture.",d:"The mast leans at an angle calculated to align with the sun's position over Barcelona at noon on the day of the summer solstice, making the tower a sundial at the Olympic scale.",lat:41.3851,lng:2.1734},
  {n:"Olympic Stadium Athens Roof",c:"Athens",co:"Greece",y:2004,ar:"Santiago Calatrava",w:"Calatrava added a roof structure to the existing 1982 Athens Olympic Stadium, using two giant arching steel tubes from which the roof canopy is suspended. The arches span 304 metres and are the longest in the world. The intervention was completed just months before the 2004 Olympics.",d:"The two steel arches span the entire width of the stadium without intermediate supports, their parabolic form calibrated so that the tension cables that hang the roof from them are all of equal length.",lat:37.9838,lng:23.7275},
  {n:"Tenerife Concert Hall",c:"Santa Cruz de Tenerife",co:"Spain",y:2003,ar:"Santiago Calatrava",w:"The Auditorio de Tenerife uses a single great concrete wing — a curved white shell that curls over the main auditorium — to create a building that is visible from the sea as a landmark on the Atlantic waterfront. The wing is purely expressive; the acoustically critical surfaces inside are independently designed. The building demonstrates both the possibility and the limitation of architectural spectacle at the expense of functional integration.",d:"The great curved wing that rises above the building has no acoustic function — it is purely an exterior form — while the interior auditorium surfaces are entirely independent structural and acoustic elements.",lat:28.4636,lng:-16.2518},
  {n:"Brock University Pond Inlet",c:"St. Catharines",co:"Canada",y:2016,ar:"Snohetta",w:"The Pond Inlet community library and visitor centre in the Canadian Arctic uses a timber construction system developed to withstand extreme cold while providing a warm and welcoming public space in a remote Inuit community. The building references the form of the traditional qarmaq shelter in its massing and uses local materials and community participation in its construction. The project was developed in close consultation with the Inuit community over several years.",d:"The building's form references the traditional Inuit qarmaq shelter in its rounded ends and low profile, adapting the vernacular shelter type to a permanent public building without direct imitation.",lat:43.1594,lng:-79.2469},
  {n:"Lascaux IV Cave Museum",c:"Montignac",co:"France",y:2016,ar:"Snohetta",w:"The museum for the Lascaux cave paintings is built into a hillside so that its roof continues the slope of the hill, the building present in the landscape only as a cut in the topography rather than as an added object. The interior contains a full-scale facsimile of the cave paintings, the most ambitious reproduction of prehistoric art ever made, requiring the same quality of spatial experience as the original. Snøhetta's building disappears so that the reproduction can take the place of the real.",d:"The museum roof continues the hill slope without any change of material or gradient, so the building is invisible from above and reveals itself only to those approaching from the valley below.",lat:45.0667,lng:1.1667},
  {n:"Ryerson Image Centre",c:"Toronto",co:"Canada",y:2012,ar:"Snohetta",w:"The photography centre at Ryerson University uses a facade of translucent glass panels printed with photographic imagery, making the building itself a display surface for the collection it houses. The imagery changes periodically, so the building's appearance is not fixed but reflects the ongoing programme of the institution.",d:"The translucent glass facade panels are printed with large-format photographic images that are legible from the street, making the building's exterior surface a changing exhibition of the photographic work within.",lat:43.6532,lng:-79.3832},
  {n:"King Abdulaziz Centre",c:"Dhahran",co:"Saudi Arabia",y:2016,ar:"Snohetta",w:"The King Abdulaziz Centre for World Culture in Dhahran uses a cluster of curved tubes that emerge from the earth as the building's primary form, the tubes arranged to suggest the movement of flowing sand across the desert landscape. The centre contains a museum, library, cinema, and archive designed to house Saudi cultural heritage.",d:"The building's tubular volumes emerge from the landscape at different angles, their intersections creating interior spaces of varying character as the tubes cross and separate.",lat:26.2794,lng:50.1177},
  {n:"Max IV Laboratory",c:"Lund",co:"Sweden",y:2016,ar:"Snohetta",w:"The Max IV synchrotron radiation laboratory uses a circular plan — the building follows the circumference of the particle accelerator ring below it — with the exterior wall designed as a wave of earth berms and low green landscape that reduces vibration from the surrounding roads. The building is primarily visible from above as a landscape pattern rather than from ground level as a building. The technical requirements of the synchrotron determined the architectural form completely.",d:"The earth berms surrounding the circular building are precisely shaped and angled to attenuate ground-borne vibrations from the surrounding traffic, making the landscape form an acoustic engineering instrument rather than a decorative gesture.",lat:55.7047,lng:13.191}
];
// ARCHITECTURE DIGEST
// Selects today's building from the array, then fetches real images from
// Wikipedia's REST API (free, no key, CORS-friendly from browsers).
// Falls back gracefully if Wikipedia has no image for that article.

function renderArch(data, imgs) {
  var el = document.getElementById('arch-content');
  if (!data) {
    el.innerHTML = '<div class="arch-eyebrow">Daily Architecture Digest</div><div class="arch-rule"></div>' +
      '<div class="arch-placeholder"><div class="arch-placeholder-title">Building of the Day</div>' +
      '<div class="arch-placeholder-sub">Could not load today&#39;s building.</div></div>';
    return;
  }
  var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(data.name) +
    '/@' + data.lat + ',' + data.lng + ',17z';

  var imgHtml = '';
  if (imgs && imgs.length) {
    imgHtml = '<div class="arch-images">';
    for (var i = 0; i < imgs.length; i++) {
      imgHtml += '<div class="arch-img-wrap">' +
        '<img src="' + imgs[i].url + '" alt="' + data.name + '" loading="lazy" class="arch-img"' +
        ' onerror="this.closest(\'.arch-img-wrap\').style.display=\'none\'">' +
        (imgs[i].caption ? '<div class="arch-img-caption">' + imgs[i].caption + '</div>' : '') +
        '</div>';
    }
    imgHtml += '</div>';
  }

  el.innerHTML =
    '<div class="arch-eyebrow">Daily Architecture Digest</div>' +
    '<div class="arch-rule"></div>' +
    '<div class="arch-building-name">' + data.name + '</div>' +
    '<div class="arch-meta">' + data.city + ', ' + data.country +
      ' <span>&middot;</span> ' + data.year +
      ' <span>&middot;</span> ' + data.architect + '</div>' +
    imgHtml +
    '<p class="arch-body">' + data.writeup + '</p>' +
    '<div class="arch-detail-label">Design detail to notice</div>' +
    '<p class="arch-detail-text">' + data.detail + '</p>' +
    '<div class="arch-footer">' +
      '<span class="arch-footer-label">Daily Architecture Digest</span>' +
      '<a class="arch-maps-link" href="' + mapsUrl + '" target="_blank" rel="noopener">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">' +
        '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z' +
        'm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>' +
        '</svg>View on Maps' +
      '</a>' +
    '</div>';
}

// Fetch up to 3 images for a building from Wikipedia's public API.
// Strategy:
//   1. Wikipedia REST summary → lead article photo
//   2. Wikipedia page images API → additional images from the article itself
//   3. Wikimedia Commons search fallback → broader image search
async function fetchWikiImages(buildingName, architectName) {
  var images = [];

  async function tryGetImage(title) {
    try {
      var r = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' +
        encodeURIComponent(title.replace(/ /g, '_')),
        { headers: { 'Accept': 'application/json' } });
      if (!r.ok) return null;
      var d = await r.json();
      var url = (d.originalimage || d.thumbnail || {}).source;
      if (url && !/\.svg/i.test(url)) return url;
    } catch(e) {}
    return null;
  }

  async function searchWiki(query) {
    try {
      // Opensearch returns better fuzzy matches than list=search
      var r = await fetch('https://en.wikipedia.org/w/api.php?action=opensearch&search=' +
        encodeURIComponent(query) + '&limit=3&format=json&origin=*');
      if (!r.ok) return [];
      var d = await r.json();
      return d[1] || []; // d[1] is array of title strings
    } catch(e) { return []; }
  }

  // Try 1: exact building name slug
  var url = await tryGetImage(buildingName);
  if (url) { images.push({ url: url, caption: '' }); return images; }

  // Try 2: opensearch with building name — tries fuzzy matches
  var hits = await searchWiki(buildingName);
  for (var i = 0; i < hits.length && images.length < 1; i++) {
    url = await tryGetImage(hits[i]);
    if (url) images.push({ url: url, caption: '' });
  }
  if (images.length) return images;

  // Try 3: opensearch with building name + architect (helps disambiguate)
  hits = await searchWiki(buildingName + ' ' + architectName);
  for (var j = 0; j < hits.length && images.length < 1; j++) {
    url = await tryGetImage(hits[j]);
    if (url) images.push({ url: url, caption: '' });
  }

  return images;
}

async function loadArch() {
  var el = document.getElementById('arch-content');
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var dayOfYear = Math.floor((now - start) / 86400000);
  var idx = (dayOfYear - 1 + BUILDINGS.length) % BUILDINGS.length;
  var b = BUILDINGS[idx];

  var data = {
    name:      b.n,
    city:      b.c,
    country:   b.co,
    year:      b.y,
    architect: b.ar,
    writeup:   b.w,
    detail:    b.d,
    lat:       b.lat,
    lng:       b.lng
  };

  // Render the text immediately so content appears while images load
  renderArch(data, []);

  // Then fetch Wikipedia images and inject them
  var imgs = await fetchWikiImages(data.name, data.architect);
  if (imgs.length > 0) {
    // Re-render with images — content already in DOM so this is fast
    renderArch(data, imgs);
  }
  // If no images found, the panel still looks fine with just text
}


async function loadAll() {
  _tdPromise = null; // reset so each 30-min refresh gets fresh data
  loadQuote();
  loadArch();
  await Promise.all([
    loadEquities(), loadCrypto(), loadRates(),
    loadFeed('bloomberg'), loadFeed('cnbc'), loadFeed('ft')
  ]);
  document.getElementById('rlabel').textContent =
    `Updated ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
}
loadAll();
setInterval(loadAll, 30 * 60 * 1000);
