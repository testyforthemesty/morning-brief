  {n:"Säynätsalo Town Hall",c:"Säynätsalo",co:"Finland",y:1952,ar:"Alvar Aalto",w:"Aalto's town hall for a small Finnish forest town is a cluster of brick buildings around a raised courtyard that feels simultaneously like a medieval Italian hill town and something entirely Nordic. The council chamber is the dominant form — a tent-like space of timber beams whose structure fans outward from the corners in a system Aalto described as fan trusses, derived from the forked branches of Finnish pines. The building is small — the whole municipality had a population of only 3,000 — but achieves a civic weight that larger buildings rarely manage. The brick is hand-laid with slight variations in joint profile across the surfaces, giving the walls a texture that changes with the light and the seasons. It is the building that established the idea of Nordic regionalism as a serious architectural position.",d:"The council chamber roof structure is formed from a series of butterfly trusses of unequal arms, creating an asymmetric ceiling profile that acknowledges the position of the speaker relative to the assembled members — function and form inseparable.",lat:62.1317,lng:25.0819,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Saynatsalo_Town_Hall.jpg/800px-Saynatsalo_Town_Hall.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Saynatsalo_interior.jpg/800px-Saynatsalo_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Aalto_saynatsalo_courtyard.jpg/800px-Aalto_saynatsalo_courtyard.jpg"]},
  {n:"Fondation Cartier",c:"Paris",co:"France",y:1994,ar:"Jean Nouvel",w:"Nouvel's building for the Cartier Foundation dematerializes its boundaries through a series of glass planes that stand free of one another, creating overlapping reflections of the street, the sky, and the building itself that make its edges impossible to locate precisely. The building is simultaneously transparent and mirrored, present and absent, a quality that has made it one of the most discussed facades in contemporary architecture. The garden behind the building — planted by Lothar Baumgarten — is visible through multiple layers of glass from the street, creating a depth that the plan dimensions alone would not suggest. Nouvel designed the building as an extension of the city rather than a retreat from it, and the street-level public space has been used continuously since opening. It is the finest building on the Boulevard Raspail.",d:"Three planes of glass — the street facade, a setback screen, and a further screen at the garden edge — create overlapping reflective layers so the building appears to extend into and reflect the boulevard indefinitely, its actual position never entirely clear.",lat:48.84,lng:2.3282,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Fondation_Cartier_Paris.jpg/800px-Fondation_Cartier_Paris.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Cartier_foundation_interior.jpg/800px-Cartier_foundation_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Fondation_cartier_garden.jpg/800px-Fondation_cartier_garden.jpg"]},
  {n:"Menil Collection",c:"Houston",co:"USA",y:1987,ar:"Renzo Piano",w:"Piano's Menil Collection museum uses a system of ferro-cement leaves on the roof to deliver diffuse natural light to the galleries below, solving the problem of Houston's intense sunlight by creating a modulating surface that responds to the sun's angle throughout the day. The leaves are shaped by computational analysis of Houston's solar path — each one slightly different — and the result is a quality of natural light in the galleries that rivals anything achieved by Kahn. The building is long and low, its white exterior and sheltered porches reading as a series of plantation houses rather than an institutional building. Dominique de Menil gave Piano complete creative freedom and maintained close involvement throughout the design process. It is considered by many critics the finest museum building completed since Kahn's Kimbell.",d:"The 300 ferro-cement roof leaves each have a profile shaped by computational analysis of Houston's solar angles, so they function as collective light modifiers that deliver diffuse natural light to the galleries below rather than simple shading devices.",lat:29.7383,lng:-95.3979,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Menil_Collection_Houston.jpg/800px-Menil_Collection_Houston.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Menil_collection_interior.jpg/800px-Menil_collection_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Menil_collection_exterior.jpg/800px-Menil_collection_exterior.jpg"]},
  {n:"Central Library",c:"Seattle",co:"USA",y:2004,ar:"OMA",w:"Seattle's central library organizes its program around the principle that some functions need certainty — the books, the reading rooms — while others thrive in ambiguity, and the building expresses this distinction in its form: five specific program platforms stacked and wrapped in a steel and glass mesh. The result is a building that is neither gridded nor random, its diamond-patterned skin shifting frequency and angle across different facades to respond to the varying programs behind each surface. Rem Koolhaas and Joshua Prince-Ramus won the commission through a combination of programmatic thinking and formal invention that was unusual in American library design. The building was immediately controversial — its yellow escalators and red reference room were considered aggressive — and is now loved. It is among the few public buildings of its generation to have become genuinely civic in the best sense.",d:"The building's steel diagrid structure is not a uniform pattern but shifts frequency and angle across different facades, making the skin a direct readout of the varying internal programs behind each surface — program expressed as structure.",lat:47.6063,lng:-122.3321,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Seattle_Central_Library.jpg/800px-Seattle_Central_Library.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Seattle_library_interior.jpg/800px-Seattle_library_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Seattle_public_library_escalator.jpg/800px-Seattle_public_library_escalator.jpg"]},
  {n:"CCTV Headquarters",c:"Beijing",co:"China",y:2012,ar:"OMA",w:"The CCTV tower loops a continuous circuit in three dimensions — two towers lean toward each other and are connected at both the top and the base, creating a closed tube of office floors that makes the building simultaneously two towers and one loop. The structural implications of the cantilever at the top — where 75 meters of floor plate bridge the gap between the two towers — are enormous, and the building represents one of the most complex structural engineering projects of the twenty-first century. Arup engineers Cecil Balmond and Andy Sedgwick developed a diagrid structural system that makes the building's stress distribution visible on its exterior facade, the density of the diagrid proportional to the forces at each point. The building was under construction during the 2008 Beijing Olympics and was the object of sustained international attention. It is the definitive statement of Chinese architectural ambition of its era.",d:"The building's diagrid skin shifts density at every point where internal forces change, making the facade a direct readout of the structural stress distribution — engineering necessity transformed directly into architectural expression.",lat:39.9144,lng:116.4555,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/CCTV_Headquarters.jpg/800px-CCTV_Headquarters.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/CCTV_Beijing_night.jpg/800px-CCTV_Beijing_night.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/CCTV_headquarters_detail.jpg/800px-CCTV_headquarters_detail.jpg"]},
  {n:"Parc de la Villette",c:"Paris",co:"France",y:1987,ar:"Bernard Tschumi",w:"Tschumi's Parc de la Villette places 35 identical red steel follies at the intersections of a 120-meter grid across a Paris park, each folly the deconstruction of a 10-meter cube into a unique configuration of ramps, stairs, and surfaces. The follies have no predetermined function — they become whatever the park needs at any given moment, a proposition that challenges the idea that architecture must have stable meaning. The project was the winning entry in an international competition that attracted 471 entries, and Tschumi's diagrammatic approach — three independent systems of points, lines, and surfaces overlaid across the site — was unlike anything submitted by other entrants. The park has been in continuous use since opening and the follies have been absorbed into Parisian life as naturally as the kiosks they conceptually replaced. It remains the most significant theoretical proposition built in the twentieth century.",d:"All 35 follies share the same 10-meter cube volume but each is deconstructed differently — sliced, combined, or overlaid with ramps and stairs — so no two are identical despite being generated from the same system of rules.",lat:48.8934,lng:2.3939,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Parc_de_la_Villette_folie.jpg/800px-Parc_de_la_Villette_folie.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Villette_tschumi_red.jpg/800px-Villette_tschumi_red.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Parc_villette_paris.jpg/800px-Parc_villette_paris.jpg"]},
  {n:"Bibliothèque Nationale de France",c:"Paris",co:"France",y:1994,ar:"Dominique Perrault",w:"Perrault's national library organizes 3.5 million books in four corner towers shaped like open books, their glass facades revealing the stacks within — or would, if books were not destroyed by sunlight, requiring solid wooden shutters that now encase the transparent towers and render them opaque. The reading rooms are below grade around a sunken garden of transplanted mature pine trees, so readers sit underground in a forest that exists only to provide a view and a quality of light. The building was extensively criticized for the book storage towers, whose glass facades required expensive remediation, and for the impracticality of the below-grade reading rooms. It was the last major project of the Mitterrand Grand Travaux programme and the most controversial. The sunken garden remains closed to the public.",d:"The garden at the centre of the complex is not accessible to the public — it exists only to provide natural light and a view of mature pine trees for the underground reading rooms that surround it, a garden that is simultaneously generous and withheld.",lat:48.833,lng:2.3762,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Biblioth%C3%A8que_nationale_de_France.jpg/800px-Biblioth%C3%A8que_nationale_de_France.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/BNF_towers.jpg/800px-BNF_towers.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/BNF_garden.jpg/800px-BNF_garden.jpg"]},
  {n:"Waterloo International Terminal",c:"London",co:"UK",y:1993,ar:"Nicholas Grimshaw",w:"Grimshaw's terminal was built to receive Eurostar trains arriving through the Channel Tunnel and had to accommodate platforms 400 meters long, curving gently through the site — a constraint that became the building's primary architectural generator. The roof is an asymmetric glazed arch of decreasing radius that follows the curve of the platforms, its west side glazed fully and its east side clad in stainless steel to reflect the rail tracks below. The structural logic is explicit — the arch deepens where the span is greatest and narrows where the ground rises — and the building reads as a diagram of its own forces. It was built in five years on a constrained urban site alongside a functioning station, a feat of construction management as impressive as the architecture. Eurostar moved to St Pancras in 2007 and the terminal now handles domestic trains.",d:"The glass roof panels are all parallelograms of different sizes, their geometry driven by the changing radius of the arch, so no two panels are identical across the 400-meter length — the building is made of 36,000 unique glass pieces.",lat:51.5031,lng:-0.1132,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Waterloo_International_Terminal.jpg/800px-Waterloo_International_Terminal.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Waterloo_terminal_interior.jpg/800px-Waterloo_terminal_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Grimshaw_waterloo_roof.jpg/800px-Grimshaw_waterloo_roof.jpg"]},
  {n:"Kursaal",c:"San Sebastián",co:"Spain",y:1999,ar:"Rafael Moneo",w:"Moneo's Kursaal auditorium and conference centre sits at the mouth of the Urumea river as two large boulders of translucent glass, their angular geometry abstracted from the angular landform of the Pyrenean coastline. At night the buildings glow from within with a diffuse amber light, visible from the hills above the city as two lamps at the river's edge. The translucent glass panels are not flat but have a slight curvature and a sandblasted surface that softens light from within, so the buildings appear to emit rather than reflect their nighttime luminosity. The building replaced a 1921 casino and theatre that had been demolished in the 1970s, a loss the city had felt acutely. It is now inseparable from the Basque city's identity.",d:"The translucent glass panels have a sandblasted surface that diffuses light from within the building, so the boxes appear to glow with an internal luminosity rather than reflecting external light — they emit rather than mirror.",lat:43.3224,lng:-1.9875,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Kursaal_San_Sebastian.jpg/800px-Kursaal_San_Sebastian.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Kursaal_night.jpg/800px-Kursaal_night.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Kursaal_interior.jpg/800px-Kursaal_interior.jpg"]},
  {n:"Nakagin Capsule Tower",c:"Tokyo",co:"Japan",y:1972,ar:"Kisho Kurokawa",w:"The Nakagin Capsule Tower is the only built example of Metabolism's core idea — a permanent concrete shaft structure with 140 individually attached living capsules that were designed to be replaced every 25 years as technology advanced. Each capsule was manufactured entirely off-site, contains a bed, bathroom, built-in television, and circular porthole window, and was attached to the shaft with four high-tension bolts in a process taking three hours. The capsules were never replaced as intended, and the building deteriorated steadily over fifty years before being controversially demolished in 2022 over the objections of preservation groups. Several capsules were removed before demolition and are now preserved in museums. It remains the most complete built expression of the Metabolism movement's ambitions and the most mourned recent demolition in architecture.",d:"Each capsule was manufactured off-site to a single standard type and attached to the concrete shaft with four high-tension bolts, allowing in-principle replacement — a design that demonstrated standardized living could still be personal through individual occupation.",lat:35.6659,lng:139.7308,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Nakagin_Capsule_Tower.jpg/800px-Nakagin_Capsule_Tower.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Nakagin_capsule_interior.jpg/800px-Nakagin_capsule_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Nakagin_tower_detail.jpg/800px-Nakagin_tower_detail.jpg"]},
  {n:"Nordic Embassies",c:"Berlin",co:"Germany",y:1999,ar:"Various",w:"Five Nordic countries share a single compound in Berlin — Denmark, Finland, Iceland, Norway, and Sweden — enclosed by a common perimeter wall of oxidised copper that contains five individual embassy buildings, each designed by an architect from the relevant Nordic country. The project demonstrates how collaboration between nations can produce architecture of unusual coherence without uniformity, each embassy expressing its national culture within a shared framework. The compound is open to the public and has become one of Berlin's more visited architectural destinations, particularly for its collective expression of Nordic material culture — brick, copper, timber, stone. The perimeter wall contains adjustable copper blades that control the light entering the compound and create a continuously changing pattern of shadow within. It was completed in the same year as the Federal Republic moved the German government from Bonn to Berlin.",d:"The common perimeter wall of oxidised copper contains adjustable copper blades set at different angles, creating a surface that changes pattern and shadow continuously through the day as the sun moves across the compound.",lat:52.5167,lng:13.3472,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Nordic_Embassies_Berlin.jpg/800px-Nordic_Embassies_Berlin.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Nordic_embassies_copper.jpg/800px-Nordic_embassies_copper.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Berlin_nordic_compound.jpg/800px-Berlin_nordic_compound.jpg"]},
  {n:"CaixaForum Madrid",c:"Madrid",co:"Spain",y:2008,ar:"Herzog and de Meuron",w:"Herzog and de Meuron converted a derelict 1899 power station by lifting the building off the ground — removing its original brick base entirely — and adding a rusted Corten steel crown that nearly doubles the original building's height. The result is a building that appears to hover, its original mass supported on four concealed columns in a structural feat that required the most complex underpinning operation ever undertaken in Spain. Across the street, Patrick Blanc's vertical garden covers an entire six-story facade in 15,000 plants, so the museum is always seen in relation to a living green wall. The combination of the hovering industrial building and the vertical garden has become one of Madrid's most photographed urban encounters. It attracts over a million visitors annually.",d:"The building's original brick base was entirely removed and the structure underpinned so it now cantilevers from four internal columns, creating a covered outdoor public space beneath and making the building appear to hover above the street.",lat:40.4089,lng:-3.6934,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/CaixaForum_Madrid.jpg/800px-CaixaForum_Madrid.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Caixa_forum_madrid_green_wall.jpg/800px-Caixa_forum_madrid_green_wall.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Caixa_forum_underneath.jpg/800px-Caixa_forum_underneath.jpg"]},
  {n:"Bagsværd Church",c:"Bagsværd",co:"Denmark",y:1976,ar:"Jørn Utzon",w:"Bagsværd Church sits quietly in a Copenhagen suburb, its corrugated concrete exterior giving almost no indication of what lies within. The interior is dominated by a continuous shell-like ceiling that billows and folds like clouds, flooding the nave with diffuse northern light. Utzon described the design as a collision between the universal — the cloud ceiling derived from ancient Chinese pavilion forms — and the local modest Danish parish. The building took nearly ten years to complete and became Utzon's most personal work after his departure from the Sydney Opera House. It is one of the most spatially surprising rooms in twentieth century architecture, and among the least visited.",d:"The undulating ceiling is formed from prefabricated concrete shell segments that overlap and interlock, each piece slightly different, creating an effect of movement despite being entirely static.",lat:55.7576,lng:12.4578,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Bagsvaard_Kirke_Interior.jpg/800px-Bagsvaard_Kirke_Interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Bagsvaard_Kirke_Exterior.JPG/800px-Bagsvaard_Kirke_Exterior.JPG","https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Birkeh%C3%B8j_church_interior.jpg/800px-Birkeh%C3%B8j_church_interior.jpg"]},
  {n:"Salk Institute",c:"La Jolla",co:"USA",y:1965,ar:"Louis Kahn",w:"The Salk Institute compresses a meditation on science and nature into two mirror-image laboratory buildings flanking a central travertine courtyard. The courtyard is bisected by a single channel of water aimed precisely at the Pacific horizon, achieving a spatial clarity that most architecture only approximates. Kahn's use of teak, concrete, and travertine ages beautifully and with purpose, each material chosen for its response to the California light. Jonas Salk gave Kahn extraordinary creative latitude, asking only that the building be worthy of a visit from Picasso. The result is arguably the finest research building ever constructed.",d:"A narrow water channel bisects the travertine courtyard aimed precisely at the Pacific so that at the equinoxes the setting sun aligns with it perfectly, the horizon bisecting the space in a single line of fire.",lat:32.873,lng:-117.2365,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Salk_Institute_4.jpg/800px-Salk_Institute_4.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Salk_Institute_courtyard.jpg/800px-Salk_Institute_courtyard.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Salk-Institute.jpg/800px-Salk-Institute.jpg"]},
  {n:"Kimbell Art Museum",c:"Fort Worth",co:"USA",y:1972,ar:"Louis Kahn",w:"The Kimbell Art Museum is among the most resolved art museums ever built, a building in which every structural and material decision serves the experience of looking at art. Kahn used cycloid concrete vaults to create galleries with natural light entering along a silver reflector that bounces diffuse illumination across the curved ceilings. The interiors are simultaneously monumental and intimate, the travertine floors and white oak furniture giving warmth to what could easily have been a cold exercise in geometry. The building was completed the same year as the nearby Amon Carter Museum but surpassed it in every measure of architectural quality. No changes have ever felt necessary, which is perhaps the highest compliment a museum can receive.",d:"A narrow slot in each vault admits daylight onto a polished aluminum reflector, distributing it as a soft silver wash across the concrete ceiling rather than creating harsh pools of direct sunlight that would damage works on paper.",lat:32.7497,lng:-97.3659,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Kimbell_Art_Museum_Louis_Kahn.jpg/800px-Kimbell_Art_Museum_Louis_Kahn.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Kimbell_Art_Museum_interior.jpg/800px-Kimbell_Art_Museum_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Kimbell_Art_Museum_portico.jpg/800px-Kimbell_Art_Museum_portico.jpg"]},
  {n:"Brion Cemetery",c:"San Vito d'Altivole",co:"Italy",y:1978,ar:"Carlo Scarpa",w:"Carlo Scarpa spent the final decade of his life designing this family cemetery in the Veneto, and the depth of attention is visible in every joint, corner, and threshold. Water, concrete, mosaic, and grass are woven into a landscape of quiet grief that unfolds across a triangular perimeter site. The arcosolium — the great arched tomb of the Brion family — is approached through a sequence of carefully framed views that defer arrival through a series of thresholds. Scarpa himself died before the cemetery was complete and was buried there at the family's invitation, making it also his own resting place. It is one of the rare cases in architecture where the program and the architect's biography have fused into a single inseparable meaning.",d:"A pair of interlocking circles, Scarpa's recurring motif, appears in railings, walls, and the great arched tomb throughout the site, encoding the union of living and dead in a form derived from traditional Japanese family crests.",lat:45.8028,lng:12.0193,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Brion_cemetery_scarpa.jpg/800px-Brion_cemetery_scarpa.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Brion_tomb.jpg/800px-Brion_tomb.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Carlo_scarpa_brion.jpg/800px-Carlo_scarpa_brion.jpg"]},
  {n:"Therme Vals",c:"Vals",co:"Switzerland",y:1996,ar:"Peter Zumthor",w:"Zumthor's thermal bath is cut into a Swiss alpine hillside, its grass roof reading as landscape from above so the building appears not to have been added to the site at all. Inside, a series of pools and chambers are carved from locally quarried Valser quartzite, a grey-green stone with horizontal striations that read like geological strata. The experience is deliberately slow and sensory — there is no spectacle, only the accumulation of material and light over time. Zumthor designed all fittings, lighting, and even the towels, creating a total environment of unusual coherence. It is one of the few contemporary buildings that succeeds in making bathing a genuinely architectural experience.",d:"Each layer of quartzite in the walls is separated by a thin shadow gap rather than a mortar joint, so the stone surfaces appear to float rather than stack, dissolving the apparent mass of 60,000 tons into something weightless.",lat:46.6222,lng:9.177,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Therme_Vals_pool.jpg/800px-Therme_Vals_pool.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vals_thermal_baths_exterior.jpg/800px-Vals_thermal_baths_exterior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Therme_vals_stone.jpg/800px-Therme_vals_stone.jpg"]},
  {n:"Jewish Museum Berlin",c:"Berlin",co:"Germany",y:2001,ar:"Daniel Libeskind",w:"Libeskind's Jewish Museum is among the most emotionally exact buildings of its generation, its form derived from a fractured Star of David traced in the plan of a Berlin neighborhood. The zinc-clad exterior is slashed with diagonal windows that admit light at angles unrelated to the rooms inside, creating a persistent disorientation that is the building's core argument. Voids — concrete shafts cutting vertically through the entire museum — represent the absence of Berlin's Jewish population and cannot be entered, only glimpsed through small windows. The museum was opened empty for two years with no exhibits, and hundreds of thousands visited finding the building itself sufficient. It remains the most visited Jewish museum in the world.",d:"The voids are concrete shafts cutting through every floor; they cannot be occupied, only glimpsed, and their darkness is total even in full daylight — presence expressed through absolute absence.",lat:52.5029,lng:13.3945,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Jewish_Museum_Berlin_exterior.jpg/800px-Jewish_Museum_Berlin_exterior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/JMB_void.jpg/800px-JMB_void.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Jewish_Museum_Berlin_interior.jpg/800px-Jewish_Museum_Berlin_interior.jpg"]},
  {n:"Chapel of Notre Dame du Haut",c:"Ronchamp",co:"France",y:1955,ar:"Le Corbusier",w:"Ronchamp is the most puzzling building of the twentieth century, made by an architect who had spent thirty years arguing for rational clarity. The thick concrete walls splay inward and outward at seemingly arbitrary angles, the roof lifts off the walls on hidden supports, and the south facade is punctuated by colored glass windows of varying sizes set into the deep wall like jewels. Le Corbusier said he wanted to create a vessel of silence, a building that could hold the ineffable rather than express the logical. The building has been the subject of more sustained critical analysis than almost any other work of the century, and still resists explanation. It is simultaneously one of the greatest and most controversial buildings in the world.",d:"The roof appears to float above the south wall because a narrow band of light separates them — the massive concrete shell sits on hidden supports rather than resting on the wall, making the heaviest element appear weightless.",lat:47.703,lng:6.8217,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Ronchamp.jpg/800px-Ronchamp.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Notre-Dame_du_Haut_de_Ronchamp_interior.jpg/800px-Notre-Dame_du_Haut_de_Ronchamp_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Ronchamp_south_facade.jpg/800px-Ronchamp_south_facade.jpg"]},
  {n:"Paimio Sanatorium",c:"Paimio",co:"Finland",y:1933,ar:"Alvar Aalto",w:"Aalto designed Paimio with the specific ergonomics of tuberculosis recovery in mind — the orientation of rooms, the position of windows, and the design of furniture all respond to the physiological needs of patients confined to bed. The famous Paimio chair curves to allow maximum chest expansion, one of the first purpose-designed therapeutic furniture pieces. The building is organized so that every ward room faces south with a balcony for outdoor rest cures, with service functions banished to a separate wing to protect patient areas from noise and traffic. It was completed when Aalto was only 32 and established him as the leading figure in Nordic Modernism. The building has been operating continuously as a hospital for nearly a century.",d:"The washbasin Aalto designed for patient rooms has no flat surface — water runs silently down a curved slope into the drain so that patients sleeping nearby are never disturbed by dripping or splashing during the night.",lat:60.4553,lng:22.6903,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Paimio_sanatorium.jpg/800px-Paimio_sanatorium.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Paimio_interior.jpg/800px-Paimio_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Paimio_Sanatorium_Aalto.jpg/800px-Paimio_Sanatorium_Aalto.jpg"]},
  {n:"National Museum of Roman Art",c:"Mérida",co:"Spain",y:1986,ar:"Rafael Moneo",w:"Moneo constructed a new Roman museum directly above the ruins of Emerita Augusta, threading the archaeology through the building rather than burying it beneath a slab. The nave is modelled on a Roman basilica, with thin brick arches carrying natural light from high clerestory windows down to the ruins visible through glass floors below. The building is serious about its program in a way that contemporary museums rarely are — it does not compete with the artifacts but serves them with architectural intelligence. The brick arches are built from Roman-format brick with raked joints deliberately close to the Roman originals two millennia below. It was the building that established Moneo's international reputation and led directly to the Pritzker Prize.",d:"The arches are built from thin Roman-format brick with raked joints deliberately close to the Roman originals visible through the glass floors below, collapsing the distance between 2000 AD and 100 AD into a single material continuity.",lat:38.917,lng:-6.3411,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Museo_Nacional_de_Arte_Romano.jpg/800px-Museo_Nacional_de_Arte_Romano.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/MNAR_interior.jpg/800px-MNAR_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Mnar_merida_arches.jpg/800px-Mnar_merida_arches.jpg"]},
  {n:"Sendai Mediatheque",c:"Sendai",co:"Japan",y:2001,ar:"Toyo Ito",w:"Ito's mediatheque is a transparent glass building whose structure is not a conventional column-and-beam grid but a forest of thirteen irregular steel tubes of varying diameter and curvature. The tubes carry vertical circulation, mechanical services, and structural loads, leaving the floor plates entirely open and free of any intermediate support. At night the building glows from within, its structural system fully visible to the street as a constantly shifting pattern of shadows and reflections. The building was seriously damaged in the 2011 Tōhoku earthquake and was temporarily converted into a disaster relief centre, demonstrating the social value of its open interior. It is one of the most genuinely original structural and spatial inventions of the twenty-first century.",d:"The 13 structural tubes each have a different diameter and twist angle derived from analysis of seaweed moving in current, so the building's structure is simultaneously precise engineering and organic form.",lat:38.2609,lng:140.8693,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Sendai_Mediatheque.jpg/800px-Sendai_Mediatheque.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Sendai_Mediatheque_interior.jpg/800px-Sendai_Mediatheque_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Sendai_mediatheque_night.jpg/800px-Sendai_mediatheque_night.jpg"]},
  {n:"Yokohama International Port Terminal",c:"Yokohama",co:"Japan",y:2002,ar:"Foreign Office Architects",w:"The Yokohama terminal folds the ground plane of the city into a pier that is simultaneously public park, circulation landscape, and cruise terminal, blurring the boundary between building and infrastructure. There are no conventional columns — the structure is a folded steel plate system that distributes loads through a continuous surface rather than discrete members. The movement of ships and passengers is choreographed through the sectional complexity of the building, with arrivals and departures separated vertically and horizontally without signage. The timber deck surface extends from the quay into the terminal and back out to the park, treating the entire building as a single continuous ground. It was the winning entry in an international competition won by a practice that had never built a building.",d:"The floor, walls, and roof are a continuous surface of folded steel and timber decking — there is no structural hierarchy, only topology, and the building can be read as landscape as easily as architecture.",lat:35.4437,lng:139.6381,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Yokohama_osanbashi_pier.jpg/800px-Yokohama_osanbashi_pier.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Osanbashi_pier_interior.jpg/800px-Osanbashi_pier_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Osanbashi_pier_roof.jpg/800px-Osanbashi_pier_roof.jpg"]},
  {n:"Casa Malaparte",c:"Capri",co:"Italy",y:1942,ar:"Adalberto Libera",w:"Perched on a rocky promontory 32 meters above the Tyrrhenian Sea, Casa Malaparte is as much landscape intervention as building, its horizontal form reading as a continuation of the cliffs below it. The roof is a broad concrete terrace with a curved wind-screen wall that catches the light differently through the day and serves no function other than to modify the experience of the sea. The writer Curzio Malaparte was closely involved in the design, and there has been sustained debate about how much of the building is his rather than Libera's. Jean-Luc Godard filmed Contempt there in 1963, and the scenes of Brigitte Bardot on the roof terrace have made it as famous as any cinema set. It remains privately owned and is accessible only by boat or a long coastal path.",d:"The trapezoidal staircase on the landward facade leads directly to the roof terrace and is the building's only ornament — its precise geometry against the raw volcanic rock gives it an air of ancient ceremony despite its modernity.",lat:40.5543,lng:14.2386,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Casa_Malaparte_Capri.jpg/800px-Casa_Malaparte_Capri.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Casa_malaparte_roof.jpg/800px-Casa_malaparte_roof.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Malaparte_house_staircase.jpg/800px-Malaparte_house_staircase.jpg"]},
  {n:"Unité d'Habitation",c:"Marseille",co:"France",y:1952,ar:"Le Corbusier",w:"The Unité is an attempt to build an entire city in a single building — 337 apartments, shops, a hotel, a gymnasium, and a rooftop park with a running track, nursery, and paddling pool. The building sits on massive concrete pilotis so the ground plane flows beneath it unobstructed, and the roof is populated with sculptural concrete forms housing ventilation and stair towers. Le Corbusier developed a proportional system called the Modulor — based on the dimensions of a six-foot man — that governs every dimension from wall thickness to ceiling height. The building was deeply controversial when built, accused of being inhuman in scale, but its residents have been consistently loyal and protective for over seventy years. It gave the entire postwar movement its name: Béton Brut.",d:"The pilotis are raw concrete with the plywood formwork marks still visible, a deliberate choice Le Corbusier called béton brut — rough concrete — which gave the entire postwar architectural movement its name: Brutalism.",lat:43.26,lng:5.3968,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Unite_d_habitation_Marseille.jpg/800px-Unite_d_habitation_Marseille.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Unite_habitation_roof.jpg/800px-Unite_habitation_roof.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Corbusier_unite_pilotis.jpg/800px-Corbusier_unite_pilotis.jpg"]},
  {n:"São Paulo Museum of Art",c:"São Paulo",co:"Brazil",y:1968,ar:"Lina Bo Bardi",w:"MASP hangs its entire building between two massive concrete beams to preserve the view corridor from Avenida Paulista across the Trianon valley below, a civic gesture of extraordinary generosity in a city not known for it. The collections are displayed on glass easels rather than hung on walls, so visitors can walk around works and view them from any angle, including from the back. Lina Bo Bardi was an Italian architect who emigrated to Brazil in 1946 and spent the rest of her life there, becoming one of the country's most original architectural thinkers. The building was considered scandalous when built and is now considered the finest in São Paulo. The elevated concrete beams are painted red, making the building visible from the full length of the avenue.",d:"The paintings are displayed on transparent glass panels set in concrete bases, allowing viewers to see the back of each canvas and to look through the collection rather than along a wall — making visible the normally hidden process of how art is made.",lat:-23.5613,lng:-46.6565,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/MASP_-_Museu_de_Arte_de_S%C3%A3o_Paulo.jpg/800px-MASP_-_Museu_de_Arte_de_S%C3%A3o_Paulo.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/MASP_interior.jpg/800px-MASP_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/MASP_easels.jpg/800px-MASP_easels.jpg"]},
  {n:"Farnsworth House",c:"Plano",co:"USA",y:1951,ar:"Ludwig Mies van der Rohe",w:"The Farnsworth House is a one-room glass pavilion raised above the Fox River floodplain on eight welded steel columns, its absolute minimalism making it one of the most studied houses in history. The single space contains no walls, only a freestanding service core, and the surrounding landscape serves as the house's visual boundary. Mies developed the Farnsworth over five years and the result is as close to a pure architectural idea as any building has come — a shelter that refuses to be anything other than what it is. Its client, Edith Farnsworth, ultimately sued Mies over cost overruns and accused him of designing a building that was uninhabitable; critics have been debating who was right ever since. The house was purchased by the National Trust for Historic Preservation in 2003 and is now open to the public.",d:"The house is raised 1.5 meters above grade on two rows of welded steel H-columns, and the only elements that vary from pure geometry are the travertine floor terraces, which step down in a composed sequence to meet the landscape.",lat:41.5812,lng:-88.5023,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Farnsworth_House_by_Mies_Van_Der_Rohe.jpg/800px-Farnsworth_House_by_Mies_Van_Der_Rohe.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Farnsworth_interior.jpg/800px-Farnsworth_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Farnsworth_house_exterior.jpg/800px-Farnsworth_house_exterior.jpg"]},
  {n:"Barcelona Pavilion",c:"Barcelona",co:"Spain",y:1929,ar:"Ludwig Mies van der Rohe",w:"The Barcelona Pavilion — built for the 1929 International Exposition, demolished afterward, and reconstructed in 1986 — is a sequence of marble and glass planes that define space without enclosing it, a building with no rooms, only territories suggested by the placement of walls. The materials are extraordinary: green Tinos marble, golden onyx, grey Roman travertine, and chrome-edged glass — all used in planar sheets of identical thickness. Mies designed one piece of furniture for the building, the Barcelona Chair, which became the most widely copied piece of furniture in history. The reconstruction was undertaken with such precision that every vein in every marble panel was matched to its original photographs. It remains the most influential building of the twentieth century by almost any measure.",d:"The floor, wall, and ceiling planes are all of different materials — travertine, onyx, marble, glass — but all the same thickness, so the building reads as an assemblage of equal horizontal and vertical layers with no hierarchy.",lat:41.3703,lng:2.15,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Barcelona_Pavilion.jpg/800px-Barcelona_Pavilion.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Barcelona_Pavilion_pool.jpg/800px-Barcelona_Pavilion_pool.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Mies_barcelona_interior.jpg/800px-Mies_barcelona_interior.jpg"]},
  {n:"Seagram Building",c:"New York",co:"USA",y:1958,ar:"Ludwig Mies van der Rohe",w:"The Seagram Building is the benchmark against which all corporate towers are measured, its bronze-clad steel frame and precision of detail creating a standard that has been endlessly imitated but never equaled. Mies applied non-structural I-beams to the curtain wall to express a structural logic the building could not legally reveal — the steel frame was required by code to be encased in concrete fireproofing. The building was set back 30 meters from Park Avenue, a gesture of civic generosity that transformed the character of the street and has never been replicated. Philip Johnson designed the interior, including the Four Seasons restaurant, which became the canonical power-lunch location for fifty years. The building cost six times more per square foot than any other New York tower of its era.",d:"The I-beams on the exterior carry no load — they were added after the steel frame was enclosed in concrete fireproofing — but they express the structural logic the building actually follows, making the facade an honest diagram of something the building cannot honestly show.",lat:40.7581,lng:-73.9751,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Seagram_Building_NYC.jpg/800px-Seagram_Building_NYC.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Seagram_plaza.jpg/800px-Seagram_plaza.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Seagram_Building_detail.jpg/800px-Seagram_Building_detail.jpg"]},
  {n:"Eames House",c:"Pacific Palisades",co:"USA",y:1949,ar:"Charles and Ray Eames",w:"The Eames House is built entirely from standard industrial components — steel sections and panels drawn from manufacturers' catalogues — assembled with such care that the result is one of the most personal and specific houses of the century. Charles and Ray Eames ordered the parts in 1947 and changed the design completely the night before construction began, reorganizing the structure without changing any of the components. The house is famous not only for its architecture but for how the couple inhabited it — filling every surface with collections, toys, flowers, and found objects that made the industrial shell entirely domestic. It demonstrates that standardization and individuality are not opposites but can be the same thing when sufficient intelligence is applied. It is now managed as a museum and among the most visited private houses in California.",d:"Every structural element was selected from standard manufacturer catalogues rather than specified custom — the couple chose available components and arranged them with such precision that the result is entirely distinctive despite being entirely generic.",lat:34.0497,lng:-118.5233,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Eames_House_exterior.jpg/800px-Eames_House_exterior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Eames_house_interior.jpg/800px-Eames_house_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Case_Study_House_8_Eames.jpg/800px-Case_Study_House_8_Eames.jpg"]},
  {n:"Glass House",c:"New Canaan",co:"USA",y:1949,ar:"Philip Johnson",w:"Johnson's Glass House is a single-story transparent pavilion set in a Connecticut meadow, its four glass walls creating a continuous connection between interior and exterior that makes the landscape the room's primary decoration. It is among the most resolved expressions of modernist minimalism in residential architecture, a single space with no divisions except the brick cylinder containing the bathroom. Johnson built the house for himself and lived there for fifty years, adding a sequence of guest houses, studios, and follies across the 49-acre property that documented his evolving obsessions. The house was extensively influenced by Mies van der Rohe's Farnsworth House, a debt Johnson acknowledged while also pointing out he completed his first. Johnson donated the entire estate to the National Trust for Historic Preservation on his death.",d:"The single brick cylinder containing the bathroom sits on the central axis of the glass box and is its only opaque element — its solidity is the only interruption in an otherwise perfectly transparent building, making it simultaneously functional and sculptural.",lat:41.1454,lng:-73.4939,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Glass_House_Philip_Johnson.jpg/800px-Glass_House_Philip_Johnson.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Philip_Johnson_Glass_House_interior.jpg/800px-Philip_Johnson_Glass_House_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Glass_house_new_canaan.jpg/800px-Glass_house_new_canaan.jpg"]},
  {n:"Villa Savoye",c:"Poissy",co:"France",y:1931,ar:"Le Corbusier",w:"Villa Savoye is the built manifesto of Le Corbusier's five points of architecture — pilotis, free plan, free facade, horizontal windows, and roof garden — a building designed as much to illustrate a theory as to be inhabited. The white box rises from the Normandy landscape as if it had just landed, its pilotis allowing the ground plane to pass beneath it undisturbed, the grass continuing under the floor. The original clients found it uninhabitable and spent years in legal disputes over leaks and heating failures, a conflict that says as much about architectural idealism as about any failing in the building. Le Corbusier later described it as a pure form raised to the light, and the phrase captures both the building's quality and its occasional indifference to practical comfort. It is now a UNESCO World Heritage Site and one of the most visited buildings in France.",d:"The ramp connecting the three levels is given priority over the staircase — it is wider, better lit, and more ceremonially placed — expressing that movement through the building should be continuous rather than punctuated, as in a landscape rather than a conventional house.",lat:48.9401,lng:2.0205,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Villa_Savoye_2011.jpg/800px-Villa_Savoye_2011.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Villa_Savoye_interior_ramp.jpg/800px-Villa_Savoye_interior_ramp.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Villa_Savoye_pilotis.jpg/800px-Villa_Savoye_pilotis.jpg"]},
  {n:"National Assembly of Bangladesh",c:"Dhaka",co:"Bangladesh",y:1983,ar:"Louis Kahn",w:"Kahn's last major building is a parliament that uses geometric forms — circles, squares, triangles — cut through massive walls to create a play of natural light across monumental interior spaces unlike any other civic building of its era. The complex is surrounded by a lake that makes the building appear to float on water, and the approach across it is one of the most dramatic architectural experiences in Asia. The building was commissioned in 1962 but Kahn died in 1974 before its completion, found dead in Penn Station after returning from a site visit. His office completed it faithfully to his drawings. It is considered the greatest building constructed in the second half of the twentieth century by many architectural historians.",d:"The perimeter offices are separated from the central assembly hall by an ambulatory corridor lit by geometric openings in the 7-meter-thick outer walls, creating a zone of filtered natural light between the public and private realms of the building.",lat:23.7628,lng:90.3779,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/National_Assembly_Bangladesh.jpg/800px-National_Assembly_Bangladesh.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Dhaka_assembly_building.jpg/800px-Dhaka_assembly_building.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Bangladesh_national_assembly_interior.jpg/800px-Bangladesh_national_assembly_interior.jpg"]},
  {n:"Chichu Art Museum",c:"Naoshima",co:"Japan",y:2004,ar:"Tadao Ando",w:"The Chichu Art Museum is entirely underground, its galleries cut into the limestone of Naoshima island with only geometric courtyard openings in the landscape above to indicate its presence. The permanent collection contains only five works — three large Monet water lilies paintings and pieces by James Turrell and Walter De Maria — each in a room calibrated specifically to that work. The Monet room is a pure white concrete chamber that receives only skylight, calibrated so that the light on the paintings changes through the day as Monet intended his work to be seen at Giverny. Ando has said the building argues against the idea that art requires neutral white gallery space, and that each work deserves an architecture specific to it. The museum is accessible only by reservation, limited to 200 visitors per day.",d:"All natural light enters from directly above through slots and courtyards in the buried structure, so moving from room to room involves repeated transitions between total darkness and brilliant natural light — the building enacts what it contains.",lat:34.4599,lng:133.9977,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Chichu_Art_Museum_Naoshima.jpg/800px-Chichu_Art_Museum_Naoshima.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Naoshima_chichu_courtyard.jpg/800px-Naoshima_chichu_courtyard.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Chichu_museum_ando.jpg/800px-Chichu_museum_ando.jpg"]},
  {n:"Church of the Light",c:"Ibaraki",co:"Japan",y:1989,ar:"Tadao Ando",w:"Ando's Church of the Light is a minimal concrete box whose interior space is defined almost entirely by a cross cut into the east wall behind the altar, through which unfiltered daylight enters and falls across the floor and the seated congregation. The building was constructed for a very modest budget — the floor was originally packed earth — and the severity of the interior, which has no heating, was considered extreme even by Japanese standards. The congregation agreed to endure it because of the power of the light, and the building has been used continuously since completion. Ando has described it as an attempt to abstract the sacred — to remove everything until only the essential meaning remains. It is now one of the most visited contemporary buildings in Japan despite containing nothing but light and shadow.",d:"The cross is not merely decorative — it is a structural absence, a void cut entirely through the concrete wall that admits light with the precision of a surgical incision, making the spiritual symbol simultaneously a material and spatial event.",lat:34.8135,lng:135.5726,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Church_of_the_Light_Ando.jpg/800px-Church_of_the_Light_Ando.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Church_light_interior_ando.jpg/800px-Church_light_interior_ando.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Ibaraki_church_cross.jpg/800px-Ibaraki_church_cross.jpg"]},
];

// ARCHITECTURE DIGEST
// Architecture uses BUILDINGS array — no API call needed
const ARCH_KEY = 'arch_digest_v1';

function archDayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function renderArch(data) {
  var el = document.getElementById('arch-content');
  if (!data) {
    el.innerHTML = '<div class="arch-eyebrow">Daily Architecture Digest</div><div class="arch-rule"></div>' +
      '<div class="arch-placeholder"><div class="arch-placeholder-title">Building of the Day</div>' +
      '<div class="arch-placeholder-sub">Could not load today&#39;s building.</div></div>';
    return;
  }
  var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(data.name) +
    '/@' + data.lat + ',' + data.lng + ',17z';
  var imgs = (data.images || []).slice(0, 3);
  var imgHtml = '';
  if (imgs.length) {
    imgHtml = '<div class="arch-images">';
    for (var i = 0; i < imgs.length; i++) {
      var caption = imgs[i].caption || '';
      imgHtml += '<div class="arch-img-wrap">' +
        '<img src="' + imgs[i].url + '" alt="' + (caption || data.name) + '" loading="lazy" class="arch-img">' +
        (caption ? '<div class="arch-img-caption">' + caption + '</div>' : '') +
        '</div>';
    }
    imgHtml += '</div>';
  }
  el.innerHTML =
    '<div class="arch-eyebrow">Daily Architecture Digest</div>' +
    '<div class="arch-rule"></div>' +
    '<div class="arch-building-name">' + data.name + '</div>' +
    '<div class="arch-meta">' + data.city + ', ' + data.country +
      ' <span>&middot;</span> ' + data.year +
      ' <span>&middot;</span> ' + data.architect + '</div>' +
    imgHtml +
    '<p class="arch-body">' + data.writeup + '</p>' +
    '<div class="arch-detail-label">Design detail to notice</div>' +
    '<p class="arch-detail-text">' + data.detail + '</p>' +
    '<div class="arch-footer">' +
      '<span class="arch-footer-label">Daily Architecture Digest</span>' +
      '<a class="arch-maps-link" href="' + mapsUrl + '" target="_blank" rel="noopener">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">' +
        '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z' +
        'm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>' +
        '</svg>View on Maps' +
      '</a>' +
    '</div>';
  el.querySelectorAll('img.arch-img').forEach(function(img) {
    img.onerror = function() { this.closest('.arch-img-wrap').style.display = 'none'; };
  });
}

function loadArch() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var dayOfYear = Math.floor((now - start) / 86400000);
  var idx = (dayOfYear - 1 + BUILDINGS.length) % BUILDINGS.length;
  var b = BUILDINGS[idx];
  renderArch({
    name:      b.n,
    city:      b.c,
    country:   b.co,
    year:      b.y,
    architect: b.ar,
    writeup:   b.w,
    detail:    b.d,
    lat:       b.lat,
    lng:       b.lng,
    images:    (b.imgs || []).map(function(url,i){ return {url:url, caption:''} })
  });
}


async function loadAll() {
  loadQuote();
  loadArch();
  await Promise.all([
    loadEquities(), loadCrypto(), loadRates(),
    loadFeed('cnbc'), loadFeed('bloomberg'), loadFeed('ft')
  ]);
  document.getElementById('rlabel').textContent =
    `Updated ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
}
loadAll();
setInterval(loadAll, 30 * 60 * 1000);
</script>
