  {n:"Vanna Venturi House",c:"Philadelphia",co:"United States",y:1964,ar:"Robert Venturi",w:"The house Venturi designed for his mother is one of the most discussed buildings of the twentieth century for its use of historical references — a symmetrical front facade with a broken pediment, a chimney that splits the gable — in a way that contradicts the modernist rejection of historical precedent. The plan is compact and irregular inside the apparently symmetrical exterior, and the contradiction between the formal front and the functional plan is itself the subject of the building. Venturi's manifesto Complexity and Contradiction was written while he was designing this house, and the building is its clearest illustration.",d:"The symmetrical front facade has a large chimney that rises through the centre and splits the gable above it, turning the symbol of domestic warmth into a formal disruption of the most conventional architectural element.",lat:39.9526,lng:-75.1652},
  {n:"Tucker House",c:"Katonah",co:"United States",y:1975,ar:"Robert Venturi",w:"The Tucker House applies the ironic classicism of the Vanna Venturi House to a suburban New York site, using a symmetrical facade with exaggerated classical references that are simultaneously knowing and affectionate. The house is designed for easy reading from the road, its oversized gable and aligned windows functioning as a graphic sign of house-ness rather than a literal domestic architecture. Venturi was interested in buildings that could communicate meaning at the speed of the automobile.",d:"The street facade is composed as a graphic image of a house — symmetrical gable, centered door, flanking windows — scaled for legibility at driving speed rather than for architectural appreciation on foot.",lat:41.2595,lng:-73.6882},
  {n:"Trubek & Wislocki Houses",c:"Nantucket",co:"United States",y:1972,ar:"Robert Venturi & Denise Scott Brown",w:"The two small houses on Nantucket use the familiar vocabulary of shingle-style summer houses — shingles, gabled roofs, porch elements — in a slightly exaggerated, knowing way. They were designed as a demonstration that postmodern historicism was not incompatible with genuine spatial intelligence and are comfortable to live in because they acknowledge the functional intelligence embedded in the tradition they reference.",d:"The two houses are placed facing each other across a shared outdoor space, making their dialogue an architectural argument about the relationship between tradition and innovation.",lat:41.2835,lng:-70.0995},
  {n:"Gordon Wu Hall",c:"Princeton",co:"United States",y:1983,ar:"Robert Venturi",w:"Wu Hall is a student dining facility at Princeton that uses the Gothic and collegiate language of the surrounding campus with deliberate liberties — the pointed arches are too large, the patterns on the brick walls are slightly wrong, the references accumulate rather than cohere. Venturi treated the building as a decorated shed, with an ordinary structural box given a communicative surface rather than a formal architecture generated from internal logic. The building has been consistently criticised by architectural purists and consistently appreciated by the students who use it.",d:"The brick surface incorporates a pattern of darker bricks that alludes to Gothic tracery without reproducing it, functioning as a graphic pattern visible at a distance while dissolving into texture at close range.",lat:40.3573,lng:-74.6672},
  {n:"Sainsbury Wing National Gallery",c:"London",co:"United Kingdom",y:1991,ar:"Robert Venturi & Denise Scott Brown",w:"The Sainsbury Wing addition to the National Gallery uses the architectural language of the existing building — Wilkins's classical facade — while subjecting it to a series of distortions and contradictions that acknowledge both the tradition and the impossibility of simply continuing it. The columns decrease in spacing as they move away from the junction with the existing building, accelerating the perspective illusion and indicating that the new building knows it is new. The interior galleries are among the best naturally lit spaces in any London museum.",d:"The columns on the new facade decrease in spacing as they move away from the junction with the original building, using a distorted rhythm to signal the transition between authentic classical architecture and its knowing contemporary equivalent.",lat:51.5074,lng:-0.1278},
  {n:"Wexner Center for the Arts",c:"Columbus",co:"United States",y:1989,ar:"Peter Eisenman",w:"The Wexner Center uses a structural grid rotated from the city grid overlaid on the campus grid, and the collision between the two grids becomes the generator of the building's spaces. Fragmentary towers reference the armory that previously occupied the site, destroyed before the building was constructed. Eisenman was interested in the idea that architecture could be a record of previous uses and geometries rather than a fresh start, and the Wexner Centre makes that interest legible in its spatial organisation.",d:"Two structural grids — one aligned with the city streets, one with the campus buildings — collide throughout the building, producing structural members at unexpected angles and spaces of indeterminate geometry.",lat:39.9612,lng:-82.9988},
  {n:"Aronoff Center",c:"Cincinnati",co:"United States",y:1996,ar:"Peter Eisenman",w:"The Aronoff Center uses a shifting chevron plan that staggers each section of the building from the last, creating a building that appears to be in motion. The deformation of the plan produces a series of spaces that have no conventional parallel in building types — triangular rooms, angled corridors, unexpected spatial compressions — that Eisenman intended as a critique of the normative assumptions embedded in conventional planning. The building is simultaneously difficult to use and spatially fascinating.",d:"The plan shifts laterally by a fixed increment at each section break, so the building's footprint is a staircase of overlapping chevrons that produces no right-angled rooms along its length.",lat:39.1031,lng:-84.512},
  {n:"House VI",c:"Cornwall",co:"United States",y:1975,ar:"Peter Eisenman",w:"House VI is the most extreme of Eisenman's series of houses based on transformations of a formal cube, and it was famously built for the photographer Peter Eisenman wrote about it. The building inverts the conventional relationship between floor and ceiling, with a green stair suspended from the ceiling above a real stair that leads nowhere. The master bedroom is divided by a slot that interrupts the bed position. The house was difficult to live in and required extensive modification, but it generated more architectural theory than any house since the Villa Savoye.",d:"A green-painted slot cuts through the floor of the master bedroom from wall to wall, positioned precisely where a bed would naturally be placed, making the conventional occupation of the room architecturally problematic.",lat:41.4318,lng:-74.0243},
  {n:"House II",c:"Hardwick",co:"United States",y:1969,ar:"Peter Eisenman",w:"House II is one of Eisenman's earliest theoretical houses, exploring the formal transformation of a cube through a series of geometrical operations that produce a building whose spaces have no conventional relationship to domestic function. The overlapping structural grids create rooms that resist conventional furnishing and occupation. The house was a built theoretical diagram rather than a resolution of domestic requirements.",d:"Two structural grids overlap within the same volume, both fully expressed, so some rooms have two sets of columns and the structural logic of the building creates spatial conditions that no functional requirement would produce.",lat:44.5048,lng:-72.3698},
  {n:"House III",c:"Lakeville",co:"United States",y:1971,ar:"Peter Eisenman",w:"House III continues Eisenman's series of formally generated houses, using a 45-degree rotation of one structural system against another to produce spaces of indeterminate orientation. The house was built for the art historian Robert Miller and is among the most spatially disorienting domestic buildings in American architecture.",d:"The plan is generated by rotating one structural grid 45 degrees within the other, so the spaces of the house have no stable orientation — corners that appear to be corners are the result of geometric overlay rather than functional resolution.",lat:44.6497,lng:-93.2438},
  {n:"Church on the Water",c:"Hokkaido",co:"Japan",y:1988,ar:"Tadao Ando",w:"The chapel sits at the edge of an artificial pond in the Hokkaido landscape, with a large cross standing in the water beyond the full-height glass wall that forms the altar end of the space. In winter the pond freezes and the cross stands in ice; in summer it stands in water with the forest behind. Ando designed the approach as a sequence that takes the visitor around the building before entering from behind, building anticipation before the final revelation of the glass wall and the cross in the water. The building demonstrates that Ando's material vocabulary — concrete, water, light — can produce a Christian interior without Christian iconography.",d:"The approach to the chapel takes visitors on a complete circuit of the building before allowing entry, so the glass wall and cross in the pond are seen last after the expectations built during the procession.",lat:43.0621,lng:141.3544},
  {n:"Church of the Light",c:"Ibaraki",co:"Japan",y:1989,ar:"Tadao Ando",w:"The Church of the Light cuts a cross shape through the concrete altar wall, admitting light in the shape of the Christian symbol into a dark concrete interior. The pews are rough timber planks, the floor is rough concrete, and the surfaces are entirely without ornament except the cross of light. The building is tiny — it seats about a hundred — and its spatial intensity is achieved through the most minimal means. Ando has said he does not consider himself a religious architect, and the building's spirituality is a product of light and material rather than religious convention.",d:"The cross-shaped slot cut through the altar wall admits a cross of light that falls across the congregation, the light changing character through the day as the sun moves and the seasons change.",lat:34.8136,lng:135.5686},
  {n:"Rokko Housing",c:"Kobe",co:"Japan",y:1983,ar:"Tadao Ando",w:"Rokko Housing phases one through three climbs the steep slope of Mount Rokko using a repeated grid of concrete cells that steps up the hillside like an artificial topography. Each unit has a degree of individuality within the repetition of the grid, and the terraced gardens between the blocks create a series of outdoor spaces that mediate between the artificial geometry and the natural landscape. The project grew over many years as additional phases were added, and the accumulation demonstrates how Ando's structural system adapts to different site conditions while maintaining its formal logic.",d:"The housing terrace into the hillside at a constant angle, so each unit is at a different elevation and each terrace roof becomes the garden of the unit above, creating a vertical landscape of inhabited steps.",lat:34.6901,lng:135.1956},
  {n:"Naoshima Contemporary Art Museum",c:"Naoshima",co:"Japan",y:1992,ar:"Tadao Ando",w:"The Benesse House Museum on Naoshima Island began Ando's long involvement with the island as a site for contemporary art, and the original museum building is partially buried in the hillside, with the relationship between gallery spaces and the landscape carefully controlled. The building opened as a combined hotel and museum, a model that was unprecedented and has been influential. The concrete walls and the light conditions within the galleries were designed in consultation with artists whose work was specifically made for the space.",d:"Parts of the building are cut into the hillside so that gallery spaces sit below grade, reached by descending ramps that make the underground rooms feel like chambers discovered in the earth rather than constructed spaces.",lat:34.4614,lng:133.9977},
  {n:"Chikatsu-Asuka Historical Museum",c:"Kanan",co:"Japan",y:1994,ar:"Tadao Ando",w:"The museum for an archaeological site of ancient burial mounds uses a great stepped landscape as its primary space, with the underground galleries lit by carefully positioned roof openings. The visitors ascend and descend the stepped exterior surface while the collection is housed in the landscape below them, creating a spatial inversion in which the archaeological site is both the subject and the setting of the museum. The concrete steps function as amphitheatre, observation platform, and landscape simultaneously.",d:"The museum roof is a continuous stepped landscape accessible to visitors, who walk across the top of the underground galleries while the ancient burial mounds they contain are the subject of the collection below.",lat:34.3667,lng:135.5833},
  {n:"Azuma House",c:"Osaka",co:"Japan",y:1976,ar:"Tadao Ando",w:"The Row House in Sumiyoshi replaced a traditional wooden row house in a dense Osaka neighbourhood with a concrete box that occupies the same footprint but organises it around an open-air courtyard that divides the house in two. Residents must pass through the unroofed courtyard to move from the bedroom wing to the kitchen, experiencing weather as part of domestic circulation. Ando described this as a form of resistance to the conventional comfort of modern housing, proposing that architecture should require an active engagement with the conditions of living.",d:"Moving from one part of the house to the other requires crossing the open courtyard regardless of the weather, making the experience of rain and cold and heat an unavoidable element of daily domestic life.",lat:34.6937,lng:135.5022},
  {n:"Koshino House",c:"Ashiya",co:"Japan",y:1984,ar:"Tadao Ando",w:"The Koshino House uses two parallel concrete bars connected underground, set into the slope of a wooded hillside in an affluent suburb of Kobe. The walls are bare concrete and the light enters through carefully positioned slits that track the movement of the sun across the wall surfaces. An underground passage connects the two bars and receives light from a row of circular skylights set into the floor above it. The house demonstrates Ando's interest in the quality of light on concrete as a sensory experience independent of architectural function.",d:"An underground passage connects the two bars of the house with a row of circular skylights set in the ceiling, creating a tunnel of light spots that shift position through the day as the sun moves.",lat:34.7284,lng:135.3049},
  {n:"Benesse House",c:"Naoshima",co:"Japan",y:1992,ar:"Tadao Ando",w:"The Benesse House is the hotel component of the Naoshima art project, with rooms that contain commissioned artworks and corridors that open to the Inland Sea. The building grows from the cliff with the same concrete vocabulary as the museum below it, creating a continuity between the hotel and the cultural complex. The relationship between the guest rooms and the specific sea views they frame was carefully considered in the design of each window. Staying in the building is itself a structured spatial experience rather than merely accommodation.",d:"Each hotel room window is positioned and proportioned to frame a specific view of the Inland Sea, so guests experience the landscape as a series of composed pictures rather than a panorama.",lat:34.4614,lng:133.9977},
  {n:"Water Temple",c:"Awaji",co:"Japan",y:1991,ar:"Tadao Ando",w:"The Water Temple on Awaji Island is entered by descending through a lotus pond, the steps passing between the water plants to reveal a door at the base of the pool. The underground temple below is oval in plan with red walls, entirely different in character from Ando's usual concrete palette. The approach — the lotus plants overhead, the water level at face height — is designed as a purification sequence that prepares visitors for the space below. It is among Ando's most theatrical spatial experiences.",d:"Entry to the temple is through a staircase that descends through the centre of a lotus pond, passing below the water surface level so that arriving visitors are surrounded by water plants at eye height before reaching the door below.",lat:34.4494,lng:134.8694},
  {n:"Sendai Mediatheque",c:"Sendai",co:"Japan",y:2001,ar:"Toyo Ito",w:"The Sendai Mediatheque uses a structural system of thirteen bundled tube columns that pass through all seven floors, carrying the loads and housing the mechanical systems. The tube columns are not identical — they vary in size and density of their internal lattice structure — and they can be read as a forest of trees or kelp fronds through the transparent facades. The building was conceived as a critique of the conventional separation between library, gallery, and media centre, proposing a single undivided floor plate used by all simultaneously. It survived the 2011 earthquake with minimal damage.",d:"Each of the thirteen tube columns is a different diameter and internal density, so no two carry loads the same way and the structural system has the irregularity of a natural formation rather than an engineered grid.",lat:38.2682,lng:140.8694},
  {n:"Serpentine Pavilion",c:"London",co:"United Kingdom",y:2002,ar:"Toyo Ito",w:"Ito's Serpentine Pavilion used a structural algorithm to generate a pattern of intersecting lines that was then extruded as a structural steel frame, the resulting geometry neither regular grid nor arbitrary pattern. The pavilion was the first to use a computationally generated structural system at this scale. Cecil Balmond of Arup was the structural engineer.",d:"The structural pattern is generated by an algorithm that projects a cube and tetrahedron onto a plane, creating a geometry that is mathematically determined but visually appears as informal improvisation.",lat:51.5074,lng:-0.1278},
  {n:"Tama Art University Library",c:"Tokyo",co:"Japan",y:2007,ar:"Toyo Ito",w:"The library uses a series of parabolic arches of varying span to create a continuous undulating roof over the reading spaces, the arches springing from circular piers that are themselves openings in a lower reading level. The structural system allows the arches to be different spans, responding to the different programmatic needs below each vault, while maintaining a visual unity across the long floor plates. The circulation ramps that connect the two levels are integrated into the arch structure. The building demonstrates Ito's interest in structures that respond to use rather than applying a universal grid.",d:"The parabolic arches vary in span across the building's length, creating reading rooms of different heights and widths beneath a continuous curved ceiling that makes each study zone feel distinct.",lat:35.6762,lng:139.6503},
  {n:"Tower of Winds",c:"Yokohama",co:"Japan",y:1986,ar:"Toyo Ito",w:"The Tower of Winds is an aluminum cylinder enclosing an existing water tower and air conditioning exhaust stack, its surface covered with rings of lights that respond to wind speed, ambient noise levels, and the time of day. The building exists primarily as an information display rather than an enclosed space, making visible the invisible data of the environment that surrounds it. Ito described it as a building that exists in time rather than space.",d:"The tower's 1300 lamps, 12 neon rings, and 30 floodlights respond in real time to wind speed, ambient sound levels, and the hour of day, so the building's appearance changes continuously and never repeats exactly.",lat:35.4437,lng:139.638},
  {n:"Pao Dwelling for Tokyo Nomad Women",c:"Tokyo",co:"Japan",y:1985,ar:"Toyo Ito",w:"The PAO installation proposed a new domestic type for the nomadic urban woman — a series of lightweight portable furniture objects that could be assembled in any available space rather than a fixed dwelling. Ito's interest in the temporary and the provisional found expression in an exhibition installation that questioned the assumptions of permanent residential architecture.",d:"The installation consists of three pieces of lightweight furniture — a dressing table, a work table, and a leisure unit — each independently mobile so that home is redefined as the arrangement of objects rather than the enclosure of space.",lat:35.6762,lng:139.6503},
  {n:"Silver Hut",c:"Tokyo",co:"Japan",y:1984,ar:"Toyo Ito",w:"Ito built his own house as a series of lightweight vaulted roof structures over an open plan, with the vaults made of thin steel arches covered with perforated steel deck and fabric — a translation of the tent into an urban residential form. The house was designed for the changing conditions of Tokyo life, with an adaptable plan that could be reconfigured as the household changed. The Silver Hut was demolished when Ito sold the property, but its influence on a generation of Japanese architects was significant.",d:"The vaulted roof sections are covered with perforated steel deck over which transparent sheeting is laid, admitting diffuse light through the entire ceiling surface rather than through windows in the walls.",lat:35.6762,lng:139.6503},
  {n:"Nakatake Housing",c:"Oita",co:"Japan",y:1985,ar:"Toyo Ito",w:"The Nakatake Housing project is a small residential complex in which each unit is a simple shed-like form with a steel and corrugated profile roof, the units clustered in a way that creates semi-public outdoor spaces between them. Ito used industrial materials — corrugated steel, exposed concrete block — to produce housing that was honestly connected to the industrial landscape of the Japanese regional city rather than aspiring to a different aesthetic register. The project is among his most unpretentious works.",d:"The units use corrugated steel roofing — standard industrial material in Japan — as the architectural finish rather than a substrate for a more prestigious surface, treating the industrial aesthetic as appropriate rather than requiring disguise.",lat:33.2382,lng:131.6126},
  {n:"Taichung Metropolitan Opera",c:"Taichung",co:"Taiwan",y:2016,ar:"Toyo Ito",w:"The opera house uses a continuous surface of curved concrete cells — an endothelial structure — that forms walls, floors, and ceilings simultaneously, producing a building with no clear boundary between surfaces. The rehearsal spaces, theatre, and public areas are distributed through this continuous spatial matrix. Ito described the structural system as a cave, in contrast to the conventional box-and-column arrangement of most public buildings. The construction required the development of entirely new formwork techniques.",d:"The building has no conventional walls, floors, or ceilings as separate elements — instead a single continuous curved surface forms all of them, so the structural logic of one space is inseparable from the structural logic of the adjacent one.",lat:24.1477,lng:120.6736},
  {n:"White U House",c:"Tokyo",co:"Japan",y:1976,ar:"Toyo Ito",w:"The White U was a house for Ito's recently widowed sister, organised as a U-shaped concrete corridor wrapped around an open court. The white concrete interior is entirely closed to the street, turning inward to the sky above the open court. The building was described by Ito as a house for healing, its introverted spatial logic appropriate to the period of grief. It was demolished in 1997 when the property was sold, and its loss is widely regretted.",d:"The U-shaped plan wraps entirely around a void courtyard open to the sky, so all the principal rooms face inward to the open court rather than outward to the street.",lat:35.6762,lng:139.6503},
  {n:"Kiasma Museum",c:"Helsinki",co:"Finland",y:1998,ar:"Steven Holl",w:"Kiasma — the name refers to the biological process of crossing — uses a curved and a linear volume that intersect at a specific angle to create interior spaces in which natural light enters from the north through the curved exterior wall and is reflected deeper into the galleries by angled ceiling planes. Holl designed the light conditions for each gallery individually, responding to the particular conditions of light in Helsinki. The building sits between the neoclassical Parliament and the railway station, mediating between very different urban contexts.",d:"The curved exterior wall of the main gallery volume is a precise parabolic section that reflects northern light deep into the galleries, giving each floor a different light quality calibrated to the angle of the sun at Helsinki's latitude.",lat:60.1699,lng:24.9384},
  {n:"Chapel of St. Ignatius",c:"Seattle",co:"United States",y:1997,ar:"Steven Holl",w:"The chapel for Seattle University uses seven different sources of natural light, each serving a different part of the programme — entry, altar, side chapel, reconciliation room — coloured by different lenses that give each space its own quality of illumination. Holl described the building as seven bottles of light in a stone box. The building is small but spatially complex, using the manipulation of light as the architectural means of differentiating sacred uses from one another.",d:"Seven distinct light sources, each differently coloured and positioned, illuminate the different parts of the programme so that moving from one space to another is also moving from one quality of light to an entirely different one.",lat:47.6062,lng:-122.3321},
  {n:"Simmons Hall",c:"Cambridge",co:"United States",y:2002,ar:"Steven Holl",w:"The MIT undergraduate dormitory uses a porous concrete block facade with windows of different sizes that respond to the internal programme — large windows for social spaces, medium for bedrooms, small for bathrooms. The building is designed as a sponge, with large voids cut through it at certain levels to admit light and air to the interior courtyards. The concrete surface reads as a field of openings rather than a conventional facade, the pattern generated by use rather than composition.",d:"Ten large openings cut through the building's mass — some the size of several rooms — allow daylight and views to pass through the building rather than being deflected by it, making the dormitory porous rather than monolithic.",lat:42.3736,lng:-71.1097},
  {n:"Linked Hybrid",c:"Beijing",co:"China",y:2009,ar:"Steven Holl",w:"The Linked Hybrid is a ring of eight towers connected at the twentieth floor by bridges that contain a hotel, cinemas, and a swimming pool, creating a community at altitude that is independent of the ground level. The towers use a geothermal heating and cooling system of 655 boreholes below the site. Holl was interested in the idea of a porous city within a city, where the public realm could exist at multiple levels simultaneously. The project is among the largest single-architect residential developments in China.",d:"The bridges connecting the towers at the twentieth floor contain public facilities — hotel, pool, cinema — creating a public realm at elevation that functions independently of the streets and podium below.",lat:39.9042,lng:116.4074},
  {n:"Bloch Building",c:"Kansas City",co:"United States",y:2007,ar:"Steven Holl",w:"The Bloch Building addition to the Nelson-Atkins Museum of Art uses a series of translucent glass lenses scattered across the existing sculpture garden, each lens admitting light to a specific gallery below grade and visible at night as glowing blocks across the lawn. The building exists primarily as a landscape intervention, its galleries underground and the presence of architecture expressed through the light-transmitting lenses. The relationship between the sculpture garden above and the gallery spaces below creates a new kind of museum experience.",d:"The translucent glass lenses that admit light to the underground galleries become luminous at night, so the museum's presence in the landscape changes completely between day and night.",lat:39.0997,lng:-94.5786},
  {n:"Cranbrook Institute of Science",c:"Bloomfield Hills",co:"United States",y:1998,ar:"Steven Holl",w:"The science museum addition at Cranbrook uses prismatic glass lenses that refract light into the exhibition spaces in ways that connect the quality of light to the subject matter of each gallery. The building is an extension to Eliel Saarinen's original campus and uses a deliberately different architectural language that acknowledges the existing fabric without competing with it.",d:"Prismatic glass baffles positioned in the skylights refract natural light into spectra on the gallery walls, connecting the quality of interior illumination directly to the scientific subjects displayed below.",lat:42.5837,lng:-83.2454},
  {n:"Higgins Hall",c:"New York City",co:"United States",y:2005,ar:"Steven Holl",w:"The Higgins Hall insertion at Pratt Institute in Brooklyn uses a translucent glass connector inserted between two existing Victorian brick buildings to create a new entry sequence and shared circulation zone. The glass volume is lit from within at night, making the junction between old and new the most visible element of the composition after dark.",d:"The glass connector between the two Victorian brick buildings is backlit at night, making the modern insertion glow between the dark masonry flanking it and reversing the visual hierarchy between old and new.",lat:40.7128,lng:-74.006},
  {n:"Planar House",c:"Paradise Valley",co:"United States",y:2005,ar:"Steven Holl",w:"The Planar House in the Arizona desert uses a series of horizontal planes — floor slabs that extend beyond the building's enclosure — to create outdoor rooms that are defined by the horizontal surfaces rather than by walls. The desert landscape becomes the primary spatial context within which the building's planes operate.",d:"The floor planes extend beyond the building's walls as cantilevered decks that reach into the desert landscape, creating outdoor rooms defined by horizontal planes rather than by enclosure on any side.",lat:33.5317,lng:-111.9428},
  {n:"Museum of the City",c:"Cassino",co:"Italy",y:2006,ar:"Steven Holl",w:"The museum uses a sequence of concrete volumes that step across the slope of a hillside, each containing different aspects of the town's history. Holl used the topography to create a promenade through the collection that moves visitors up through the landscape as well as through time.",d:"The museum volumes step up the hillside at irregular intervals, so the progression through the collection is simultaneously a movement through the building and an ascent of the slope.",lat:41.4894,lng:13.8297},
  {n:"Horizontal Skyscraper",c:"Shenzhen",co:"China",y:2009,ar:"Steven Holl",w:"The Horizontal Skyscraper in Shenzhen organises a large mixed-use programme as a series of long horizontal blocks connected by bridges at high level, proposing a horizontal urbanism as an alternative to the vertical tower typology that dominates Chinese commercial development. The connections between blocks at different levels create a three-dimensional circulation system through the building.",d:"The building connects multiple horizontal bars at different heights via skybridge links, creating a three-dimensional urban fabric at altitude that allows movement between programmes without descending to ground level.",lat:22.5431,lng:114.0579},
  {n:"Magney House",c:"Bingie Point",co:"Australia",y:1984,ar:"Glenn Murcutt",w:"The Magney House on the New South Wales coast uses a corrugated steel roof that follows the slope of the hillside to capture rainwater and admit diffuse north light through clerestory glazing. The building is entirely off-grid — collecting rainwater, using passive ventilation, and composting waste — not as an ideological gesture but as a practical response to its remote coastal site. Murcutt works alone, without an office, and visits his sites repeatedly before beginning design. The house demonstrates that sustainability and architectural quality are the same thing when both are taken seriously.",d:"The corrugated steel roof has a continuous gutter at the ridge that collects rainwater from both sides of the pitch, channelling it to storage tanks below the building and making water harvesting an architectural element of the roofline.",lat:-35.9167,lng:150.2167},
  {n:"Marika-Alderton House",c:"Yirrkala",co:"Australia",y:1994,ar:"Glenn Murcutt",w:"The house for an Aboriginal artist in Arnhem Land was designed in extended consultation with Banduk Marika and her family, and incorporates spatial and functional requirements from the Yolngu culture that fundamentally shaped the design. The house can be closed into a complete shell against the tropical cyclones of the region but opens completely in dry conditions, the screens folding out to make the boundary between inside and outside variable. The relationship between the fixed structure and the adjustable enclosure responds to both climate and cultural patterns of occupation.",d:"The entire perimeter of the house can be opened or closed using operable screens, so the building transforms from a closed cyclone-resistant shell to an almost entirely open pavilion depending on weather and use.",lat:-12.25,lng:136.8833},
  {n:"Simpson-Lee House",c:"Mount Wilson",co:"Australia",y:1994,ar:"Glenn Murcutt",w:"The house in the Blue Mountains uses a long thin plan that follows the contour of the rocky ridge, the building siting itself on the topography without excavating it. The corrugated steel roof rises and falls in section to admit north light at multiple positions, and the stone floor contains the thermal mass that moderates the extreme temperature swings of the mountain climate. Murcutt's attention to section — the way light, heat, and air move through a building — is consistent across all his work.",d:"The steel roof profile rises and falls at different points along the plan to admit north light specifically, rather than as a continuous form, so the building's silhouette records its energy logic.",lat:-33.7,lng:150.7333},
  {n:"Fletcher-Page House",c:"Kangaroo Valley",co:"Australia",y:1998,ar:"Glenn Murcutt",w:"The house in the Kangaroo Valley uses a split roof profile to admit high-level north light while excluding summer sun and admitting winter sun at a low angle. The two halves of the split roof each serve different zones of the house. Murcutt's section studies for this house were exhaustive — he calculated sun angles for every month and designed the roof geometry accordingly. The building is a precise instrument for managing the Australian climate.",d:"The split roof has a gap between its two halves calibrated to admit winter sun at the low angle needed for passive heating while excluding the higher summer sun, the gap acting as a light valve.",lat:-34.7333,lng:150.5167},
  {n:"Bowali Visitor Centre",c:"Jabiru",co:"Australia",y:1994,ar:"Glenn Murcutt & Troppo Architects",w:"The visitor centre for Kakadu National Park uses a curved corrugated steel roof that references the curved bark shelters of the Bininj people whose country the park occupies, without attempting to reproduce them literally. The building sits lightly on its rocky site without disturbing the topography, and the open pavilion structure allows air to move freely beneath and through the roof. The collaboration between Murcutt's formal discipline and Troppo Architects' experience of tropical building produced a building that is genuinely responsive to its context.",d:"The curved steel roof rises away from the ground at its edges like a bark shelter lifted by the wind, allowing air to flow beneath and through the building without mechanical assistance.",lat:-12.6667,lng:132.8333},
  {n:"Arthur and Yvonne Boyd Education Centre",c:"Riversdale",co:"Australia",y:1999,ar:"Glenn Murcutt",w:"The residential educational centre on the Shoalhaven River was designed in consultation with the Boyd family and uses a long thin plan that maximises natural ventilation and river views for the dormitory rooms. The building sits on concrete piers above the flood plain, acknowledging the river's periodic inundation rather than excluding it. The corrugated steel forms and the timber details have the quality of vernacular building refined rather than abandoned. The centre has been used continuously since its completion for education programmes in the arts.",d:"The building is elevated on concrete piers above the flood plain level, allowing the river's periodic flooding to pass beneath the building without affecting its occupation.",lat:-37.8833,lng:145.2167},
  {n:"Fredericks-White House",c:"Jamberoo",co:"Australia",y:1982,ar:"Glenn Murcutt",w:"The house in the Jamberoo valley uses a corrugated steel roof that spans between the building's ends without intermediate support, allowing the long thin plan to open completely to the east through a continuous glass wall facing the valley. The structural simplicity of the spanning roof allowed the walls to be non-loadbearing and therefore fully glazable.",d:"The roof spans the entire length of the house as a single uninterrupted structure, so the east wall facing the valley view can be entirely glass from floor to roof without any structural interruption.",lat:-34.65,lng:150.7667},
  {n:"Neues Museum",c:"Berlin",co:"Germany",y:2009,ar:"David Chipperfield",w:"Chipperfield's rebuilding of the bomb-damaged Neues Museum used a principle of completing the existing fabric with new construction that makes no pretence of being old but is calibrated carefully to the existing materials and proportions. The missing rooms are filled with plain concrete or brick walls that carry the traces of the original fabric — ghost impressions of destroyed columns and cornices — rather than being replicated in historical form. The north staircase that was destroyed was rebuilt as a simple concrete form that occupies the same space and serves the same function without reproducing the original ornament. The building proposes that ruins can be inhabited without either falsification or abandonment.",d:"The missing north staircase was rebuilt in plain concrete that replicates the spatial volume and proportions of the original but has no ornamental surface, making the building simultaneously complete and damaged.",lat:52.52,lng:13.405},
  {n:"Hepworth Wakefield",c:"Wakefield",co:"United Kingdom",y:2011,ar:"David Chipperfield",w:"The Hepworth is a cluster of trapezoidal volumes beside the River Calder in the post-industrial centre of Wakefield, its irregular roof profile generating galleries of different heights and lighting conditions suited to different scales of work. The building uses concrete with a warm aggregate that responds to the industrial character of the surrounding warehouses and mills. Each gallery is top-lit through ceiling openings that admit consistent, diffuse northern light. The building has been credited with being a catalyst for regeneration in an economically depressed town centre.",d:"The trapezoidal volumes are angled so that no two galleries have the same roof profile, creating a cluster of roof forms that reads as a group of related buildings rather than a single institution.",lat:53.683,lng:-1.4977},
  {n:"Anchorage Museum",c:"Anchorage",co:"United States",y:2009,ar:"David Chipperfield",w:"The museum expansion uses a large glass canopy to create a winter garden that serves as the public entrance to the museum, providing an indoor public space in a city where extreme cold makes outdoor public space unusable for much of the year. The galleries are arranged around the winter garden, making it the spatial heart of the museum rather than a transitional lobby. Chipperfield's response to the Alaskan climate produced a building type specific to its location.",d:"The glass-roofed winter garden at the museum's heart is designed as a year-round public room in a city where outdoor gathering is impossible for months at a time due to extreme cold.",lat:61.2181,lng:-149.9003},
  {n:"San Michele Cemetery Extension",c:"Venice",co:"Italy",y:1998,ar:"David Chipperfield",w:"Chipperfield designed an extension to the cemetery island of San Michele, the historic burial place of Venice, adding new burial courts and facilities to the western end of the island. The new courts use plain white concrete walls to create enclosed spaces of great serenity that are consistent with the scale and atmosphere of the existing cemetery without imitating its historical language. The geometry of the new courts was carefully calibrated against the footprint of the existing buildings across the water.",d:"The new burial courts are entirely enclosed by plain concrete walls that frame views of the sky above, creating spaces of defined geometry and complete serenity that belong visually to the island's white walls.",lat:45.4408,lng:12.3155},
  {n:"Figge Art Museum",c:"Davenport",co:"United States",y:2005,ar:"David Chipperfield",w:"The Figge Art Museum on the Iowa bank of the Mississippi River uses a glass box raised on a podium to create a building that can be seen from across the river and reads as a transparent pavilion in the landscape. The interior uses a simple column grid and flexible gallery arrangements. Chipperfield treated the river context as the building's primary reference, orienting all the principal spaces toward the water. The building demonstrates that a straightforward functional programme handled with spatial intelligence can produce architecture of quality in a modest regional city.",d:"The entire building is lifted on a podium that raises the gallery floors above the Mississippi's flood level, making the elevation both a practical response to the river and a compositional decision that gives the building prominence on the waterfront.",lat:41.5236,lng:-90.5776},
  {n:"Kulturforum Hotel",c:"Berlin",co:"Germany",y:2014,ar:"David Chipperfield",w:"The hotel at the Berlin Kulturforum uses a calm orthogonal form clad in travertine to create a building that completes the urban edge of the cultural forum without competing with the Philharmonie, Neue Nationalgalerie, and Staatsbibliothek that surround it. Chipperfield treated contextual restraint as the primary architectural value.",d:"The travertine cladding uses the same material as many of the surrounding cultural buildings, connecting the new hotel to the existing forum without imitating any specific building's architectural language.",lat:52.52,lng:13.405},
  {n:"Gotoh Museum",c:"Chiba",co:"Japan",y:1991,ar:"David Chipperfield",w:"The small museum for the Gotoh art collection uses a simple rectangular plan with carefully proportioned rooms and consistent natural light from skylights. Chipperfield's interest in the spatial quality of the gallery rather than architectural spectacle produces a building in which the objects are primary and the architecture is their servant.",d:"The gallery rooms receive consistent diffuse light from skylights positioned to avoid direct sun at all angles throughout the year, creating conditions that make the collection the visual subject without the architecture competing for attention.",lat:35.6074,lng:140.1065},
  {n:"Joseph Shop",c:"London",co:"United Kingdom",y:1988,ar:"David Chipperfield",w:"The Joseph retail shop in London's Sloane Street was an early interior project for Chipperfield, using polished concrete, raw timber, and a restrained palette that established the aesthetic he would develop across his career. The shop's spatial quality was achieved through precise proportions and material selection rather than formal complexity.",d:"The raw concrete shelving and display units are cast with the same mix and finish as the walls, so products and architecture are presented in a single continuous material surface.",lat:51.5074,lng:-0.1278},
  {n:"Prada Aoyama",c:"Tokyo",co:"Japan",y:2003,ar:"Herzog & de Meuron",w:"The Prada building in Tokyo's Aoyama district uses a structural diamond grid of steel and glass that is simultaneously the structure, the facade, and the display system — the bulging and flat panels of the diamond grid create showcase volumes within the glass skin that allow products to be displayed within the wall itself. The faceted form reads differently from different approaches, always catching light at different angles. The structural grid is more complex than it appears, requiring careful engineering to maintain the grid geometry across the building's irregular profile.",d:"The alternating convex and flat diamond panels in the structural glass grid create lens-like bulges in the facade that function as display showcases, so the building's exterior surface is simultaneously structural, environmental, and retail display.",lat:35.6762,lng:139.6503},
  {n:"Ricola Storage Building",c:"Laufen",co:"Switzerland",y:1987,ar:"Herzog & de Meuron",w:"The herb storage building for the Swiss cough drop manufacturer is one of the simplest buildings Herzog and de Meuron have made, but its corrugated concrete panels — cast with a profile taken from industrial polycarbonate sheet — give it a material quality that the programme does not require. The building demonstrates the practice's consistent interest in finding the architectural potential in the material of the ordinary industrial building rather than elevating construction through expensive custom elements.",d:"The exterior walls are made of prefabricated concrete panels cast in the profile of industrial corrugated polycarbonate sheeting, giving a simple storage building the texture of an industrial material translated into a permanent one.",lat:47.4236,lng:7.5011},
  {n:"Signal Box Basel",c:"Basel",co:"Switzerland",y:1994,ar:"Herzog & de Meuron",w:"The railway signal box in Basel wraps a reinforced concrete structure in copper bands that function as electromagnetic shielding for the electronic switching equipment inside. The copper strips are twisted slightly where they pass the windows, allowing glimpses of the interior while maintaining the continuous surface logic. As the copper ages it will patinate unevenly in response to the specific microclimate of the railway yard. The building is a demonstration that a utilitarian infrastructure building can be treated as architecture without additional cost.",d:"The horizontal copper bands twist open slightly at the positions of the windows, admitting daylight and air while maintaining the continuity of the copper surface across the openings.",lat:47.5596,lng:7.5886},
  {n:"Antipodes Houses",c:"Grimentz",co:"Switzerland",y:1989,ar:"Herzog & de Meuron",w:"The two small holiday houses in the Valais Alps use larch timber construction in a deliberately primitive way, the boards rough-sawn and fixed without precision in a direct reference to the vernacular barn buildings of the valley. The buildings demonstrate the practice's early interest in finding architectural meaning in the most ordinary and local of building materials rather than in sophisticated construction. The houses are small enough that every detail is visible and every material decision reads clearly.",d:"The larch boards are fixed with visible nail heads at irregular spacing, making the construction method explicitly legible rather than concealed by precision or finish.",lat:46.1847,lng:7.5761},
  {n:"Dominus Winery",c:"Yountville",co:"United States",y:1998,ar:"Herzog & de Meuron",w:"The Napa Valley winery uses gabion walls — wire cages filled with local volcanic basalt — as the primary building material, the stone varying in density from section to section to provide different degrees of solar shading and visual transparency. The building is long and low, its gabion walls making it appear to grow from the valley floor. The wine-making process requires specific temperature conditions and the thermal mass of the stone fills the cages moderates the Californian temperature swings without mechanical assistance. The building appears entirely natural and is entirely engineered.",d:"The gabion wire cages are filled to different densities in different zones, with loosely packed stone admitting filtered light and tightly packed stone excluding it, so the wall's transparency varies along its length in response to the building's internal needs.",lat:38.4023,lng:-122.3628},
  {n:"Rémy Zaugg Studio",c:"Mulhouse",co:"France",y:1996,ar:"Herzog & de Meuron",w:"The studio for the Swiss artist Rémy Zaugg was designed in close collaboration with Zaugg himself, who was interested in the phenomenology of perception and wanted a working space that would test the relationship between light, surface, and the act of looking. The building uses concrete walls and carefully positioned openings to create a working environment of specific light quality.",d:"The studio walls are cast concrete with a surface finish calibrated to reflect the same quality of diffuse light as an unprimed canvas, making the studio itself an instrument for studying the act of visual perception.",lat:47.75,lng:7.3333},
  {n:"Schaulager",c:"Basel",co:"Switzerland",y:2003,ar:"Herzog & de Meuron",w:"The Schaulager is an art storage facility that is intermittently open to the public, a building type that had never previously been architecturally designed. The large undulating wall of rammed earth colour concrete sits in a suburban Basel neighbourhood as a monolithic object, its walls irregular and its windows few. Inside the high-bay storage floors are large enough to contain full-scale installations without disassembly. The building proposes that the storage and display of contemporary art can occupy the same space.",d:"The concrete walls are cast with a pebbled aggregate finish that gives them the texture and colour of compressed earth, making the large suburban building read as a geological outcrop rather than a constructed object.",lat:47.5596,lng:7.5886},
  {n:"Vitrahaus",c:"Weil am Rhein",co:"Germany",y:2010,ar:"Herzog & de Meuron",w:"The Vitrahaus is the showroom building for the Vitra furniture company, and it is formed by stacking twelve house-shaped volumes in a manner that produces a building whose profile, when viewed from any direction, resembles an accumulation of house gable ends. Each stacked volume contains display space for different product lines. The form is both conceptually simple — houses stacked — and spatially complex, with the intersections between volumes creating unexpected interior geometries. It demonstrates that formal wit and spatial intelligence can coexist.",d:"The twelve stacked volumes are rotated slightly from one another as they rise, so no two gables align and the building presents a different silhouette of stacked house forms from every approach direction.",lat:47.5939,lng:7.6211},
  {n:"Rudin House",c:"Leymen",co:"France",y:1997,ar:"Herzog & de Meuron",w:"The Rudin House near Basel is a near-perfect abstraction of a house — gabled roof, symmetrical facade, chimneys — lifted off the ground on concrete legs so that the ground floor is entirely open. The building appears to be a child's drawing of a house made real, its familiar form made strange by the elevation and the white concrete finish that gives it no material connection to any particular building tradition. The ground floor is a concrete platform that frames the landscape beneath the house.",d:"The building is elevated entirely off the ground on four concrete legs so that the house sits above an open ground floor, making the familiar gabled form strange by removing it from its expected relationship with the earth.",lat:47.4833,lng:7.4833},
  {n:"Blue House",c:"Oberwil",co:"Switzerland",y:1980,ar:"Herzog & de Meuron",w:"The Blue House is among the practice's earliest works and shows an interest in the direct use of colour as an architectural strategy that they would explore across many subsequent buildings. The suburban house is painted a deep blue throughout — walls, roof, gutters — so that it reads as a monolithic object rather than a building assembled from separate architectural elements. The uniformity of colour suppresses the reading of individual components and makes the house legible as a single geometric form in the landscape.",d:"The entire building is painted a single shade of deep blue — walls, roof, and all trim elements — suppressing the normal distinction between components and making the house read as a single coloured object.",lat:47.5117,lng:7.5611},
  {n:"Vitra Design Museum",c:"Weil am Rhein",co:"Germany",y:1989,ar:"Frank Gehry",w:"The Vitra Design Museum was Gehry's first European building and his first project to use the fragmented, colliding volumes that would become his signature. The building is deliberately complex from any single viewpoint, its white plaster volumes slipping and colliding around a central exhibition hall. Gehry described the design as a series of fragments that assembled themselves around the programme rather than a unified form imposed on it. The museum sits on the Vitra campus alongside buildings by Hadid, Piano, Ando, and Chipperfield, making the campus an open-air survey of contemporary architecture.",d:"No two windows in the building are of the same size or orientation, each positioned in response to the specific conditions of the fragment it occupies rather than any compositional grid.",lat:47.5939,lng:7.6211},
  {n:"Frederick Weisman Museum",c:"Minneapolis",co:"United States",y:1993,ar:"Frank Gehry",w:"The Weisman is Gehry's first major museum in the United States, and its stainless steel facade facing the Mississippi River creates a reflective surface that changes colour with the sky and seasons. The interior gallery spaces are more conventional than the exterior suggests — regular orthogonal rooms with skylights — making the building a case of exuberant external expression combined with functionally straightforward interior planning. The building was built on a limited budget and demonstrated that Gehry's formal language could be achieved without the titanium cladding of his later work.",d:"The stainless steel panels are curved in two directions rather than one, so the reflections they produce are distorted and constantly changing rather than the simple sky mirrors of flat metal facades.",lat:44.9778,lng:-93.265},
  {n:"Winton Guest House",c:"Wayzata",co:"United States",y:1987,ar:"Frank Gehry",w:"The guest house for the Winton family is a cluster of volumes — a cone, a cube, a cylinder, a shed — each clad in a different material and housing a different function, assembled around a central fireplace. The building is simultaneously a study in the juxtaposition of geometries and a demonstration that a house can be composed of fragments rather than unified as a single form. It sits beside Philip Johnson's main house, creating an intentional dialogue between two very different architectural approaches.",d:"Each volume of the house is clad in a different material — Finnish plywood, brick, painted metal, galvanised steel — so the building reads as a collection of objects rather than a unified composition.",lat:44.9749,lng:-93.5105},
  {n:"Gehry House",c:"Santa Monica",co:"United States",y:1978,ar:"Frank Gehry",w:"Gehry's renovation of a conventional Santa Monica bungalow used chain-link, corrugated steel, and raw timber to create a building that appeared deliberately unfinished, as if the construction process had been interrupted. The new elements deliberately expose and frame the old house, treating the existing building as an object within the new intervention. The house established Gehry's reputation for working with industrial materials in a way that challenged assumptions about what domestic architecture should look like.",d:"The new construction materials — chain-link fence, corrugated steel, rough framing lumber — are left in their raw industrial state without any finishing treatment, so the additions appear to be permanent rather than awaiting completion.",lat:34.0195,lng:-118.4912},
  {n:"Edgemar Development",c:"Santa Monica",co:"United States",y:1988,ar:"Frank Gehry",w:"The Edgemar mixed-use development in Santa Monica uses a series of towers and buildings of different heights clustered around a public courtyard to create an urban village in what had previously been a conventional shopping strip. The formal complexity is controlled by the limitation to white plaster and copper surfaces, so the building fragments read as variations on a palette rather than arbitrary collisions. The project shows Gehry's interest in creating urban public space rather than a single object building.",d:"The building fragments around the central courtyard are all clad in white plaster or copper, so the formal complexity of the massing is moderated by a coherent surface palette that unifies the cluster.",lat:34.0195,lng:-118.4912},
  {n:"Norton House",c:"Venice",co:"United States",y:1984,ar:"Frank Gehry",w:"The house for a writer and a screenwriter is organised around the different working and domestic requirements of two people, with the study for one resident elevated as a small lifeguard tower above the main house to provide isolation and a view of the Pacific. The tower element is the most memorable feature of the building, visible from the Venice boardwalk as a small yellow cabin perched above the roofline. The building's informality and its relationship to the beach culture of Venice is entirely intentional.",d:"A small yellow wooden study tower is elevated above the main house on a separate structure, giving the writer a detached private workspace with ocean views while maintaining its independence from the domestic life below.",lat:33.985,lng:-118.4695},
  {n:"Wosk Residence",c:"Beverly Hills",co:"United States",y:1982,ar:"Frank Gehry",w:"The Wosk Residence is a domestic interior renovation in Beverly Hills in which Gehry used a series of different ceiling treatments — a copper gazebo, a playful architectural canopy — to differentiate the rooms of a conventional apartment plan. The project shows his interest in the interior as an architectural subject independent of the building envelope.",d:"Each principal room has a different ceiling treatment — one a copper gazebo, one a painted sky — making the apartment a sequence of entirely different spatial characters within a single floor plan.",lat:34.0736,lng:-118.4004},
  {n:"Ray & Maria Stata Center",c:"Cambridge",co:"United States",y:2004,ar:"Frank Gehry",w:"The Stata Center at MIT uses Gehry's characteristic colliding volumes to create a building that houses the computer science and linguistics departments in a complex of towers, auditoria, and connecting volumes. The building has been controversial for its maintenance issues — the complex geometry produced roofs and facades that leaked — but its spatial quality and the vitality of its public spaces have been consistently appreciated.",d:"The building's collision of volumes creates a pedestrian street at ground level between and beneath the towers, so the building's public spaces are as much outdoor as indoor — a village square rather than a lobby.",lat:42.3736,lng:-71.1097},
  {n:"ROLEX Learning Center",c:"Lausanne",co:"Switzerland",y:2010,ar:"SANAA",w:"The learning centre at EPFL is a single continuous floor plate that rises and falls across the site in a series of gentle hills, with the programme distributed across the undulating surface without walls separating different areas. The curving floor creates informal spatial zones without enclosing them, so study spaces, café, library, and meeting areas flow into one another in a continuous landscape of learning. The structural achievement of a floor slab that curves in two directions was substantial.",d:"The entire building is a single undivided floor that curves up and down in both directions, creating spatial variation without walls, so that the functional zones are defined entirely by floor level and proximity rather than enclosure.",lat:46.5197,lng:6.6323},
  {n:"Toledo Museum Glass Pavilion",c:"Toledo",co:"United States",y:2006,ar:"SANAA",w:"The Glass Pavilion uses a double-skin of curved glass walls to create interior rooms that are visible one through another across the building, making the collection of glass visible from outside the building through multiple layers of transparency. The structural system required the development of custom glass connections that would allow the large curved glass sheets to stand without conventional frames. The building is simultaneously a demonstration of glass technology and a container for glass objects.",d:"The double-skin glass construction creates a series of rooms visible through one another from outside the building, so visitors can see the glass collection through multiple curved transparent layers before entering.",lat:41.6639,lng:-83.5552},
  {n:"Zollverein School",c:"Essen",co:"Germany",y:2006,ar:"SANAA",w:"The design school at the UNESCO-listed Zollverein coal mining complex uses a simple cube of concrete perforated by windows of various sizes scattered without apparent pattern across the facades. The building sits beside the landmark industrial structures of the colliery and deliberately refuses to compete with them, proposing a calm neutrality rather than architectural drama. The interior arranges studios, workshops, and offices around an internal courtyard that provides natural light to the perimeter spaces.",d:"The windows are distributed across all four facades without any regular grid or compositional pattern, so the building's openings appear random from a distance while each responds individually to the room behind it.",lat:51.4508,lng:7.0131},
  {n:"New Museum",c:"New York City",co:"United States",y:2007,ar:"SANAA",w:"The New Museum is a stack of seven displaced boxes that produces a building with no single floor plate aligned with any other, giving each level a different terrace and a different relationship to the Bowery street below. The aluminium mesh skin wraps each box to create a unified surface despite the displacement of the volumes. The building inserted a new cultural institution into the Bowery at a moment of rapid neighbourhood change and is now widely credited with catalysing the transformation of the surrounding area.",d:"The seven stacked boxes are each offset slightly from the one below, creating cantilevered terraces on different sides at different levels that allow outdoor space at each floor of the gallery.",lat:40.7128,lng:-74.006},
  {n:"Grace Farms",c:"New Canaan",co:"United States",y:2015,ar:"SANAA",w:"Grace Farms uses a single continuous roof that descends and ascends as it winds across the landscape, the building following the topography of the Connecticut woodland site as a ribbon that is simultaneously a path and a series of rooms. Different programmatic elements — chapel, library, sports hall, gathering space — are housed under different sections of the ribbon, identifiable by the roof height rather than by separate building forms. The building appears to be part of the landscape rather than placed on it.",d:"The entire building is a single curved roof that winds across the site touching the ground at intervals, with the programme housed in the spaces between the roof and the ground that vary in height and character along its length.",lat:41.1454,lng:-73.4937},
  {n:"House in a Plum Grove",c:"Tokyo",co:"Japan",y:2003,ar:"SANAA",w:"The house in central Tokyo uses a series of rooms of different sizes, each enclosed by thin concrete walls with no alignment between them, so the plan has the spatial organisation of a forest glade rather than a building. Corridors exist as spaces between the rooms rather than as separate routes. The house demonstrates SANAA's interest in spatial ambiguity and the absence of hierarchy between different uses.",d:"The rooms are positioned without alignment or adjacency logic so that the spaces between them are as significant as the rooms themselves, making corridors and rooms spatially equivalent.",lat:35.6762,lng:139.6503},
  {n:"Moriyama House",c:"Tokyo",co:"Japan",y:2005,ar:"SANAA",w:"The Moriyama House divides a residential programme into ten separate small volumes scattered across a site, each volume a different size and containing a different function — bedroom, bath, kitchen, living — with the connections between them being the outdoor spaces of the small garden. The owner occupies the principal volumes and rents out the remaining units to tenants who share the garden. The project proposes a model of urban living in which shared outdoor space and spatial independence coexist.",d:"The ten separate volumes are connected only by the outdoor garden paths between them, so moving from bedroom to kitchen requires going outside regardless of weather, treating the garden as a shared interior.",lat:35.6762,lng:139.6503},
  {n:"Small House",c:"Tokyo",co:"Japan",y:2000,ar:"Kazuyo Sejima",w:"The house occupies a tiny urban site in Tokyo with a plan of interlocking spiralling spaces that share no common wall between adjacent rooms, creating a spatial sequence that moves through the house without ever retracing its path. The plan is a continuous circuit. The structural walls are positioned to allow this continuous circulation while supporting the floors above. Sejima's interest in circulation as a spatial generator rather than a residual element is clearly demonstrated.",d:"The plan is a continuous loop without any dead ends, so it is possible to walk through the entire house in a circuit without retracing any path, making circulation the architectural subject of the design.",lat:35.6762,lng:139.6503},
  {n:"Weekend House",c:"Japan",co:"Japan",y:1998,ar:"SANAA",w:"The Weekend House explores the idea of a house as a series of rooms with no prescribed relationships between them, each room in a separate structure so that connections are made through the outside rather than through internal corridors. The programme is distributed across multiple small buildings in a garden, with movement between cooking, sleeping, and living requiring passage through the exterior space.",d:"The house is distributed across multiple small buildings in a garden, with no covered connections between them, so all movement between living, sleeping, and cooking requires going outside.",lat:36.2048,lng:138.2529},
  {n:"Stadstheater Almere",c:"Almere",co:"Netherlands",y:2007,ar:"SANAA",w:"The theatre in Almere uses a glass envelope that wraps continuously around multiple auditoria and public spaces, making the theatre's internal organisation visible from outside as volumes of different sizes and shapes within the transparent skin. The building treats theatrical programme as an urban spectacle visible to the surrounding public spaces.",d:"The different auditoria within the building are visible as separate volumes through the transparent glass envelope, making the building's programme readable from the outside as a spatial diagram.",lat:52.3508,lng:5.2647},
  {n:"Haas Haus",c:"Vienna",co:"Austria",y:1990,ar:"Hans Hollein",w:"The Haas Haus opposite St. Stephen's Cathedral uses a curved glass tower to reflect the cathedral's facade in its surface, turning the contemporary building into a mirror for the historic city rather than competing with it. The polished stone base and the glass cylinder above represent two architectural registers that Hollein combined without apology. The building was controversial at its completion for its proximity to the cathedral.",d:"The curved glass facade of the tower reflects the facade of St. Stephen's Cathedral in a distorted mirror image, so the contemporary building makes the medieval one its primary content.",lat:48.2082,lng:16.3738},
  {n:"Museum Abteiberg",c:"Monchengladbach",co:"Germany",y:1982,ar:"Hans Hollein",w:"The Abteiberg Museum uses a landscape of interlocking buildings at different heights to create a connection between the town centre above and the park below, with the museum occupying the slope between them. The collection is distributed across several connected levels that move through different spatial conditions — compressed, expanded, top-lit, side-lit. Hollein was interested in the museum as a spatial experience rather than merely a container for objects, and the Abteiberg rewards multiple visits.",d:"The museum connects the town centre plateau to the park below via a sequence of terraces and passages that double as exhibition space, so moving through the collection is also moving through the town's topography.",lat:51.1966,lng:6.4361},
  {n:"Österreichisches Museum für Angewandte Kunst",c:"Vienna",co:"Austria",y:1993,ar:"Hans Hollein",w:"Hollein's renovation of the MAK in Vienna used a system in which each gallery was redesigned by a different contemporary artist, creating an exhibition of design objects within spaces that were themselves works of art. The intervention treated the museum's permanent collection as material for an ongoing conceptual project rather than objects to be neutrally displayed.",d:"Each gallery of the permanent collection was redesigned by a different contemporary artist, so the exhibition of historical objects is simultaneously an exhibition of contemporary spatial art.",lat:48.2082,lng:16.3738},
  {n:"Vulcania Museum",c:"Saint-Ours-les-Roches",co:"France",y:2002,ar:"Hans Hollein",w:"The museum of volcanology is sunk into the volcanic landscape of the Auvergne, with a cone emerging from the earth as the primary above-ground element. The underground galleries extend through the volcanic rock, using the existing geological material as the context for an exhibition about geological processes. Hollein treated the landscape as the architecture and the building as the means of revealing it.",d:"The primary exhibition space is below grade in chambers cut into the volcanic rock, with the geological material itself — the hardened lava flows — serving as the walls of the galleries.",lat:45.7667,lng:3.1667},
  {n:"Travel Agency Vienna",c:"Vienna",co:"Austria",y:1976,ar:"Hans Hollein",w:"Hollein's travel agency interior used palm trees, tropical fish, a VW Beetle sliced in half, and fragments of a classical column to create an environment in which the experience of exotic travel was collaged into the act of booking a holiday. The interior was part of a series of small commercial spaces Hollein designed in Vienna in the 1960s and 70s that proposed an ironic and theatrical approach to retail architecture at a time when functionalism was still the dominant architectural ideology.",d:"A sliced section of a Volkswagen Beetle serves as a seating booth, treating the mass-produced automobile as a design object capable of being incorporated into an architectural interior without modification.",lat:48.2082,lng:16.3738},
  {n:"Schullin Jewellery Shop",c:"Vienna",co:"Austria",y:1974,ar:"Hans Hollein",w:"The tiny jewellery shop facade on the Graben uses a gold metal crack splitting through the marble to suggest a fault in the earth from which precious materials emerge. The entrance is through the crack, making the act of entering the shop metaphorically connected to the geological origin of the precious metals and stones sold within. The facade is among the most conceptually controlled commercial architectural moments of the 1970s.",d:"The entrance is positioned within a gold metal fissure that splits the marble facade, so customers enter the jewellery shop through a crack in the earth — a reference to the geological origins of the precious materials within.",lat:48.2082,lng:16.3738},
  {n:"Retti Candle Shop",c:"Vienna",co:"Austria",y:1965,ar:"Hans Hollein",w:"The Retti shop is a tiny facade in the first district of Vienna that Hollein clad entirely in aluminium, the reflective surface making the shop front appear to dissolve into the surrounding street by reflecting its image. The interior, glimpsed through a narrow entrance, appears endlessly deep through the mirrors that line it. The project demonstrated that a small commercial space could be a vehicle for genuine architectural invention.",d:"The aluminium-clad facade reflects the street around it rather than asserting its own surface, making the shop appear to withdraw from the urban scene rather than compete with the existing buildings.",lat:48.2082,lng:16.3738},
  {n:"Jewish Museum Vienna",c:"Vienna",co:"Austria",y:1996,ar:"Hans Hollein",w:"The Jewish Museum in Vienna uses the Palais Eskeles as its primary building, with Hollein's interventions concentrated in the design of the exhibition sequence. The ground-floor shop and the entrance sequence establish a contemporary architectural language that frames the historic fabric without altering it.",d:"The holographic installations in the permanent exhibition use light projections to make historical objects appear present in the gallery space while remaining physically absent, treating memory and presence as architectural conditions.",lat:48.2082,lng:16.3738},
  {n:"Graz Art Museum",c:"Graz",co:"Austria",y:2003,ar:"Peter Cook & Colin Fournier",w:"The Kunsthaus Graz uses a biomorphic bubble of blue acrylic panels inserted into the historic city centre as its primary form, the building's organic profile contrasting deliberately with the baroque and Renaissance buildings around it. The facade contains a programmable display of nozzle-like elements called BIX that can display images on the building's surface at night, making the exterior a media screen.",d:"The exterior facade contains 930 individually controllable circular fluorescent lights that can display low-resolution images across the building's surface at night, making the architecture a programmable media display.",lat:47.0707,lng:15.4395},
  {n:"Baumschlager Eberle Housing",c:"Lochau",co:"Austria",y:2000,ar:"Baumschlager Eberle",w:"The housing in Lochau on Lake Constance uses a concrete construction with large sliding timber shutters that allow residents to adjust the relationship between interior and exterior continuously. The shutters are the primary architectural element, their positions recording the patterns of habitation across the building's facade. When closed, the building reads as a timber-clad mass; when open, as a glass and concrete structure.",d:"The large sliding timber shutters that cover the balconies and windows can be positioned independently by each resident, so the building's facade is constantly rearranged by the patterns of daily life within it.",lat:47.5333,lng:9.75},
  {n:"Wohnanlage Traviatagasse",c:"Vienna",co:"Austria",y:1994,ar:"Rüdiger Lainer",w:"The housing development in Vienna's Ottakring district uses a perimeter block organisation with a communal garden court and varied facade treatments that give each section of the block a distinct identity within a coherent overall ensemble. Lainer was interested in the relationship between urban form and social space in the Viennese housing tradition.",d:"The perimeter block creates an enclosed garden courtyard accessible only to residents, making the shared green space genuinely private to the building's community rather than semi-public.",lat:48.2082,lng:16.3738},
  {n:"Gasometer City",c:"Vienna",co:"Austria",y:2001,ar:"Jean Nouvel & Others",w:"The Vienna Gasometers were four identical cylindrical gas storage tanks converted to mixed-use development, with Jean Nouvel, Coop Himmelblau, Manfred Wehdorn, and Wilhelm Holzbauer each designing one cylinder. Nouvel's cylinder uses a new residential tower that fills the existing cylindrical shell while maintaining the interior volume as a public atrium. The project addressed the question of how industrial heritage could be reprogrammed for contemporary urban uses without erasure.",d:"Each of the four identical cylinders was converted by a different architect, so four radically different spatial approaches are contained within four visually identical exterior shells.",lat:48.2082,lng:16.3738},
  {n:"Thermal Bath Strümpfelbach",c:"Strümpfelbach",co:"Germany",y:1977,ar:"Peter Hübner",w:"The community baths in the small Baden-Württemberg village use a timber construction of considerable spatial inventiveness to create bathing facilities of quality disproportionate to the modest budget. Hübner was associated with a movement of participatory architecture in which the users of a building were involved in its design and construction. The building has the character of a community-built structure rather than a professional commission.",d:"The timber structure was assembled with direct participation from members of the community who would use the building, making the construction process itself a social event that preceded and shaped the spatial result.",lat:48.8369,lng:9.395},
  {n:"Werkbundsiedlung Vienna",c:"Vienna",co:"Austria",y:1932,ar:"Various",w:"The Vienna Werkbundsiedlung was the Austrian equivalent of the Stuttgart Weissenhof, gathering housing designs from prominent European and Austrian architects — including Josef Frank, Gerrit Rietveld, and Adolf Loos — on a single site. The houses demonstrated a wider range of approaches than the Stuttgart exhibition and reflected the diversity of European modernism in the early 1930s.",d:"The exhibition gathered seventy houses by thirty-two architects on a single site, making it possible to compare approaches to the same domestic programme across a range of national and formal traditions within a single walk.",lat:48.2082,lng:16.3738},
  {n:"Weissenhof Estate",c:"Stuttgart",co:"Germany",y:1927,ar:"Mies van der Rohe & Others",w:"The Weissenhof exhibition estate was the most concentrated demonstration of European modernism assembled in one place, with houses by Mies, Le Corbusier, Gropius, Oud, Scharoun, Taut, and others built as an exhibition of modern living. Mies's apartment block anchored the composition on the hillside, with the other buildings distributed below it. The exhibition attracted 500,000 visitors and established what modernism looked like to a wide public audience. Only a few of the buildings survive.",d:"Mies positioned his apartment block at the top of the Killesberg hill to anchor the overall composition, with all the other architects' buildings below it, making the spatial organisation of the exhibition itself an architectural argument.",lat:48.7758,lng:9.1829},
  {n:"Dammerstock Settlement",c:"Karlsruhe",co:"Germany",y:1929,ar:"Walter Gropius & Others",w:"The Dammerstock settlement was a social housing project organised around a strict north-south orientation for all blocks, ensuring every apartment received direct sunlight for at least part of each day. Gropius used the orientation principle as the generator of the urban layout, sacrificing conventional street alignments for a rational environmental logic. The project was one of the clearest demonstrations of the Zeilenbau housing principle — parallel slabs oriented for sunlight — that would influence public housing planning throughout the twentieth century.",d:"Every residential block is oriented exactly north-south without exception, so the street grid of the settlement is diagonal to the surrounding city in order to ensure direct sunlight to every apartment.",lat:49.0069,lng:8.4037},
  {n:"Törten Estate",c:"Dessau",co:"Germany",y:1928,ar:"Walter Gropius",w:"Gropius designed the Törten Estate as a demonstration of industrialised housing production, with a small crane on rails placing prefabricated concrete elements. The system required all houses to be built simultaneously along each strip as the crane advanced. The project was a genuine experiment in industrial housing methods though the quality of construction was criticised.",d:"The construction system required a travelling crane on rails to place prefabricated elements, so all the houses in each row had to be built simultaneously in sequence, making the production method visible in the spatial organisation of the estate.",lat:51.8333,lng:12.25},
