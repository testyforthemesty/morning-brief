<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#C8A96E; --gold-light:#e8d5a8;
    --bg:#F0EDE8; --surface:#FAFAF8;
    --border:rgba(0,0,0,0.08);
    --text:#1a1a1a; --text2:#666; --text3:#999;
    --green:#2E7D50; --red:#B03A2E;
    --sans:'DM Sans',system-ui,sans-serif;
    --serif:'EB Garamond',Georgia,serif;
  }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:15px 30px; background:var(--surface); border-bottom:1px solid var(--border); }
  .wordmark { font-family:var(--serif); font-size:19px; font-weight:600; }
  .topbar-right { display:flex; align-items:center; gap:18px; }
  .top-date { font-size:11px; font-weight:300; color:var(--text3); letter-spacing:0.07em; }
  .rdot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; }
  .rlabel { font-size:10px; color:var(--text3); }

  .main { display:grid; grid-template-columns:1fr 1fr; flex:1; }

  .arch-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:calc(100vh - 54px); overflow-y:auto; }
  .arch-inner { padding:32px 36px 36px; display:flex; flex-direction:column; flex:1; }
  .arch-eyebrow { font-size:9px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
  .arch-rule { width:40px; height:2px; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:1px; margin-bottom:16px; }
  .arch-building-name { font-family:var(--serif); font-size:28px; font-weight:600; line-height:1.1; color:var(--text); margin-bottom:6px; }
  .arch-meta { font-size:11px; font-weight:300; color:var(--text3); letter-spacing:0.03em; margin-bottom:20px; }
  .arch-meta span { margin:0 6px; color:var(--border); }
  .arch-images { margin-bottom:22px; display:flex; justify-content:center; }
  .arch-img-wrap { display:inline-flex; flex-direction:column; max-width:100%; }
  .arch-img-wrap img { max-width:100%; max-height:360px; width:auto; height:auto; object-fit:contain; border-radius:3px; display:block; }
  .arch-img-caption { font-size:9px; color:var(--text3); text-align:center; line-height:1.3; margin-top:5px; }
  .arch-body { font-family:var(--serif); font-size:16px; line-height:1.8; color:#333; margin-bottom:20px; }
  .arch-detail-label { font-size:9px; font-weight:600; color:var(--gold); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; }
  .arch-detail-text { font-family:var(--serif); font-style:italic; font-size:14.5px; line-height:1.7; color:#666; margin-bottom:24px; }
  .arch-footer { display:flex; align-items:center; justify-content:space-between; padding-top:16px; border-top:1px solid var(--border); }
  .arch-footer-label { font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; }
  .arch-maps-link { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; color:var(--gold); text-decoration:none; letter-spacing:0.02em; border:1.5px solid var(--gold-light); padding:6px 14px; border-radius:20px; }
  .arch-maps-link:hover { background:var(--gold); color:#fff; border-color:var(--gold); }
  .arch-placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px; text-align:center; gap:14px; }
  .arch-placeholder-title { font-family:var(--serif); font-size:26px; font-weight:600; line-height:1.15; color:var(--text); }
  .arch-placeholder-sub { font-size:12px; font-weight:300; color:var(--text3); max-width:260px; line-height:1.75; }
  .arch-loading { flex:1; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text3); font-style:italic; }

  .right-panel { display:flex; flex-direction:column; overflow-y:auto; font-size:1.15em; }
  .section { padding:16px 24px; border-bottom:1px solid var(--border); }
  .sec-label { font-size:10px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--text3); margin-bottom:11px; }

  .eq-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
  .eq-card { background:var(--surface); border:1px solid var(--border); border-radius:5px; padding:9px 10px; }
  .eq-sym { font-size:10px; font-weight:500; letter-spacing:0.07em; color:var(--text3); margin-bottom:3px; }
  .eq-price { font-size:17px; font-variant-numeric:tabular-nums; line-height:1; margin-bottom:5px; }
  .eq-changes { display:flex; gap:4px; flex-wrap:wrap; }
  .badge { font-size:11px; font-variant-numeric:tabular-nums; border-radius:3px; padding:2px 5px; display:inline-flex; align-items:center; gap:2px; }
  .badge-label { font-size:9px; opacity:0.65; margin-right:1px; }
  .up { color:var(--green); background:rgba(46,125,80,0.08); }
  .down { color:var(--red); background:rgba(176,58,46,0.08); }

  .two-col { display:grid; grid-template-columns:1fr 1fr; }
  .two-col .section:first-child { border-right:1px solid var(--border); }

  /* CRYPTO — no background on change cells */
  .crypto-tbl { width:100%; border-collapse:collapse; }
  .crypto-tbl th { font-size:9.5px; font-weight:500; letter-spacing:0.08em; color:var(--text3); text-transform:uppercase; padding:0 0 7px; text-align:right; }
  .crypto-tbl th:first-child { text-align:left; }
  .crypto-tbl td { font-size:12.5px; font-variant-numeric:tabular-nums; padding:5px 0; border-top:1px solid var(--border); text-align:right; vertical-align:middle; }
  .crypto-tbl td:first-child { text-align:left; font-size:12px; font-weight:500; }
  .cprice { font-weight:500; }
  .pct-up   { color:var(--green); }
  .pct-down { color:var(--red); }

  /* RATES */
  .rate-rows { display:flex; flex-direction:column; gap:6px; }
  .rate-row { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .rate-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .rate-name { font-size:12px; color:var(--text2); }
  .rate-val { font-size:16px; font-weight:500; font-variant-numeric:tabular-nums; }
  .rate-changes { display:flex; gap:4px; }
  .rate-asof { font-size:10.5px; color:var(--text3); margin-top:8px; }

  /* NEWS */
  .news-section { padding:16px 24px; flex:1; }
  .news-tabs { display:flex; gap:0; }
  .headlines-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; border-bottom:1px solid var(--border); padding-bottom:0; }
  .headlines-header .sec-label { margin-bottom:0; padding-bottom:11px; }
  .news-tab { font-size:13px; color:var(--text3); padding:5px 12px 8px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; background:none; border-top:none; border-left:none; border-right:none; }
  .news-tab.active { color:var(--text); border-bottom-color:var(--gold); font-weight:500; }
  .news-feed { display:none; flex-direction:column; }
  .news-feed.active { display:flex; }
  .news-item { padding:9px 0; border-bottom:1px solid var(--border); text-decoration:none; display:block; }
  .news-item:last-child { border-bottom:none; }
  .news-hed { font-family:var(--serif); font-size:16px; color:var(--text); line-height:1.4; margin-bottom:2px; }
  .news-meta { font-size:10.5px; color:var(--text3); }
  .news-item:hover .news-hed { color:var(--gold); }
  .news-ai-label { font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
  .news-spinner { font-size:11px; color:var(--text3); font-style:italic; padding:6px 0; }


  /* QUOTE BAR */
  .quote-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:13px 32px; display:flex; align-items:baseline; gap:14px; justify-content:center; text-align:center; }
  .quote-text { font-family:var(--serif); font-size:15px; font-style:italic; color:var(--text2); line-height:1.5; flex:1; }
  .quote-attr { font-size:10.5px; font-weight:500; color:var(--text3); letter-spacing:0.04em; white-space:nowrap; }
  .loading { font-size:11px; color:var(--text3); font-style:italic; padding:6px 0; }
  .err { font-size:11px; color:var(--red); padding:5px 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="wordmark">Morning Brief</div>
  <div class="topbar-right">
    <span class="top-date" id="top-date"></span>
    <span><span class="rdot"></span><span class="rlabel" id="rlabel">Loading…</span></span>
  </div>
</div>

<div class="quote-bar"><span class="quote-text" id="quote-text">Loading…</span><span class="quote-attr" id="quote-attr"></span></div>
<div class="main">
  <div class="arch-panel">
    <div id="arch-content" class="arch-inner">
      <div class="arch-loading">Loading today&#39;s building&#8230;</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="section">
      <div class="sec-label">Equities</div>
      <div class="eq-grid" id="eq-grid"><div class="loading">Loading…</div></div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="sec-label">Crypto</div>
        <table class="crypto-tbl">
          <thead><tr><th></th><th>1H</th><th>24H</th><th>30D</th><th>Price</th></tr></thead>
          <tbody id="crypto-body"><tr><td colspan="5" class="loading">Loading…</td></tr></tbody>
        </table>
      </div>
      <div class="section">
        <div class="sec-label">Rates</div>
        <div class="rate-rows" id="rate-rows"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <div class="news-section">
      <div class="headlines-header">
        <div class="sec-label">Headlines</div>
        <div class="news-tabs">
          <button class="news-tab active" onclick="tab('bloomberg')">Bloomberg</button>
          <button class="news-tab" onclick="tab('cnbc')">CNBC</button>
          <button class="news-tab" onclick="tab('ft')">FT</button>
        </div>
      </div>
      <div class="news-feed active" id="feed-bloomberg"><div class="loading">Loading…</div></div>
      <div class="news-feed" id="feed-cnbc"><div class="loading">Loading…</div></div>
      <div class="news-feed" id="feed-ft"><div class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<script>
const TD_KEY   = '0f57d90c0f8042b3b526a66545daaa62';

function fmtPrice(n) {
  n = parseFloat(n);
  if (n >= 1000) return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (n >= 1)    return n.toFixed(2);
  return n.toFixed(4);
}
function badge(pct, label) {
  pct = parseFloat(pct);
  const cls = pct >= 0 ? 'up' : 'down', sign = pct >= 0 ? '+' : '';
  return `<span class="badge ${cls}"><span class="badge-label">${label}</span>${sign}${pct.toFixed(2)}%</span>`;
}

function pctCell(p) {
  p = parseFloat(p);
  const cls = p >= 0 ? 'pct-up' : 'pct-down', sign = p >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${Math.abs(p).toFixed(2)}%</span>`;
}

function tick() {
  const now = new Date();
  document.getElementById('top-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase();
}
tick();
setInterval(tick, 60000);

// Twelve Data free plan: 8 API credits/min, 1 credit per symbol per request.
// Equities (8 symbols) and treasury indices (2 symbols) are split into separate
// fetches so neither batch exceeds the per-minute credit limit.
var _tdPromise = null;

function _tdMakeCache(key, ttl) {
  return {
    get() {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const { ts, data } = JSON.parse(raw);
        return Date.now() - ts > ttl ? null : data;
      } catch { return null; }
    },
    set(data) {
      try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
    }
  };
}

function _tdFetch(syms, cache) {
  return fetch(`https://api.twelvedata.com/time_series?symbol=${syms}&interval=1day&outputsize=32&apikey=${TD_KEY}`)
    .then(r => r.json())
    .then(data => {
      if (data.code || data.status === 'error') {
        const cached = cache.get();
        if (cached) return cached;
        throw new Error(data.message || 'API error');
      }
      cache.set(data);
      return data;
    })
    .catch(() => cache.get() || {});
}

const _tdEqCache = _tdMakeCache('mb_td_eq', 4 * 60 * 60 * 1000);
function getTDData() {
  if (_tdPromise) return _tdPromise;
  _tdPromise = _tdFetch('GOOGL,AMZN,AAPL,BRK.B,COIN,NVDA,QCOM,SPY', _tdEqCache);
  return _tdPromise;
}

// Treasury previous close via Vercel serverless proxy → FRED (Federal Reserve).
// Values in percent (4.35 = 4.35%). Cached 8hrs in localStorage.
var _treasuryPromise = null;

function getTreasuryPrev() {
  if (_treasuryPromise) return _treasuryPromise;
  const lsKey = 'mb_treasury_prev';
  try {
    const raw = localStorage.getItem(lsKey);
    if (raw) {
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts < 8 * 60 * 60 * 1000) {
        _treasuryPromise = Promise.resolve(data);
        return _treasuryPromise;
      }
    }
  } catch {}
  _treasuryPromise = fetch('/api/treasury')
    .then(r => r.json())
    .then(d => {
      if (d.dgs5 != null || d.dgs10 != null) {
        try { localStorage.setItem(lsKey, JSON.stringify({ ts: Date.now(), data: d })); } catch {}
      }
      return d;
    })
    .catch(() => ({}));
  return _treasuryPromise;
}

// EQUITIES
async function loadEquities() {
  const grid = document.getElementById('eq-grid');
  try {
    const data = await getTDData();
    if (data.code) throw new Error(data.message);
    const order = ['GOOGL','AMZN','AAPL','BRK.B','COIN','NVDA','QCOM','SPY'];
    grid.innerHTML = order.map(sym => {
      const d = data[sym];
      if (!d || d.status === 'error' || !d.values?.length)
        return `<div class="eq-card"><div class="eq-sym">${sym}</div><div class="eq-price">—</div></div>`;
      const vals   = d.values;
      const price  = parseFloat(vals[0].close);
      const prev   = parseFloat(vals[1]?.close ?? vals[0].close);
      const old30  = parseFloat(vals[vals.length - 1].close);
      const chg1d  = ((price - prev)  / prev)  * 100;
      const chg30d = ((price - old30) / old30) * 100;
      return `<div class="eq-card">
        <div class="eq-sym">${sym}</div>
        <div class="eq-price">$${fmtPrice(price)}</div>
        <div class="eq-changes">${badge(chg1d,'1D')}${badge(chg30d,'30D')}</div>
      </div>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = `<div class="err">Could not load equities.</div>`;
  }
}

// CRYPTO — CoinGecko markets, no background on change cells
async function loadCrypto() {
  const tbody = document.getElementById('crypto-body');
  const coins = [
    {id:'bitcoin',sym:'BTC'},{id:'ethereum',sym:'ETH'},{id:'solana',sym:'SOL'},
    {id:'dogecoin',sym:'DOGE'},{id:'hyperliquid',sym:'HYPE'}
  ];
  try {
    const ids = coins.map(c=>c.id).join(',');
    const res  = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&price_change_percentage=1h,24h,30d`);
    const data = await res.json();
    const map  = {};
    data.forEach(c => { map[c.id] = c; });
    tbody.innerHTML = coins.map(({id,sym}) => {
      const c = map[id]; if (!c) return '';
      const h1  = c.price_change_percentage_1h_in_currency  ?? 0;
      const h24 = c.price_change_percentage_24h_in_currency ?? 0;
      const d30 = c.price_change_percentage_30d_in_currency ?? 0;
      return `<tr>
        <td>${sym}</td>
        <td>${pctCell(h1)}</td>
        <td>${pctCell(h24)}</td>
        <td>${pctCell(d30)}</td>
        <td class="cprice">$${fmtPrice(c.current_price)}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5" class="err">Could not load crypto.</td></tr>`;
  }
}

// RATES — Pensford for live values; /api/treasury (FRED proxy) for 1D bps change
async function loadRates() {
  const rows = document.getElementById('rate-rows');
  try {
    const [pensText, tPrev] = await Promise.all([
      fetch('https://19621209.fs1.hubspotusercontent-na1.net/hubfs/19621209/quotes.xml').then(r => r.text()),
      getTreasuryPrev()
    ]);
    const parser = new DOMParser();
    const xml = parser.parseFromString(pensText, 'application/xml');
    const ts = xml.documentElement.getAttribute('timeStamp') || '';

    function getPensRecord(sym) {
      const records = xml.querySelectorAll('record');
      for (let i = 0; i < records.length; i++) {
        if (records[i].querySelector('symbol').textContent === sym) {
          return { val: parseFloat(records[i].querySelector('quote').textContent) * 100 };
        }
      }
      return null;
    }

    // FRED values are in percent (4.35 = 4.35%); Pensford val is also in %
    function fredBps(pensVal, fredPrev) {
      if (fredPrev == null) return null;
      return (pensVal - fredPrev) * 100;
    }

    const y5   = getPensRecord('TREASURY Y5');
    const y10  = getPensRecord('TREASURY Y10');
    const sofr = getPensRecord('SOFRTERM_M1');

    const rates = [
      { label: '5Y Treasury',  r: y5,   chg: y5  ? fredBps(y5.val,  tPrev.dgs5)  : null },
      { label: '10Y Treasury', r: y10,  chg: y10 ? fredBps(y10.val, tPrev.dgs10) : null },
      { label: '1M Term SOFR', r: sofr, chg: null }
    ];

    rows.innerHTML = rates.map(function({ label, r, chg }) {
      if (!r) return `<div class="rate-row"><div class="rate-top"><span class="rate-name">${label}</span><span class="rate-val">—</span></div></div>`;
      const cls  = (chg == null || chg >= 0) ? 'up' : 'down';
      const sign = (chg == null || chg >= 0) ? '+' : '';
      const chgHtml = chg != null
        ? `<div class="rate-changes"><span class="badge ${cls}"><span class="badge-label">1D</span>${sign}${chg.toFixed(1)}bps</span></div>`
        : '';
      return `<div class="rate-row">
        <div class="rate-top">
          <span class="rate-name">${label}</span>
          <span class="rate-val">${r.val.toFixed(2)}%</span>
        </div>
        ${chgHtml}
      </div>`;
    }).join('');

  } catch(e) {
    rows.innerHTML = '<div class="err">Could not load rates.</div>';
  }
}

// NEWS
const FEEDS = {
  bloomberg:   ['https://feeds.bloomberg.com/markets/news.rss',
                'https://feeds.bloomberg.com/politics/news.rss',
                'https://feeds.bloomberg.com/technology/news.rss'],
  cnbc:        ['https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664',
                'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=15839135'],
  ft:          ['https://www.ft.com/rss/home/uk']
};

async function loadFeed(key) {
  const el = document.getElementById('feed-' + key);
  try {
    const urls = FEEDS[key];
    const all = await Promise.all(urls.map(function(url) {
      return fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url) + '&_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) { return d.status === 'ok' ? d.items : []; })
        .catch(function() { return []; });
    }));
    const items = all.flat().sort(function(a, b) {
      return new Date(b.pubDate) - new Date(a.pubDate);
    }).slice(0, 4);
    if (!items.length) throw new Error('no items');
    el.innerHTML = items.map(function(item) {
      var ago = timeAgo(new Date(item.pubDate));
      return '<a class="news-item" href="' + item.link + '" target="_blank" rel="noopener">' +
        '<div class="news-hed">' + item.title + '</div>' +
        '<div class="news-meta">' + ago + '</div>' +
        '</a>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="err">Could not load feed.</div>';
  }
}

function timeAgo(d) {
  const m = Math.floor((Date.now() - d) / 60000);
  if (m < 60)   return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}
function tab(key) {
  document.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.news-feed').forEach(f => f.classList.remove('active'));
  document.querySelector(`[onclick="tab('${key}')"]`).classList.add('active');
  document.getElementById(`feed-${key}`).classList.add('active');
}



// DAILY QUOTE — fixed for the day, seeded by date, Claude API generates it
const QUOTES = [
  { text: "The secret of getting things done is to act.", attr: "Dante Alighieri" },
  { text: "The secret of all victory lies in the organisation of the non-obvious.", attr: "Marcus Aurelius" },
  { text: "He who has a great deal to put into them will make a day have a hundred pockets.", attr: "Friedrich Nietzsche" },
  { text: "A man's worth is no greater than his ambitions.", attr: "Marcus Aurelius" },
  { text: "The greatest wealth is to live content with little.", attr: "Plato" },
  { text: "It is not death that a man should fear, but he should fear never beginning to live.", attr: "Marcus Aurelius" },
  { text: "Fortune favours the prepared mind.", attr: "Louis Pasteur" },
  { text: "Doubt is the origin of wisdom.", attr: "René Descartes" },
  { text: "The purpose of human life is to serve, and to show compassion and the will to help others.", attr: "Albert Schweitzer" },
  { text: "The man who moves a mountain begins by carrying away small stones.", attr: "Confucius" },
  { text: "A leader is a dealer in hope.", attr: "Napoleon Bonaparte" },
  { text: "Impossible is a word found only in the dictionary of fools.", attr: "Napoleon Bonaparte" },
  { text: "The truest wisdom is a resolute determination.", attr: "Napoleon Bonaparte" },
  { text: "Never interrupt your enemy when he is making a mistake.", attr: "Napoleon Bonaparte" },
  { text: "In politics, stupidity is not a handicap.", attr: "Napoleon Bonaparte" },
  { text: "Courage is like love; it must have hope for nourishment.", attr: "Napoleon Bonaparte" },
  { text: "A soldier will fight long and hard for a bit of colored ribbon.", attr: "Napoleon Bonaparte" },
  { text: "The battlefield is a scene of constant chaos. The winner will be the one who controls that chaos, both his own and the enemy's.", attr: "Napoleon Bonaparte" },
  { text: "Victory belongs to the most persevering.", attr: "Napoleon Bonaparte" },
  { text: "If you want a thing done well, do it yourself.", attr: "Napoleon Bonaparte" },
  { text: "I came, I saw, I conquered.", attr: "Julius Caesar" },
  { text: "Experience is the teacher of all things.", attr: "Julius Caesar" },
  { text: "It is easier to find men who will volunteer to die than to find those who are willing to endure pain with patience.", attr: "Julius Caesar" },
  { text: "Which death is preferable to every other? The unexpected.", attr: "Julius Caesar" },
  { text: "Men in general are quick to believe that which they wish to be true.", attr: "Julius Caesar" },
  { text: "As a rule, men worry more about what they can't see than about what they can.", attr: "Julius Caesar" },
  { text: "No one is so brave that he is not disturbed by something unexpected.", attr: "Julius Caesar" },
  { text: "I love the name of honor more than I fear death.", attr: "Julius Caesar" },
  { text: "The impediment to action advances action. What stands in the way becomes the way.", attr: "Marcus Aurelius" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", attr: "Marcus Aurelius" },
  { text: "You have power over your mind, not outside events. Realize this, and you will find strength.", attr: "Marcus Aurelius" },
  { text: "The best revenge is to be unlike him who performed the injury.", attr: "Marcus Aurelius" },
  { text: "Accept the things to which fate binds you.", attr: "Marcus Aurelius" },
  { text: "The first rule is to keep an untroubled spirit. The second is to look things in the face and know them for what they are.", attr: "Marcus Aurelius" },
  { text: "If it is not right, do not do it; if it is not true, do not say it.", attr: "Marcus Aurelius" },
  { text: "He who lives in harmony with himself lives in harmony with the universe.", attr: "Marcus Aurelius" },
  { text: "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.", attr: "Marcus Aurelius" },
  { text: "The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane.", attr: "Marcus Aurelius" },
  { text: "Confine yourself to the present.", attr: "Marcus Aurelius" },
  { text: "When you wake up in the morning, tell yourself: the people I deal with today will be meddling, ungrateful, arrogant, dishonest, jealous and surly.", attr: "Marcus Aurelius" },
  { text: "Luck is what happens when preparation meets opportunity.", attr: "Seneca" },

  { text: "It is not that I am brave, it is that those who are cowardly are the bravest. They carry the heaviest load.", attr: "Seneca" },
  { text: "Revenge is not always sweet; once it is consummated we feel inferior to our victim.", attr: "Seneca" },
  { text: "Begin at once to live, and count each separate day as a separate life.", attr: "Seneca" },
  { text: "The whole future lies in uncertainty: live immediately.", attr: "Seneca" },
  { text: "We suffer more in imagination than in reality.", attr: "Seneca" },
  { text: "No person has the power to have everything they want, but it is in their power not to want what they don't have.", attr: "Seneca" },
  { text: "It is not the man who has too little, but the man who craves more, that is poor.", attr: "Seneca" },
  { text: "He who is brave is free.", attr: "Seneca" },
  { text: "Every new beginning comes from some other beginning's end.", attr: "Seneca" },
  { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", attr: "Aristotle" },
  { text: "The more you know, the more you know you don't know.", attr: "Aristotle" },
  { text: "Happiness depends upon ourselves.", attr: "Aristotle" },
  { text: "It is during our darkest moments that we must focus to see the light.", attr: "Aristotle" },
  { text: "Knowing yourself is the beginning of all wisdom.", attr: "Aristotle" },
  { text: "The roots of education are bitter, but the fruit is sweet.", attr: "Aristotle" },
  { text: "Quality is not an act; it is a habit.", attr: "Aristotle" },
  { text: "Hope is a waking dream.", attr: "Aristotle" },
  { text: "Those who know, do. Those that understand, teach.", attr: "Aristotle" },
  { text: "The aim of the wise is not to secure pleasure, but to avoid pain.", attr: "Aristotle" },
  { text: "Patience is bitter, but its fruit is sweet.", attr: "Aristotle" },
  { text: "Man is by nature a social animal.", attr: "Aristotle" },
  { text: "Opinion is the medium between knowledge and ignorance.", attr: "Plato" },
  { text: "The measure of a man is what he does with power.", attr: "Plato" },
  { text: "Courage is knowing what not to fear.", attr: "Plato" },
  { text: "Excellence is not a gift, but a skill that takes practice.", attr: "Plato" },
  { text: "At the touch of love, everyone becomes a poet.", attr: "Plato" },
  { text: "The beginning is the most important part of the work.", attr: "Plato" },
  { text: "Good people do not need laws to tell them to act responsibly, while bad people will find a way around the laws.", attr: "Plato" },
  { text: "Be kind, for everyone you meet is fighting a hard battle.", attr: "Plato" },
  { text: "Only the dead have seen the end of war.", attr: "Plato" },
  { text: "The only true wisdom is in knowing you know nothing.", attr: "Socrates" },
  { text: "An unexamined life is not worth living.", attr: "Socrates" },
  { text: "To find yourself, think for yourself.", attr: "Socrates" },
  { text: "Education is the kindling of a flame, not the filling of a vessel.", attr: "Socrates" },
  { text: "The secret of happiness is not found in seeking more, but in developing the capacity to enjoy less.", attr: "Socrates" },
  { text: "Strong minds discuss ideas, average minds discuss events, weak minds discuss people.", attr: "Socrates" },
  { text: "He who is not contented with what he has, would not be contented with what he would like to have.", attr: "Socrates" },
  { text: "By all means marry; if you get a good wife, you will be happy. If you get a bad one, you will be a philosopher.", attr: "Socrates" },
  { text: "If you know the enemy and know yourself, you need not fear the result of a hundred battles.", attr: "Sun Tzu" },
  { text: "Appear weak when you are strong, and strong when you are weak.", attr: "Sun Tzu" },
  { text: "The supreme art of war is to subdue the enemy without fighting.", attr: "Sun Tzu" },
  { text: "In the midst of chaos, there is also opportunity.", attr: "Sun Tzu" },
  { text: "He who knows when he can fight and when he cannot will be victorious.", attr: "Sun Tzu" },
  { text: "All warfare is based on deception.", attr: "Sun Tzu" },
  { text: "Let your plans be dark and impenetrable as night, and when you move, fall like a thunderbolt.", attr: "Sun Tzu" },
  { text: "The greatest victory is that which requires no battle.", attr: "Sun Tzu" },
  { text: "Move swift as the wind and closely-formed as the wood. Attack like the fire and be still as the mountain.", attr: "Sun Tzu" },
  { text: "Opportunities multiply as they are seized.", attr: "Sun Tzu" },
  { text: "The man who moves a mountain begins by carrying away small stones.", attr: "Confucius" },
  { text: "A man who has committed a mistake and doesn't correct it is committing another mistake.", attr: "Confucius" },
  { text: "It does not matter how slowly you go as long as you do not stop.", attr: "Confucius" },
  { text: "Real knowledge is to know the extent of one's ignorance.", attr: "Confucius" },
  { text: "Choose a job you love, and you will never have to work a day in your life.", attr: "Confucius" },
  { text: "Before you embark on a journey of revenge, dig two graves.", attr: "Confucius" },
  { text: "Our greatest glory is not in never falling, but in rising every time we fall.", attr: "Confucius" },
  { text: "He who learns but does not think is lost. He who thinks but does not learn is in great danger.", attr: "Confucius" },
  { text: "When it is obvious that the goals cannot be reached, don't adjust the goals, adjust the action steps.", attr: "Confucius" },
  { text: "Silence is a true friend who never betrays.", attr: "Confucius" },
  { text: "The superior man is modest in his speech, but exceeds in his actions.", attr: "Confucius" },
  { text: "In the middle of difficulty lies opportunity.", attr: "Julius Caesar" },
  { text: "No great thing is created suddenly.", attr: "Epictetus" },
  { text: "We are twice armed if we fight with faith.", attr: "Plato" },
  { text: "An army of lions commanded by a deer will never be an army of lions.", attr: "Napoleon Bonaparte" },
  { text: "First say to yourself what you would be; and then do what you have to do.", attr: "Epictetus" },
  { text: "He who cannot be a good follower cannot be a good leader.", attr: "Aristotle" },
  { text: "The pleasures of the intellect are permanent, the pleasures of the heart are transitory.", attr: "Mary Wollstonecraft" },
  { text: "The key is not to prioritise what's on your schedule, but to schedule your priorities.", attr: "Otto von Bismarck" },
  { text: "A prince who is not himself wise cannot be well advised.", attr: "Niccolò Machiavelli" },
  { text: "There is only one good, knowledge, and one evil, ignorance.", attr: "Socrates" },
  { text: "The chains of habit are too light to be felt until they are too heavy to be broken.", attr: "Samuel Johnson" },
  { text: "Great works are performed not by strength but by perseverance.", attr: "Samuel Johnson" },
  { text: "Integrity without knowledge is weak and useless, and knowledge without integrity is dangerous and dreadful.", attr: "Samuel Johnson" },
  { text: "Curiosity is one of the permanent and certain characteristics of a vigorous intellect.", attr: "Samuel Johnson" },
  { text: "We are all capable of evil thoughts, but only very rarely of evil deeds; we can all do good deeds, but very few of us can think good thoughts.", attr: "Cesare Pavese" },
  { text: "The present moment always will have been.", attr: "Søren Kierkegaard" },
  { text: "Life can only be understood backwards, but it must be lived forwards.", attr: "Søren Kierkegaard" },
  { text: "The most common form of despair is not being who you are.", attr: "Søren Kierkegaard" },
  { text: "To dare is to lose one's footing momentarily. Not to dare is to lose oneself.", attr: "Søren Kierkegaard" },
  { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", attr: "Winston Churchill" },
  { text: "To improve is to change; to be perfect is to have changed often.", attr: "Winston Churchill" },
  { text: "Courage is what it takes to stand up and speak; courage is also what it takes to sit down and listen.", attr: "Winston Churchill" },
  { text: "We make a living by what we get, but we make a life by what we give.", attr: "Winston Churchill" },
  { text: "A pessimist sees the difficulty in every opportunity; an optimist sees the opportunity in every difficulty.", attr: "Winston Churchill" },
  { text: "Success consists of going from failure to failure without loss of enthusiasm.", attr: "Winston Churchill" },
  { text: "The price of greatness is responsibility.", attr: "Winston Churchill" },
  { text: "You will never reach your destination if you stop and throw stones at every dog that barks.", attr: "Winston Churchill" },
  { text: "If you're going through hell, keep going.", attr: "Winston Churchill" },
  { text: "My tastes are simple: I am easily satisfied with the best.", attr: "Winston Churchill" },
  { text: "Tact is the ability to tell someone to go to hell in such a way that they look forward to the trip.", attr: "Winston Churchill" },
  { text: "History will be kind to me for I intend to write it.", attr: "Winston Churchill" },
  { text: "He who has a why to live can bear almost any how.", attr: "Friedrich Nietzsche" },
  { text: "That which does not kill us makes us stronger.", attr: "Friedrich Nietzsche" },
  { text: "Without music, life would be a mistake.", attr: "Friedrich Nietzsche" },
  { text: "It is not a lack of love, but a lack of friendship that makes unhappy marriages.", attr: "Friedrich Nietzsche" },
  { text: "In individuals, insanity is rare; but in groups, parties, nations and epochs, it is the rule.", attr: "Friedrich Nietzsche" },
  { text: "The higher we soar, the smaller we appear to those who cannot fly.", attr: "Friedrich Nietzsche" },
  { text: "One must still have chaos in oneself to be able to give birth to a dancing star.", attr: "Friedrich Nietzsche" },
  { text: "The secret for harvesting from existence the greatest fruitfulness and the greatest enjoyment is to live dangerously.", attr: "Friedrich Nietzsche" },
  { text: "There are no facts, only interpretations.", attr: "Friedrich Nietzsche" },
  { text: "All truly great thoughts are conceived while walking.", attr: "Friedrich Nietzsche" },
  { text: "Whatever you can do or dream you can, begin it. Boldness has genius, power and magic in it.", attr: "Johann Wolfgang von Goethe" },
  { text: "Knowing is not enough; we must apply. Willing is not enough; we must do.", attr: "Johann Wolfgang von Goethe" },
  { text: "As soon as you trust yourself, you will know how to live.", attr: "Johann Wolfgang von Goethe" },
  { text: "One ought, every day at least, to hear a little song, read a good poem, see a fine picture, and, if it were possible, to speak a few reasonable words.", attr: "Johann Wolfgang von Goethe" },
  { text: "Difficulties increase the nearer we approach the goal.", attr: "Johann Wolfgang von Goethe" },
  { text: "A man sees in the world what he carries in his heart.", attr: "Johann Wolfgang von Goethe" },
  { text: "Magic is believing in yourself. If you can do that, you can make anything happen.", attr: "Johann Wolfgang von Goethe" },
  { text: "The greatest thing in this world is not so much where we stand as in what direction we are moving.", attr: "Johann Wolfgang von Goethe" },
  { text: "None are more hopelessly enslaved than those who falsely believe they are free.", attr: "Johann Wolfgang von Goethe" },
  { text: "Treat people as if they were what they ought to be and you help them become what they are capable of being.", attr: "Johann Wolfgang von Goethe" },
  { text: "Common sense is not so common.", attr: "Voltaire" },
  { text: "Judge a man by his questions rather than his answers.", attr: "Voltaire" },
  { text: "The more I read, the more I acquire, the more certain I am that I know nothing.", attr: "Voltaire" },
  { text: "It is forbidden to kill; therefore all murderers are punished unless they kill in large numbers and to the sound of trumpets.", attr: "Voltaire" },
  { text: "To learn who rules over you, simply find out who you are not allowed to criticize.", attr: "Voltaire" },
  { text: "God is a comedian playing to an audience too afraid to laugh.", attr: "Voltaire" },
  { text: "Every man is guilty of all the good he did not do.", attr: "Voltaire" },
  { text: "It is not enough to conquer; one must know how to seduce.", attr: "Voltaire" },
  { text: "Think for yourself and let others enjoy the privilege of doing so too.", attr: "Voltaire" },
  { text: "The ends justify the means.", attr: "Niccolò Machiavelli" },
  { text: "It is better to be feared than loved, if you cannot be both.", attr: "Niccolò Machiavelli" },
  { text: "Never was anything great achieved without danger.", attr: "Niccolò Machiavelli" },
  { text: "Where the willingness is great, the difficulties cannot be great.", attr: "Niccolò Machiavelli" },
  { text: "The promise given was a necessity of the past: the word broken is a necessity of the present.", attr: "Niccolò Machiavelli" },
  { text: "Men are driven by two principal impulses, either by love or by fear.", attr: "Niccolò Machiavelli" },
  { text: "It is better to act and repent than not to act and regret.", attr: "Niccolò Machiavelli" },
  { text: "The lion cannot protect himself from traps, and the fox cannot defend himself from wolves. One must be both a fox and a lion.", attr: "Niccolò Machiavelli" },
  { text: "It is not the strongest of the species that survives, but the one most responsive to change.", attr: "Charles Darwin" },
  { text: "A man who dares to waste one hour of time has not discovered the value of life.", attr: "Charles Darwin" },
  { text: "I am not apt to follow blindly the lead of other men.", attr: "Charles Darwin" },
  { text: "The highest possible stage in moral culture is when we recognise that we ought to control our thoughts.", attr: "Charles Darwin" },
  { text: "If I have seen further it is by standing on the shoulders of giants.", attr: "Isaac Newton" },
  { text: "What we know is a drop, what we don't know is an ocean.", attr: "Isaac Newton" },
  { text: "Tact is the knack of making a point without making an enemy.", attr: "Isaac Newton" },
  { text: "To every action there is always opposed an equal reaction.", attr: "Isaac Newton" },
  { text: "Learning never exhausts the mind.", attr: "Leonardo da Vinci" },
  { text: "Simplicity is the ultimate sophistication.", attr: "Leonardo da Vinci" },
  { text: "It had long since come to my attention that people of accomplishment rarely sat back and let things happen to them.", attr: "Leonardo da Vinci" },
  { text: "The noblest pleasure is the joy of understanding.", attr: "Leonardo da Vinci" },
  { text: "Nothing strengthens authority so much as silence.", attr: "Leonardo da Vinci" },
  { text: "I have been impressed with the urgency of doing. Knowing is not enough; we must apply.", attr: "Leonardo da Vinci" },
  { text: "The greatest deception men suffer is from their own opinions.", attr: "Leonardo da Vinci" },
  { text: "Where the spirit does not work with the hand, there is no art.", attr: "Leonardo da Vinci" },
  { text: "As a well-spent day brings happy sleep, so a life well spent brings happy death.", attr: "Leonardo da Vinci" },
  { text: "Study without desire spoils the memory, and it retains nothing that it takes in.", attr: "Leonardo da Vinci" },
  { text: "The greater danger for most of us lies not in setting our aim too high and falling short, but in setting our aim too low and achieving our mark.", attr: "Michelangelo" },
  { text: "Lord, grant that I may always desire more than I can accomplish.", attr: "Michelangelo" },
  { text: "The marble not yet carved can hold the form of every thought the greatest artist has.", attr: "Michelangelo" },
  { text: "If people knew how hard I worked to get my mastery, it wouldn't seem so wonderful at all.", attr: "Michelangelo" },
  { text: "A man paints with his brains and not with his hands.", attr: "Michelangelo" },
  { text: "I saw the angel in the marble and carved until I set him free.", attr: "Michelangelo" },
  { text: "The greatest thing in the world is to know how to belong to oneself.", attr: "Michel de Montaigne" },
  { text: "On the highest throne in the world, we still sit only on our own bottom.", attr: "Michel de Montaigne" },
  { text: "Every man carries the full form of the human condition within him.", attr: "Michel de Montaigne" },
  { text: "The most certain sign of wisdom is cheerfulness.", attr: "Michel de Montaigne" },
  { text: "Nothing is so firmly believed as that which we least know.", attr: "Michel de Montaigne" },
  { text: "Knowledge is power.", attr: "Francis Bacon" },
  { text: "A wise man will make more opportunities than he finds.", attr: "Francis Bacon" },
  { text: "Read not to contradict and confute, nor to believe and take for granted, but to weigh and consider.", attr: "Francis Bacon" },
  { text: "The remedy is worse than the disease.", attr: "Francis Bacon" },
  { text: "Wonder is the seed of knowledge.", attr: "Francis Bacon" },
  { text: "In order for the light to shine so brightly, the darkness must be present.", attr: "Francis Bacon" },
  { text: "Prosperity is not without many fears and distastes; and adversity is not without comforts and hopes.", attr: "Francis Bacon" },
  { text: "I think, therefore I am.", attr: "René Descartes" },
  { text: "The reading of all good books is like a conversation with the finest men of past centuries.", attr: "René Descartes" },
  { text: "Divide each difficulty into as many parts as is feasible and necessary to resolve it.", attr: "René Descartes" },
  { text: "It is not enough to have a good mind. The main thing is to use it well.", attr: "René Descartes" },
  { text: "Everyone thinks of changing the world, but no one thinks of changing himself.", attr: "Leo Tolstoy" },
  { text: "All great literature is one of two stories; a man goes on a journey or a stranger comes to town.", attr: "Leo Tolstoy" },
  { text: "The two most powerful warriors are patience and time.", attr: "Leo Tolstoy" },
  { text: "Happy families are all alike; every unhappy family is unhappy in its own way.", attr: "Leo Tolstoy" },
  { text: "If you want to be happy, be.", attr: "Leo Tolstoy" },
  { text: "The sole meaning of life is to serve humanity.", attr: "Leo Tolstoy" },
  { text: "War is so unjust and ugly that all who wage it must try to stifle the voice of conscience within themselves.", attr: "Leo Tolstoy" },
  { text: "The soul is healed by being with children.", attr: "Fyodor Dostoyevsky" },
  { text: "Pain and suffering are always inevitable for a large intelligence and a deep heart.", attr: "Fyodor Dostoyevsky" },
  { text: "To love someone means to see them as God intended them.", attr: "Fyodor Dostoyevsky" },
  { text: "The man who lies to himself and listens to his own lie comes to a point that he cannot distinguish the truth within him.", attr: "Fyodor Dostoyevsky" },
  { text: "Beauty will save the world.", attr: "Fyodor Dostoyevsky" },
  { text: "It takes something more than intelligence to act intelligently.", attr: "Fyodor Dostoyevsky" },
  { text: "Whoever fights monsters should see to it that in the process he does not become a monster.", attr: "Friedrich Nietzsche" },
  { text: "A man who does not think for himself does not think at all.", attr: "Oscar Wilde" },
  { text: "To define is to limit.", attr: "Oscar Wilde" },
  { text: "We are all in the gutter, but some of us are looking at the stars.", attr: "Oscar Wilde" },
  { text: "Experience is simply the name we give our mistakes.", attr: "Oscar Wilde" },
  { text: "The truth is rarely pure and never simple.", attr: "Oscar Wilde" },
  { text: "All of humanity's problems stem from man's inability to sit quietly in a room alone.", attr: "Blaise Pascal" },
  { text: "The heart has its reasons which reason knows not.", attr: "Blaise Pascal" },
  { text: "Kind words do not cost much. Yet they accomplish much.", attr: "Blaise Pascal" },
  { text: "In faith there is enough light for those who want to believe and enough shadows to blind those who don't.", attr: "Blaise Pascal" },
  { text: "We are generally the better persuaded by the reasons we discover ourselves than by those given to us by others.", attr: "Blaise Pascal" },
  { text: "Talent hits a target no one else can hit. Genius hits a target no one else can see.", attr: "Arthur Schopenhauer" },
  { text: "The more unintelligent a man is, the less mysterious existence seems to him.", attr: "Arthur Schopenhauer" },
  { text: "We forfeit three-fourths of ourselves in order to be like other people.", attr: "Arthur Schopenhauer" },
  { text: "Compassion is the basis of morality.", attr: "Arthur Schopenhauer" },
  { text: "A man can do what he wants, but not want what he wants.", attr: "Arthur Schopenhauer" },
  { text: "Nothing great in the world was accomplished without passion.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "We learn from history that we do not learn from history.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "The truth is the whole.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "Only one man ever understood me, and he didn't understand me.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "Act only according to that maxim whereby you can at the same time will that it should become a universal law.", attr: "Immanuel Kant" },
  { text: "We are not rich by what we possess but by what we can do without.", attr: "Immanuel Kant" },
  { text: "Science is organized knowledge. Wisdom is organized life.", attr: "Immanuel Kant" },
  { text: "Morality is not the doctrine of how we may make ourselves happy, but how we may make ourselves worthy of happiness.", attr: "Immanuel Kant" },
  { text: "Two things awe me most: the starry sky above me and the moral law within me.", attr: "Immanuel Kant" },
  { text: "Politics is the art of the possible, the attainable — the art of the next best.", attr: "Otto von Bismarck" },
  { text: "Laws are like sausages — it is best not to see them being made.", attr: "Otto von Bismarck" },
  { text: "The secret of politics? Make a good treaty with Russia.", attr: "Otto von Bismarck" },
  { text: "A statesman must wait until he hears the steps of God sounding through events, then leap up and grasp the hem of His garment.", attr: "Otto von Bismarck" },
  { text: "The whole art of war consists in getting at what is on the other side of the hill.", attr: "Duke of Wellington" },
  { text: "Educate men without religion and you make them but clever devils.", attr: "Duke of Wellington" },
  { text: "There is no such thing as a little country. The greatness of a people is no more determined by their number than the greatness of a man is determined by his height.", attr: "Duke of Wellington" },
  { text: "I am not an adventurer by choice but by fate.", attr: "Vincent van Gogh" },
  { text: "Great things are done by a series of small things brought together.", attr: "Vincent van Gogh" },
  { text: "What would life be if we had no courage to attempt anything?", attr: "Vincent van Gogh" },
  { text: "I feel that there is nothing more truly artistic than to love people.", attr: "Vincent van Gogh" },
  { text: "Normality is a paved road: it is comfortable to walk, but no flowers grow.", attr: "Vincent van Gogh" },
  { text: "The fishermen know that the sea is dangerous and the storm terrible, but they have never found these dangers sufficient reason for remaining ashore.", attr: "Vincent van Gogh" },
  { text: "Don't tell me the moon is shining; show me the glint of light on broken glass.", attr: "Anton Chekhov" },
  { text: "Any idiot can face a crisis — it's this day-to-day living that wears you out.", attr: "Anton Chekhov" },
  { text: "Knowledge is of no value unless you put it into practice.", attr: "Anton Chekhov" },
  { text: "We shall find peace. We shall hear angels. We shall see the sky sparkling with diamonds.", attr: "Anton Chekhov" },

function loadQuote() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var diff = now - start;
  var oneDay = 1000 * 60 * 60 * 24;
  var dayOfYear = Math.floor(diff / oneDay); // 1-365, unique per day
  var idx = (dayOfYear - 1) % QUOTES.length;
  var q = QUOTES[idx];
  document.getElementById('quote-text').textContent = '"' + q.text + '"';
  document.getElementById('quote-attr').textContent = '— ' + q.attr;
}




const BUILDINGS = [
  {n:"Steiner House",c:"Vienna",co:"Austria",y:1910,ar:"Adolf Loos",w:"Loos designed this as a direct rebuke to the ornamental excess of Viennese Secession, stripping the facade to flat white planes at a time when decoration was considered a civic virtue. The stepped terraces on the garden side were a radical departure from the street elevation, giving the house two entirely different characters. It established the spatial logic Loos would develop over the next two decades: rooms of different heights interlocked in section rather than stacked in plan. The interior anticipates the Raumplan by several years, with rooms that feel discovered rather than arranged.",d:"The street facade is so austere it was reportedly mocked as a house without eyebrows when it was built.",lat:48.2082,lng:16.3738},
  {n:"Goldman & Salatsch Building",c:"Vienna",co:"Austria",y:1911,ar:"Adolf Loos",w:"This commercial building on the Michaelerplatz caused a genuine public scandal, with Franz Josef reportedly refusing to look at it from his palace windows across the square. Loos stripped the upper floors of all ornament, reserving marble cladding only for the ground-floor shopfronts where touch and close inspection were possible. The logic was deliberate: ornament belongs where the body meets the building, not where it can only be seen from a distance. The building quietly destroyed the assumption that civic prominence required historical decoration.",d:"The lower two floors are clad in green Cipollino marble columns, while the residential floors above are entirely bare rendered white.",lat:48.2082,lng:16.3738},
  {n:"Villa Müller",c:"Prague",co:"Czech Republic",y:1930,ar:"Adolf Loos",w:"The Villa Müller is the fullest realization of Loos's Raumplan — the idea that spaces should be sized and positioned according to their use and emotional purpose rather than aligned floor by floor. Moving through the house is more like navigating a mountain than climbing stairs, with rooms stepping up and down in unexpected sequences. The exterior gives nothing away; it reads as a plain white box. The drama is entirely internal, structured by compressed and released volumes that make ordinary domestic life feel newly considered.",d:"A small internal window connects the main hall to a raised sitting area, so occupants can see across levels without being at the same height.",lat:50.0755,lng:14.4378},
  {n:"Moller House",c:"Vienna",co:"Austria",y:1928,ar:"Adolf Loos",w:"One of Loos's most resolved Raumplan houses, built for a textile manufacturer who gave the architect genuine freedom. The living room is raised several steps above the entrance level, creating a theatre-box relationship between the main social space and the hall below. The street facade is completely symmetrical and nearly windowless, offering no information about the spatial complexity within. It remains one of the clearest demonstrations that architectural richness can be entirely a matter of section.",d:"A small loggia cut into the upper facade frames a single couch position, creating an observation point over the street without being seen.",lat:48.2082,lng:16.3738},
  {n:"Karma House",c:"Brissago",co:"Switzerland",y:1914,ar:"Adolf Loos",w:"Built on a steep slope above Lake Maggiore for a Dutch businessman, Karma House shows Loos working with a site rather than imposing geometry on it. The plan is compact but the section exploits the slope to give each level its own relationship to the lake view. The interiors use rich materials — marble, wood, silk — in a way that would become characteristic of Loos: material quality as the substitute for applied ornament. It is less theoretically demonstrative than the Vienna houses but more genuinely livable.",d:"The main living room has a low ceiling that compresses the space before the view opens dramatically through full-height windows to the lake.",lat:46.1233,lng:8.705},
  {n:"Rufer House",c:"Vienna",co:"Austria",y:1922,ar:"Adolf Loos",w:"An early Raumplan house that demonstrates the principle with particular economy of means. The exterior is a near-perfect cube, interrupted only by the minimal punctuations of windows sized precisely for their interior purpose. Inside, the rooms step and interlock in ways that make the house feel substantially larger than its footprint. Loos was interested in the experience of habitation over time, and Rufer rewards slow, repeated use more than initial inspection.",d:"The corner windows on the upper level are positioned not for symmetry but to light specific work surfaces in the rooms behind them.",lat:48.2082,lng:16.3738},
  {n:"Scheu House",c:"Vienna",co:"Austria",y:1913,ar:"Adolf Loos",w:"The Scheu House was the first terraced house in Vienna, a form Loos borrowed from the English garden city movement and adapted for a dense urban site. The stepped profile allowed each floor a private garden terrace while maintaining a compact footprint. Loos was interested in how English domestic architecture solved problems that Viennese tradition had left unresolved, and the Scheu House applies that interest directly. It remains unusual in the Viennese streetscape, neither fully suburban nor fully urban.",d:"The stepped terraces read from the street as a continuous diagonal descent, giving the house a silhouette unlike anything else in the neighbourhood.",lat:48.2082,lng:16.3738},
  {n:"Secession Building",c:"Vienna",co:"Austria",y:1898,ar:"Joseph Maria Olbrich",w:"The Secession Building was built as an exhibition hall for the group of artists who broke from the conservative Viennese art establishment, and its architecture embodies that break directly. The white geometric volume topped with a gilded dome of interlocking laurel leaves rejected both historicism and conventional ornament in favour of a new decorative language. Olbrich was twenty-eight when he designed it, and the building has the energy of a manifesto. It remains the clearest single statement of what the Viennese Secession was attempting.",d:"The golden dome is made from 2,500 gilded iron laurel leaves and 300 berries, and was immediately nicknamed the golden cabbage by the Viennese.",lat:48.2082,lng:16.3738},
  {n:"Hochzeitsturm",c:"Darmstadt",co:"Germany",y:1908,ar:"Joseph Maria Olbrich",w:"The Wedding Tower was built to mark the marriage of the Grand Duke Ernst Ludwig and stands at the heart of the Mathildenhöhe artists' colony that Olbrich designed across multiple buildings. The tower's crown of five rounded arches, often compared to a spread hand, became one of the most recognised silhouettes in German Jugendstil. The colony as a whole was an attempt to create a unified environment in which architecture, craft, and daily life would reinforce each other. Olbrich died the year it was completed, at thirty-nine.",d:"The five rounded finger-like arches at the top have no structural necessity; they exist purely to give the tower a distinctive skyline silhouette.",lat:49.8728,lng:8.6512},
  {n:"AEG Turbine Factory",c:"Berlin",co:"Germany",y:1909,ar:"Peter Behrens",w:"Behrens designed this factory for the electrical company AEG as part of the first systematic attempt to apply architectural thinking to industrial production at scale. The great hall uses exposed steel hinges at the corners to acknowledge rather than disguise the structure, giving the building an honest monumentality that broke with both historicism and the conventional industrial shed. It influenced a generation of architects who worked in Behrens's office, including Gropius, Mies van der Rohe, and Le Corbusier. The building proposed that industry could have the dignity previously reserved for civic institutions.",d:"The hinged corner joints are left visible and oversized, turning a structural necessity into the building's most expressive moment.",lat:52.52,lng:13.405},
  {n:"Fagus Factory",c:"Alfeld",co:"Germany",y:1913,ar:"Walter Gropius & Adolf Meyer",w:"The Fagus Factory was a shoe-last factory that Gropius transformed into a manifesto for a new industrial architecture, and its corner windows — glass wrapping around a building corner with no supporting column — had never been done before at this scale. The transparency of the curtain wall made the interior visible from outside, erasing the boundary between production and the public world. Built when Gropius was twenty-nine, it anticipated the curtain wall buildings of the 1950s by four decades. The structural logic that allowed the glass corners required iron columns set back from the facade, a move that looked simple but was carefully engineered.",d:"The glass corners have no vertical support at the angle point, achieved by cantilevering the floor slab and concealing a slender column just inside the facade.",lat:51.9853,lng:9.8237},
  {n:"Bauhaus Dessau",c:"Dessau",co:"Germany",y:1926,ar:"Walter Gropius",w:"The Bauhaus building in Dessau is the institutional embodiment of the school's philosophy: different workshops and functions linked by bridges and connected volumes rather than unified under a single roof. The three-dimensional pinwheel plan means there is no single correct view of the building; it must be understood in motion. The workshop wing's curtain wall of glass and steel was the most ambitious transparent facade built to that date. It also demonstrated that a building could be both a teaching environment and its own most persuasive advertisement.",d:"The workshop wing's four-storey curtain wall is slightly bowed outward in plan, a subtle curve that prevents the glass from reading as a flat screen.",lat:51.8333,lng:12.25},
  {n:"Glass Pavilion Cologne",c:"Cologne",co:"Germany",y:1914,ar:"Bruno Taut",w:"Taut's pavilion for the German Werkbund exhibition was a polemical demonstration of glass as a spiritual material, its faceted dome and coloured glass walls drawing on the utopian writings of Paul Scheerbart who believed transparency would transform human society. The building existed only for the duration of the exhibition and was demolished, but its photographs circulated widely and established glass as an ideologically loaded material for the German avant-garde. The interior contained a cascade, coloured glass floors, and a kaleidoscope chamber. It was architecture as vision rather than permanent construction.",d:"The prismatic glass dome was assembled from diamond-shaped panels that refracted exterior light into coloured patterns across the interior walls throughout the day.",lat:50.9333,lng:6.95},
  {n:"Einstein Tower",c:"Potsdam",co:"Germany",y:1921,ar:"Erich Mendelsohn",w:"The Einstein Tower was designed to test aspects of Einstein's theory of relativity through astrophysical observation, and Mendelsohn's expressionist form — all curves and no straight lines — was intended to embody the dynamism of the new physics. The building was designed in sculpted plaster over brick rather than the reinforced concrete that would have been technically ideal, because the necessary construction skills were unavailable in the immediate postwar period. Einstein himself visited and reportedly said it was organic, though his precise meaning was never clarified. It remains the most complete built example of German architectural expressionism.",d:"The observatory telescope is housed in a vertical shaft that runs through the tower's core from the dome to the basement spectrograph laboratory below grade.",lat:52.3906,lng:13.0645},
  {n:"Schocken Department Store",c:"Chemnitz",co:"Germany",y:1930,ar:"Erich Mendelsohn",w:"Mendelsohn designed several department stores in the late 1920s and the Chemnitz Schocken is the most resolved, its horizontal bands of windows wrapping the curved corner in a continuous ribbon that makes the building read as a single sweeping gesture. The staircase tower at the back punctuates the composition with vertical emphasis, creating a dynamic tension between horizontal movement and vertical pause. The building was a commercial exercise in modernism at a moment when department stores were among the most culturally significant buildings in German cities. It was partially demolished during the Nazi period and has been significantly altered.",d:"The continuous horizontal window bands are separated by thin spandrels that disappear visually, making the floors appear to float rather than stack.",lat:50.8278,lng:12.9214},
  {n:"De La Warr Pavilion",c:"Bexhill-on-Sea",co:"United Kingdom",y:1935,ar:"Erich Mendelsohn & Serge Chermayeff",w:"The De La Warr Pavilion was the first welded steel public building in Britain, commissioned by a socialist Earl who wanted to bring modernist culture to a seaside town. The curved staircase visible through the glazed bay at the south end became one of the most reproduced images of British interwar modernism. Mendelsohn and Chermayeff's collaboration brought continental rigour to a building programme that was genuinely about public access to leisure. It has survived decades of neglect and partial dereliction to be carefully restored.",d:"The cantilevered spiral stair inside the glass bay is entirely visible from the promenade outside, making the building's internal movement a public performance.",lat:50.8428,lng:0.4754},
  {n:"Hat Factory Luckenwalde",c:"Luckenwalde",co:"Germany",y:1923,ar:"Erich Mendelsohn",w:"The dye works extension for a hat factory gave Mendelsohn the opportunity to design purely for industrial function, and the result is one of the most dramatic industrial buildings of the Weimar period. The sawtooth roof profile was determined by the requirement for north light in the dyeing halls, and Mendelsohn used the structural necessity as an expressive opportunity, making the jagged profile the building's primary architectural gesture. The quality of the brickwork and the care given to the relationship between structure and envelope are inconsistent with a purely utilitarian brief.",d:"The sawtooth roof peaks are clad in dark blue-grey brick that reads as shadow from a distance, making the building appear to dissolve into a series of angular profiles.",lat:52.0833,lng:13.1667},
  {n:"Rietveld Schröder House",c:"Utrecht",co:"Netherlands",y:1924,ar:"Gerrit Rietveld",w:"The Schröder House was designed in close collaboration with Truus Schröder-Schräder, a widow who wanted a home that embodied De Stijl principles of spatial freedom and moveable division. The sliding and rotating wall panels on the upper floor allow the entire level to be opened into a single space or divided into four rooms, making the plan reversible depending on use. Rietveld extended the De Stijl aesthetic from furniture — he had already made the Red and Blue Chair — to a complete architectural environment. The house is simultaneously a theoretical demonstration and a genuinely habitable home.",d:"The corner windows on the upper floor have no corner post between them, so the panes of glass meet at the angle with nothing but a thin metal strip, dissolving the corner entirely.",lat:52.0907,lng:5.1214},
  {n:"Van Nelle Factory",c:"Rotterdam",co:"Netherlands",y:1931,ar:"Brinkman & Van der Vlugt",w:"The Van Nelle Factory was designed to produce coffee, tea, and tobacco in conditions of maximum transparency and hygiene, and it achieved both with a curtain wall system that made the interior production visible from the surrounding landscape. Le Corbusier called it one of the most beautiful spectacles of the modern age, and it influenced his thinking about the relationship between industry and urbanism. The connecting bridges between the three production cylinders are glazed so that the workers moving between departments are visible as a kind of living infrastructure. It is one of the few Dutch modernist buildings of its period to survive substantially intact.",d:"The mushroom-headed concrete columns supporting the floor slabs are slightly wider than the curtain wall facade, creating a subtle shadow line that gives the glass surface depth.",lat:51.9244,lng:4.4777},
  {n:"Zonnestraal Sanatorium",c:"Hilversum",co:"Netherlands",y:1928,ar:"Jan Duiker",w:"Zonnestraal was a tuberculosis sanatorium built for Amsterdam diamond workers, and its architecture was entirely determined by the therapeutic requirement for sunlight and fresh air. Duiker used an extremely thin concrete frame to create maximum glass surface, and the result was buildings that seemed to barely touch the ground, hovering in the pine forest like landed aircraft. The structural lightness was not merely aesthetic; the sanatorium was built on a tight budget and the minimum material use was both economical and symbolic of the transparency the treatment programme required. When tuberculosis was controlled by medication, the buildings fell into disuse and serious disrepair before a careful restoration.",d:"The roof terraces are cantilevered beyond the supporting columns so that patients lying in deck chairs appear to float in the tree canopy with no building beneath them.",lat:52.2292,lng:5.1797},
  {n:"Hilversum Town Hall",c:"Hilversum",co:"Netherlands",y:1931,ar:"Dudok",w:"Dudok spent most of his career as municipal architect of Hilversum, and the town hall is the culmination of his attempt to synthesise De Stijl abstraction with the brick traditions of Dutch architecture. The asymmetric massing — a tall tower balanced against long horizontal wings — shows the influence of Wright's prairie houses filtered through a specifically Dutch material sensibility. The building was influential in Britain where it was widely published and imitated, introducing a stripped classicism with brick that characterised much British public architecture of the 1930s. It remains in use as the town's administrative centre.",d:"The tower is positioned asymmetrically in the composition, balancing horizontal wings of different lengths, so the building never presents a symmetrical face from any approach.",lat:52.2292,lng:5.1797},
  {n:"Open Air School Amsterdam",c:"Amsterdam",co:"Netherlands",y:1930,ar:"Jan Duiker",w:"Duiker designed this school for children with respiratory conditions, and every architectural decision was subordinated to the requirement for maximum fresh air and sunlight. Each classroom can be entirely opened on one side, turning the room into a covered outdoor space, and the building is oriented so that all classrooms face south. The reinforced concrete frame is reduced to its absolute minimum, giving the building an extraordinary lightness for its date. It was the most radical application of open-air pedagogy principles to architecture built in the Netherlands.",d:"The classrooms open completely on their south sides with folding glass walls, so in good weather each room becomes a covered terrace rather than an enclosed space.",lat:52.3676,lng:4.9041},
  {n:"Eigen Haard Housing",c:"Amsterdam",co:"Netherlands",y:1921,ar:"Michel de Klerk",w:"De Klerk's housing for the Eigen Haard cooperative is the most celebrated example of Amsterdam School architecture, a movement that applied expressionist fantasy to social housing in the belief that working-class residents deserved architecture of beauty and invention. The Spaarndammerplantsoen block is particularly extraordinary, its brick surface worked into undulating forms, tapering windows, and a fantastical corner tower that has no structural justification whatsoever. The Amsterdam School architects were opposed to both historicism and the geometric austerity of De Stijl, preferring an expressionism rooted in craft and the plastic possibilities of brick. De Klerk died of spinal meningitis at thirty-nine, the same year the block was completed.",d:"The corner of the Spaarndammerplantsoen block is crowned with a small conical tower that appears to have been designed for a fairy tale rather than a housing block.",lat:52.3676,lng:4.9041},
  {n:"De Dageraad Housing",c:"Amsterdam",co:"Netherlands",y:1923,ar:"Michel de Klerk & Piet Kramer",w:"De Dageraad meaning The Dawn was a housing cooperative for whom de Klerk and Kramer designed two city blocks that remain among the most inventive social housing complexes in European architecture. The brick facades are treated as continuous sculptural surfaces, with windows that curve, splay, and taper in response to an internal logic of ornament rather than structural necessity. Kramer completed the project after de Klerk's death and maintained the extraordinary formal inventiveness throughout. The housing demonstrates that architectural ambition and social purpose are not in competition.",d:"The entrance archways to the internal courtyards are framed with brick that projects and recedes in rhythmic patterns, making entry a spatial event rather than a passage.",lat:52.3676,lng:4.9041},
  {n:"Het Schip",c:"Amsterdam",co:"Netherlands",y:1921,ar:"Michel de Klerk",w:"Het Schip — The Ship — takes its name from the pointed prow-like corner that de Klerk gave the building, and the nautical metaphor extends to porthole windows and a roofline that undulates like a wave. The building contains housing, a post office, and a meeting hall, each given its own architectural expression while maintaining the overall expressionist language. De Klerk believed that social housing should aspire to the richness of the palaces and churches that only the wealthy and institutional had previously commanded. The building has been converted to a museum of Amsterdam School architecture.",d:"The post office interior, now the museum's main hall, has a ceiling that curves continuously from wall to wall with no right angles, lined entirely in custom-designed tilework.",lat:52.3676,lng:4.9041},
  {n:"Vrijheidslaan Housing",c:"Amsterdam",co:"Netherlands",y:1923,ar:"Piet Kramer",w:"Kramer was the bridge-builder among the Amsterdam School architects, literally — he designed most of Amsterdam's canal bridges in this period — and his housing shows the same quality of structural invention applied to domestic buildings. The Vrijheidslaan blocks use brick in ways that reference traditional Dutch gabling while transforming them into something entirely modern and expressive. Kramer worked with the curve and the taper as naturally as most architects work with the right angle. The housing has a warmth and material richness that later social housing in the Netherlands almost entirely abandoned.",d:"The balcony railings are formed from curved brick profiles rather than metal rails, integrating the safety barrier into the masonry surface of the building.",lat:52.3676,lng:4.9041},
  {n:"Villa Savoye",c:"Poissy",co:"France",y:1931,ar:"Le Corbusier",w:"Villa Savoye is Le Corbusier's five-point manifesto in built form: pilotis lifting the house off the ground, a free plan liberated from structural walls, a free facade, horizontal ribbon windows, and a roof garden. But the building transcends its theoretical status because the sequence of movement through it — entering underneath, ascending the ramp, arriving on the roof terrace — is genuinely spatially affecting. The house was barely used by its owners, was requisitioned during the war, and nearly demolished before being listed as a historic monument. Its current condition is carefully maintained as an architectural document.",d:"The ramp that connects all three levels is given the same floor finish as the rooms it connects, treating movement through the house as a continuous spatial experience rather than a transitional interruption.",lat:48.9297,lng:2.0439},
  {n:"Maisons Jaoul",c:"Neuilly-sur-Seine",co:"France",y:1956,ar:"Le Corbusier",w:"The Jaoul houses mark a decisive shift in Le Corbusier's work from the smooth white abstraction of the purism period to a rougher, more material architecture of brick vaults and raw concrete. The two houses for a father and son share a site but are articulated independently, their Catalan vault ceilings giving the interiors a warmth that his earlier white houses never had. James Stirling's hostile review of the houses at the time of completion became famous — he accused Le Corbusier of betraying the modern movement — but history has tended to agree with those who found them richer than the early work. They are among the most influential houses of the twentieth century for the architects who came after.",d:"The exposed brick Catalan vaults spring directly from concrete beams with no transition moulding, leaving the junction between materials deliberately unresolved and honest.",lat:48.8846,lng:2.269},
  {n:"Unité d'Habitation Briey",c:"Briey",co:"France",y:1960,ar:"Le Corbusier",w:"The Briey Unité is the least known of Le Corbusier's five Unité d'Habitation buildings, built for steelworkers in Lorraine and subsequently abandoned, occupied by squatters, and eventually restored. Its condition of semi-ruin gave a generation of architects direct access to Le Corbusier's spatial intentions in a way that the maintained Marseille building does not, and the photographs of its decayed state became influential. The double-height apartments, accessed from internal streets on every third level, demonstrate a section unlike anything in conventional apartment design. The brise-soleil concrete sun-breakers give the facades a depth and shadow that is entirely absent from glass curtain wall buildings of the same period.",d:"The internal streets that serve every third floor are wide enough for a child to ride a bicycle and were intended to function as outdoor rooms connecting the community.",lat:49.25,lng:5.9333},
  {n:"Maison du Brésil",c:"Paris",co:"France",y:1959,ar:"Le Corbusier & Lucio Costa",w:"The Brazilian student residence in the Cité Internationale Universitaire shows Le Corbusier working with Lucio Costa to produce a building that synthesised French modernism with Brazilian spatial and material sensibility. The pilotis here are not the slender cylinders of the Villa Savoye but massive sculptural forms that give the undercroft the character of a forest. The brise-soleil on the south facade is integrated into the structural frame rather than added as a screen. The building demonstrates how Le Corbusier's formal vocabulary could absorb the influence of a collaborator without losing its rigour.",d:"The pilotis of the ground floor are tapered and slightly irregular, departing from the perfect cylinder of Le Corbusier's earlier work to suggest something more organic and Brazilian.",lat:48.8566,lng:2.3522},
  {n:"Carpenter Center",c:"Cambridge",co:"United States",y:1963,ar:"Le Corbusier",w:"The Carpenter Center is the only Le Corbusier building in North America and was designed for Harvard's visual arts programme with characteristic indifference to the Georgian brick context around it. The S-shaped ramp that passes through the building at first-floor level was intended to allow casual observation of the studios below, making art-making visible to passers-by. The brise-soleil on the south and north facades are differently designed — one to exclude direct sunlight, the other to reflect northern light into studios — demonstrating that the same element can have different functional and formal logic on different facades. It remains controversial at Harvard, where it sits like a foreign object among the brick buildings that surround it.",d:"The ramp that passes through the centre of the building is a public path, meaning the building can be traversed by anyone without entering it as a building.",lat:42.3736,lng:-71.1097},
  {n:"Millowners' Association Building",c:"Ahmedabad",co:"India",y:1954,ar:"Le Corbusier",w:"Le Corbusier designed several buildings in Ahmedabad in the early 1950s, and the Millowners building is the most spatially inventive, with a great curved ramp sweeping up through the interior and a brise-soleil facade responding to the intense Indian sun. The building demonstrated that his formal vocabulary could absorb tropical conditions and local material culture without becoming merely imitative. The raking light of the Indian sun gives the concrete brise-soleil a drama that the same element lacks in the European climate.",d:"The curved ramp that serves as the main circulation element also defines the spatial centre of the building, making movement the generator of the plan.",lat:23.0225,lng:72.5714},
  {n:"Shodhan House",c:"Ahmedabad",co:"India",y:1956,ar:"Le Corbusier",w:"Designed for a textile merchant, the Shodhan House uses a parasol roof to shade the entire building, with a double-height living room at the centre ventilated by a wind-catching tower. The plan is a response to the Indian climate — deep overhangs, cross-ventilation, and shaded courts — using Le Corbusier's formal language to solve genuinely local problems. The result feels simultaneously European and deeply Indian in its spatial organisation. It is among the most climatically intelligent buildings Le Corbusier produced.",d:"The roof parasol extends well beyond the building's walls on all sides, creating a shaded exterior zone between inside and outside that functions as outdoor living space in the cooler months.",lat:23.0225,lng:72.5714},
  {n:"Sarabhai House",c:"Ahmedabad",co:"India",y:1955,ar:"Le Corbusier",w:"The Sarabhai House is the more modest of Le Corbusier's two Ahmedabad villas, designed for the wife of a textile industrialist and using the Catalan vault system he had developed at the Jaoul houses to produce long parallel barrel-vaulted spaces that channel cross-ventilation. The garden slides under the vaults at the end of the house, dissolving the boundary between interior and landscape. The house has been continuously inhabited by the Sarabhai family and retains all its original furniture and fittings, giving it a quality of authentic habitation that most modernist houses have lost.",d:"The end walls of the barrel-vaulted spaces are fully open to the garden, so the house reads as a series of parallel covered passages rather than enclosed rooms.",lat:23.0225,lng:72.5714},
