<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#C8A96E; --gold-light:#e8d5a8;
    --bg:#F0EDE8; --surface:#FAFAF8;
    --border:rgba(0,0,0,0.08);
    --text:#1a1a1a; --text2:#666; --text3:#999;
    --green:#2E7D50; --red:#B03A2E;
    --sans:'DM Sans',system-ui,sans-serif;
    --serif:'EB Garamond',Georgia,serif;
  }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:15px 30px; background:var(--surface); border-bottom:1px solid var(--border); }
  .wordmark { font-family:var(--serif); font-size:19px; font-weight:600; }
  .topbar-right { display:flex; align-items:center; gap:18px; }
  .top-date { font-size:11px; font-weight:300; color:var(--text3); letter-spacing:0.07em; }
  .rdot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; }
  .rlabel { font-size:10px; color:var(--text3); }

  .main { display:grid; grid-template-columns:1fr 1fr; flex:1; }

  .arch-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:calc(100vh - 54px); overflow-y:auto; }
  .arch-inner { padding:32px 36px 36px; display:flex; flex-direction:column; flex:1; }
  .arch-eyebrow { font-size:9px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
  .arch-rule { width:40px; height:2px; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:1px; margin-bottom:16px; }
  .arch-building-name { font-family:var(--serif); font-size:28px; font-weight:600; line-height:1.1; color:var(--text); margin-bottom:6px; }
  .arch-meta { font-size:11px; font-weight:300; color:var(--text3); letter-spacing:0.03em; margin-bottom:20px; }
  .arch-meta span { margin:0 6px; color:var(--border); }
  .arch-images { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:22px; }
  .arch-img-wrap { display:flex; flex-direction:column; gap:5px; }
  .arch-img-wrap img { width:100%; height:140px; object-fit:cover; border-radius:2px; background:var(--bg); display:block; }
  .arch-img-caption { font-size:9px; color:var(--text3); text-align:center; line-height:1.3; }
  .arch-body { font-family:var(--serif); font-size:16px; line-height:1.8; color:#333; margin-bottom:20px; flex:1; }
  .arch-detail-label { font-size:9px; font-weight:600; color:var(--gold); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; }
  .arch-detail-text { font-family:var(--serif); font-style:italic; font-size:14.5px; line-height:1.7; color:#666; margin-bottom:24px; }
  .arch-footer { display:flex; align-items:center; justify-content:space-between; padding-top:16px; border-top:1px solid var(--border); }
  .arch-footer-label { font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; }
  .arch-maps-link { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; color:var(--gold); text-decoration:none; letter-spacing:0.02em; border:1.5px solid var(--gold-light); padding:6px 14px; border-radius:20px; }
  .arch-maps-link:hover { background:var(--gold); color:#fff; border-color:var(--gold); }
  .arch-placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px; text-align:center; gap:14px; }
  .arch-placeholder-title { font-family:var(--serif); font-size:26px; font-weight:600; line-height:1.15; color:var(--text); }
  .arch-placeholder-sub { font-size:12px; font-weight:300; color:var(--text3); max-width:260px; line-height:1.75; }
  .arch-loading { flex:1; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text3); font-style:italic; }

  .right-panel { display:flex; flex-direction:column; overflow-y:auto; font-size:1.15em; }
  .section { padding:16px 24px; border-bottom:1px solid var(--border); }
  .sec-label { font-size:10px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--text3); margin-bottom:11px; }

  .eq-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
  .eq-card { background:var(--surface); border:1px solid var(--border); border-radius:5px; padding:9px 10px; }
  .eq-sym { font-size:10px; font-weight:500; letter-spacing:0.07em; color:var(--text3); margin-bottom:3px; }
  .eq-price { font-size:17px; font-variant-numeric:tabular-nums; line-height:1; margin-bottom:5px; }
  .eq-changes { display:flex; gap:4px; flex-wrap:wrap; }
  .badge { font-size:11px; font-variant-numeric:tabular-nums; border-radius:3px; padding:2px 5px; display:inline-flex; align-items:center; gap:2px; }
  .badge-label { font-size:9px; opacity:0.65; margin-right:1px; }
  .up { color:var(--green); background:rgba(46,125,80,0.08); }
  .down { color:var(--red); background:rgba(176,58,46,0.08); }

  .two-col { display:grid; grid-template-columns:1fr 1fr; }
  .two-col .section:first-child { border-right:1px solid var(--border); }

  /* CRYPTO — no background on change cells */
  .crypto-tbl { width:100%; border-collapse:collapse; }
  .crypto-tbl th { font-size:9.5px; font-weight:500; letter-spacing:0.08em; color:var(--text3); text-transform:uppercase; padding:0 0 7px; text-align:right; }
  .crypto-tbl th:first-child { text-align:left; }
  .crypto-tbl td { font-size:12.5px; font-variant-numeric:tabular-nums; padding:5px 0; border-top:1px solid var(--border); text-align:right; vertical-align:middle; }
  .crypto-tbl td:first-child { text-align:left; font-size:12px; font-weight:500; }
  .cprice { font-weight:500; }
  .pct-up   { color:var(--green); }
  .pct-down { color:var(--red); }

  /* RATES */
  .rate-rows { display:flex; flex-direction:column; gap:6px; }
  .rate-row { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .rate-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .rate-name { font-size:12px; color:var(--text2); }
  .rate-val { font-size:16px; font-weight:500; font-variant-numeric:tabular-nums; }
  .rate-changes { display:flex; gap:4px; }
  .rate-asof { font-size:10.5px; color:var(--text3); margin-top:8px; }

  /* NEWS */
  .news-section { padding:16px 24px; flex:1; }
  .news-tabs { display:flex; gap:0; }
  .headlines-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; border-bottom:1px solid var(--border); padding-bottom:0; }
  .headlines-header .sec-label { margin-bottom:0; padding-bottom:11px; }
  .news-tab { font-size:13px; color:var(--text3); padding:5px 12px 8px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; background:none; border-top:none; border-left:none; border-right:none; }
  .news-tab.active { color:var(--text); border-bottom-color:var(--gold); font-weight:500; }
  .news-feed { display:none; flex-direction:column; }
  .news-feed.active { display:flex; }
  .news-item { padding:9px 0; border-bottom:1px solid var(--border); text-decoration:none; display:block; }
  .news-item:last-child { border-bottom:none; }
  .news-hed { font-family:var(--serif); font-size:16px; color:var(--text); line-height:1.4; margin-bottom:2px; }
  .news-meta { font-size:10.5px; color:var(--text3); }
  .news-item:hover .news-hed { color:var(--gold); }
  .news-ai-label { font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
  .news-spinner { font-size:11px; color:var(--text3); font-style:italic; padding:6px 0; }


  /* QUOTE BAR */
  .quote-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:13px 32px; display:flex; align-items:baseline; gap:14px; justify-content:center; text-align:center; }
  .quote-text { font-family:var(--serif); font-size:15px; font-style:italic; color:var(--text2); line-height:1.5; flex:1; }
  .quote-attr { font-size:10.5px; font-weight:500; color:var(--text3); letter-spacing:0.04em; white-space:nowrap; }
  .loading { font-size:11px; color:var(--text3); font-style:italic; padding:6px 0; }
  .err { font-size:11px; color:var(--red); padding:5px 0; }
</style>
</head>

function fmtPrice(n) {
  n = parseFloat(n);
  if (n >= 1000) return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (n >= 1)    return n.toFixed(2);
  return n.toFixed(4);
}
function badge(pct, label) {
  pct = parseFloat(pct);
  const cls = pct >= 0 ? 'up' : 'down', sign = pct >= 0 ? '+' : '';
  return `<span class="badge ${cls}"><span class="badge-label">${label}</span>${sign}${pct.toFixed(2)}%</span>`;
}
function bpsBadge(curr, prev, label) {
  const diff = (parseFloat(curr) - parseFloat(prev)) * 100;
  const cls  = diff >= 0 ? 'up' : 'down', sign = diff >= 0 ? '+' : '';
  return `<span class="badge ${cls}"><span class="badge-label">${label}</span>${sign}${diff.toFixed(1)}bps</span>`;
}
function pctCell(p) {
  p = parseFloat(p);
  const cls = p >= 0 ? 'pct-up' : 'pct-down', sign = p >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${Math.abs(p).toFixed(2)}%</span>`;
}

function tick() {

// EQUITIES — single time_series batch (8 credits total, one request)
async function loadEquities() {
  const grid = document.getElementById('eq-grid');
  try {
    const syms = 'GOOGL,AMZN,AAPL,BRK.B,COIN,NVDA,QCOM,SPY';
    const res  = await fetch(`https://api.twelvedata.com/time_series?symbol=${syms}&interval=1day&outputsize=31&apikey=${TD_KEY}`);
    const data = await res.json();
    if (data.code) throw new Error(data.message);
    const order = ['GOOGL','AMZN','AAPL','BRK.B','COIN','NVDA','QCOM','SPY'];
    grid.innerHTML = order.map(sym => {
      const d = data[sym];
      if (!d || d.status === 'error' || !d.values?.length)
        return `<div class="eq-card"><div class="eq-sym">${sym}</div><div class="eq-price">—</div></div>`;
      const vals   = d.values;
      const price  = parseFloat(vals[0].close);
      const prev   = parseFloat(vals[1]?.close ?? vals[0].close);
      const old30  = parseFloat(vals[vals.length - 1].close);
      const chg1d  = ((price - prev)  / prev)  * 100;
      const chg30d = ((price - old30) / old30) * 100;
      return `<div class="eq-card">
        <div class="eq-sym">${sym}</div>
        <div class="eq-price">$${fmtPrice(price)}</div>
        <div class="eq-changes">${badge(chg1d,'1D')}${badge(chg30d,'30D')}</div>
      </div>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = `<div class="err">Could not load equities.</div>`;
  }
}

// CRYPTO — CoinGecko markets, no background on change cells
async function loadCrypto() {
  const tbody = document.getElementById('crypto-body');
  const coins = [
    {id:'bitcoin',sym:'BTC'},{id:'ethereum',sym:'ETH'},{id:'solana',sym:'SOL'},
    {id:'dogecoin',sym:'DOGE'},{id:'hyperliquid',sym:'HYPE'}
  ];
  try {
    const ids = coins.map(c=>c.id).join(',');
    const res  = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&price_change_percentage=1h,24h,30d`);
    const data = await res.json();
    const map  = {};
    data.forEach(c => { map[c.id] = c; });
    tbody.innerHTML = coins.map(({id,sym}) => {
      const c = map[id]; if (!c) return '';
      const h1  = c.price_change_percentage_1h_in_currency  ?? 0;
      const h24 = c.price_change_percentage_24h_in_currency ?? 0;
      const d30 = c.price_change_percentage_30d_in_currency ?? 0;
      return `<tr>
        <td>${sym}</td>
        <td>${pctCell(h1)}</td>
        <td>${pctCell(h24)}</td>
        <td>${pctCell(d30)}</td>
        <td class="cprice">$${fmtPrice(c.current_price)}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5" class="err">Could not load crypto.</td></tr>`;
  }
}

// RATES — Pensford quotes.xml (live intraday, updated every ~10 min, no auth needed)
async function loadRates() {
  const rows = document.getElementById('rate-rows');
  try {
    const res = await fetch('https://19621209.fs1.hubspotusercontent-na1.net/hubfs/19621209/quotes.xml');
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'application/xml');
    const ts = xml.documentElement.getAttribute('timeStamp') || '';

    function getRecord(sym) {
      var records = xml.querySelectorAll('record');
      for (var i = 0; i < records.length; i++) {
        if (records[i].querySelector('symbol').textContent === sym) {
          return {
            val: parseFloat(records[i].querySelector('quote').textContent) * 100,
            chg: parseFloat(records[i].querySelector('change').textContent) * 100,
            date: records[i].querySelector('quoteDate').textContent
          };
        }
      }
      return null;
    }

    var y5   = getRecord('TREASURY Y5');
    var y10  = getRecord('TREASURY Y10');
    var sofr = getRecord('SOFRTERM_M1');

    var rateData = [
      {label: '5Y Treasury',  r: y5},
      {label: '10Y Treasury', r: y10},
      {label: '1M Term SOFR', r: sofr}
    ];

    rows.innerHTML = rateData.map(function(item) {
      var v = item.r;
      if (!v) return '<div class="rate-row"><div class="rate-top"><span class="rate-name">' + item.label + '</span><span class="rate-val">—</span></div></div>';
      var chgCls = v.chg >= 0 ? 'up' : 'down';
      var sign   = v.chg >= 0 ? '+' : '';
      return '<div class="rate-row">' +
        '<div class="rate-top">' +
          '<span class="rate-name">' + item.label + '</span>' +
          '<span class="rate-val">' + v.val.toFixed(2) + '%</span>' +
        '</div>' +
        '<div class="rate-changes">' +
          '<span class="badge ' + chgCls + '"><span class="badge-label">1D</span>' + sign + (v.chg * 100).toFixed(1) + 'bps</span>' +
        '</div>' +
      '</div>';
    }).join('') + '<div class="rate-asof">As of ' + ts + ' · Pensford</div>';

  } catch(e) {
    rows.innerHTML = '<div class="err">Could not load rates.</div>';
  }
}

// NEWS — Claude API picks top stories from multiple feeds per source
const FEEDS = {
  cnbc:      ['https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664',
              'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=15839135'],
  bloomberg: ['https://feeds.bloomberg.com/markets/news.rss',
              'https://feeds.bloomberg.com/politics/news.rss',
              'https://feeds.bloomberg.com/technology/news.rss'],
  ft:        ['https://www.ft.com/rss/home/uk']
};

async function loadFeed(key) {
  const el = document.getElementById('feed-' + key);
  try {
    const urls = FEEDS[key];
    const all = await Promise.all(urls.map(function(url) {
      return fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url) + '&_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) { return d.status === 'ok' ? d.items : []; })
        .catch(function() { return []; });
    }));
    const items = all.flat().sort(function(a, b) {
      return new Date(b.pubDate) - new Date(a.pubDate);
    }).slice(0, 4);
    if (!items.length) throw new Error('no items');
    el.innerHTML = items.map(function(item) {
      var ago = timeAgo(new Date(item.pubDate));
      return '<a class="news-item" href="' + item.link + '" target="_blank" rel="noopener">' +
        '<div class="news-hed">' + item.title + '</div>' +
        '<div class="news-meta">' + ago + '</div>' +
        '</a>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="err">Could not load feed.</div>';
  }
}

function timeAgo(d) {
  const m = Math.floor((Date.now() - d) / 60000);
  if (m < 60)   return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}
function tab(key) {
  document.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.news-feed').forEach(f => f.classList.remove('active'));
  document.querySelector(`[onclick="tab('${key}')"]`).classList.add('active');
  document.getElementById(`feed-${key}`).classList.add('active');
}

  { text: "I came, I saw, I conquered.", attr: "Julius Caesar" },
  { text: "Experience is the teacher of all things.", attr: "Julius Caesar" },
  { text: "It is easier to find men who will volunteer to die than to find those who are willing to endure pain with patience.", attr: "Julius Caesar" },
  { text: "Which death is preferable to every other? The unexpected.", attr: "Julius Caesar" },
  { text: "Men in general are quick to believe that which they wish to be true.", attr: "Julius Caesar" },
  { text: "As a rule, men worry more about what they can't see than about what they can.", attr: "Julius Caesar" },
  { text: "No one is so brave that he is not disturbed by something unexpected.", attr: "Julius Caesar" },
  { text: "I love the name of honor more than I fear death.", attr: "Julius Caesar" },
  { text: "The impediment to action advances action. What stands in the way becomes the way.", attr: "Marcus Aurelius" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", attr: "Marcus Aurelius" },
  { text: "You have power over your mind, not outside events. Realize this, and you will find strength.", attr: "Marcus Aurelius" },
  { text: "The best revenge is to be unlike him who performed the injury.", attr: "Marcus Aurelius" },
  { text: "Accept the things to which fate binds you.", attr: "Marcus Aurelius" },
  { text: "The first rule is to keep an untroubled spirit. The second is to look things in the face and know them for what they are.", attr: "Marcus Aurelius" },
  { text: "If it is not right, do not do it; if it is not true, do not say it.", attr: "Marcus Aurelius" },
  { text: "He who lives in harmony with himself lives in harmony with the universe.", attr: "Marcus Aurelius" },
  { text: "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.", attr: "Marcus Aurelius" },
  { text: "The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane.", attr: "Marcus Aurelius" },
  { text: "Confine yourself to the present.", attr: "Marcus Aurelius" },
  { text: "When you wake up in the morning, tell yourself: the people I deal with today will be meddling, ungrateful, arrogant, dishonest, jealous and surly.", attr: "Marcus Aurelius" },
  { text: "Luck is what happens when preparation meets opportunity.", attr: "Seneca" },
  { text: "It is not that I am brave, it is that those who are cowardly are the bravest. They carry the heaviest load.", attr: "Seneca" },
  { text: "Revenge is not always sweet; once it is consummated we feel inferior to our victim.", attr: "Seneca" },
  { text: "Begin at once to live, and count each separate day as a separate life.", attr: "Seneca" },
  { text: "The whole future lies in uncertainty: live immediately.", attr: "Seneca" },
  { text: "We suffer more in imagination than in reality.", attr: "Seneca" },
  { text: "No person has the power to have everything they want, but it is in their power not to want what they don't have.", attr: "Seneca" },
  { text: "It is not the man who has too little, but the man who craves more, that is poor.", attr: "Seneca" },
  { text: "He who is brave is free.", attr: "Seneca" },
  { text: "Every new beginning comes from some other beginning's end.", attr: "Seneca" },
  { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", attr: "Aristotle" },
  { text: "The more you know, the more you know you don't know.", attr: "Aristotle" },
  { text: "Happiness depends upon ourselves.", attr: "Aristotle" },
  { text: "It is during our darkest moments that we must focus to see the light.", attr: "Aristotle" },
  { text: "Knowing yourself is the beginning of all wisdom.", attr: "Aristotle" },
  { text: "The roots of education are bitter, but the fruit is sweet.", attr: "Aristotle" },
  { text: "Quality is not an act; it is a habit.", attr: "Aristotle" },
  { text: "Hope is a waking dream.", attr: "Aristotle" },
  { text: "Those who know, do. Those that understand, teach.", attr: "Aristotle" },
  { text: "The aim of the wise is not to secure pleasure, but to avoid pain.", attr: "Aristotle" },
  { text: "Patience is bitter, but its fruit is sweet.", attr: "Aristotle" },
  { text: "Man is by nature a social animal.", attr: "Aristotle" },
  { text: "Opinion is the medium between knowledge and ignorance.", attr: "Plato" },
  { text: "The measure of a man is what he does with power.", attr: "Plato" },
  { text: "Courage is knowing what not to fear.", attr: "Plato" },
  { text: "Excellence is not a gift, but a skill that takes practice.", attr: "Plato" },
  { text: "At the touch of love, everyone becomes a poet.", attr: "Plato" },
  { text: "The beginning is the most important part of the work.", attr: "Plato" },
  { text: "Good people do not need laws to tell them to act responsibly, while bad people will find a way around the laws.", attr: "Plato" },
  { text: "Be kind, for everyone you meet is fighting a hard battle.", attr: "Plato" },
  { text: "Only the dead have seen the end of war.", attr: "Plato" },
  { text: "The only true wisdom is in knowing you know nothing.", attr: "Socrates" },
  { text: "An unexamined life is not worth living.", attr: "Socrates" },
  { text: "To find yourself, think for yourself.", attr: "Socrates" },
  { text: "Education is the kindling of a flame, not the filling of a vessel.", attr: "Socrates" },
  { text: "The secret of happiness is not found in seeking more, but in developing the capacity to enjoy less.", attr: "Socrates" },
  { text: "Strong minds discuss ideas, average minds discuss events, weak minds discuss people.", attr: "Socrates" },
  { text: "He who is not contented with what he has, would not be contented with what he would like to have.", attr: "Socrates" },
  { text: "By all means marry; if you get a good wife, you will be happy. If you get a bad one, you will be a philosopher.", attr: "Socrates" },
  { text: "If you know the enemy and know yourself, you need not fear the result of a hundred battles.", attr: "Sun Tzu" },
  { text: "Appear weak when you are strong, and strong when you are weak.", attr: "Sun Tzu" },
  { text: "The supreme art of war is to subdue the enemy without fighting.", attr: "Sun Tzu" },
  { text: "In the midst of chaos, there is also opportunity.", attr: "Sun Tzu" },
  { text: "He who knows when he can fight and when he cannot will be victorious.", attr: "Sun Tzu" },
  { text: "All warfare is based on deception.", attr: "Sun Tzu" },
  { text: "Let your plans be dark and impenetrable as night, and when you move, fall like a thunderbolt.", attr: "Sun Tzu" },
  { text: "The greatest victory is that which requires no battle.", attr: "Sun Tzu" },
  { text: "Move swift as the wind and closely-formed as the wood. Attack like the fire and be still as the mountain.", attr: "Sun Tzu" },
  { text: "Opportunities multiply as they are seized.", attr: "Sun Tzu" },
  { text: "The man who moves a mountain begins by carrying away small stones.", attr: "Confucius" },
  { text: "A man who has committed a mistake and doesn't correct it is committing another mistake.", attr: "Confucius" },
  { text: "It does not matter how slowly you go as long as you do not stop.", attr: "Confucius" },
  { text: "Real knowledge is to know the extent of one's ignorance.", attr: "Confucius" },
  { text: "Choose a job you love, and you will never have to work a day in your life.", attr: "Confucius" },
  { text: "Before you embark on a journey of revenge, dig two graves.", attr: "Confucius" },
  { text: "Our greatest glory is not in never falling, but in rising every time we fall.", attr: "Confucius" },
  { text: "He who learns but does not think is lost. He who thinks but does not learn is in great danger.", attr: "Confucius" },
  { text: "When it is obvious that the goals cannot be reached, don't adjust the goals, adjust the action steps.", attr: "Confucius" },
  { text: "Silence is a true friend who never betrays.", attr: "Confucius" },
  { text: "The superior man is modest in his speech, but exceeds in his actions.", attr: "Confucius" },
  { text: "Give me six hours to chop down a tree and I will spend the first four sharpening the axe.", attr: "Abraham Lincoln" },
  { text: "Whatever you are, be a good one.", attr: "Abraham Lincoln" },
  { text: "I am not bound to win, but I am bound to be true.", attr: "Abraham Lincoln" },
  { text: "No man has a good enough memory to be a successful liar.", attr: "Abraham Lincoln" },
  { text: "Better to remain silent and be thought a fool than to speak out and remove all doubt.", attr: "Abraham Lincoln" },
  { text: "You can fool all the people some of the time, and some of the people all the time, but you cannot fool all the people all the time.", attr: "Abraham Lincoln" },
  { text: "When I do good, I feel good. When I do bad, I feel bad. That is my religion.", attr: "Abraham Lincoln" },
  { text: "My concern is not whether God is on our side; my greatest concern is to be on God's side.", attr: "Abraham Lincoln" },
  { text: "I will prepare and some day my chance will come.", attr: "Abraham Lincoln" },
  { text: "Things may come to those who wait, but only things left by those who hustle.", attr: "Abraham Lincoln" },
  { text: "An investment in knowledge pays the best interest.", attr: "Benjamin Franklin" },
  { text: "Tell me and I forget. Teach me and I remember. Involve me and I learn.", attr: "Benjamin Franklin" },
  { text: "Well done is better than well said.", attr: "Benjamin Franklin" },
  { text: "By failing to prepare, you are preparing to fail.", attr: "Benjamin Franklin" },
  { text: "Energy and persistence conquer all things.", attr: "Benjamin Franklin" },
  { text: "Three may keep a secret if two of them are dead.", attr: "Benjamin Franklin" },
  { text: "Either write something worth reading or do something worth writing.", attr: "Benjamin Franklin" },
  { text: "In this world nothing can be said to be certain, except death and taxes.", attr: "Benjamin Franklin" },
  { text: "He that can have patience can have what he will.", attr: "Benjamin Franklin" },
  { text: "Lost time is never found again.", attr: "Benjamin Franklin" },
  { text: "Diligence is the mother of good luck.", attr: "Benjamin Franklin" },
  { text: "Without continual growth and progress, such words as improvement, achievement, and success have no meaning.", attr: "Benjamin Franklin" },
  { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", attr: "Winston Churchill" },
  { text: "To improve is to change; to be perfect is to have changed often.", attr: "Winston Churchill" },
  { text: "Courage is what it takes to stand up and speak; courage is also what it takes to sit down and listen.", attr: "Winston Churchill" },
  { text: "We make a living by what we get, but we make a life by what we give.", attr: "Winston Churchill" },
  { text: "A pessimist sees the difficulty in every opportunity; an optimist sees the opportunity in every difficulty.", attr: "Winston Churchill" },
  { text: "Success consists of going from failure to failure without loss of enthusiasm.", attr: "Winston Churchill" },
  { text: "The price of greatness is responsibility.", attr: "Winston Churchill" },
  { text: "You will never reach your destination if you stop and throw stones at every dog that barks.", attr: "Winston Churchill" },
  { text: "If you're going through hell, keep going.", attr: "Winston Churchill" },
  { text: "My tastes are simple: I am easily satisfied with the best.", attr: "Winston Churchill" },
  { text: "Tact is the ability to tell someone to go to hell in such a way that they look forward to the trip.", attr: "Winston Churchill" },
  { text: "History will be kind to me for I intend to write it.", attr: "Winston Churchill" },
  { text: "He who has a why to live can bear almost any how.", attr: "Friedrich Nietzsche" },
  { text: "That which does not kill us makes us stronger.", attr: "Friedrich Nietzsche" },
  { text: "Without music, life would be a mistake.", attr: "Friedrich Nietzsche" },
  { text: "It is not a lack of love, but a lack of friendship that makes unhappy marriages.", attr: "Friedrich Nietzsche" },
  { text: "In individuals, insanity is rare; but in groups, parties, nations and epochs, it is the rule.", attr: "Friedrich Nietzsche" },
  { text: "The higher we soar, the smaller we appear to those who cannot fly.", attr: "Friedrich Nietzsche" },
  { text: "One must still have chaos in oneself to be able to give birth to a dancing star.", attr: "Friedrich Nietzsche" },
  { text: "The secret for harvesting from existence the greatest fruitfulness and the greatest enjoyment is to live dangerously.", attr: "Friedrich Nietzsche" },
  { text: "There are no facts, only interpretations.", attr: "Friedrich Nietzsche" },
  { text: "All truly great thoughts are conceived while walking.", attr: "Friedrich Nietzsche" },
  { text: "Whatever you can do or dream you can, begin it. Boldness has genius, power and magic in it.", attr: "Johann Wolfgang von Goethe" },
  { text: "Knowing is not enough; we must apply. Willing is not enough; we must do.", attr: "Johann Wolfgang von Goethe" },
  { text: "As soon as you trust yourself, you will know how to live.", attr: "Johann Wolfgang von Goethe" },
  { text: "One ought, every day at least, to hear a little song, read a good poem, see a fine picture, and, if it were possible, to speak a few reasonable words.", attr: "Johann Wolfgang von Goethe" },
  { text: "Difficulties increase the nearer we approach the goal.", attr: "Johann Wolfgang von Goethe" },
  { text: "A man sees in the world what he carries in his heart.", attr: "Johann Wolfgang von Goethe" },
  { text: "Magic is believing in yourself. If you can do that, you can make anything happen.", attr: "Johann Wolfgang von Goethe" },
  { text: "The greatest thing in this world is not so much where we stand as in what direction we are moving.", attr: "Johann Wolfgang von Goethe" },
  { text: "None are more hopelessly enslaved than those who falsely believe they are free.", attr: "Johann Wolfgang von Goethe" },
  { text: "Treat people as if they were what they ought to be and you help them become what they are capable of being.", attr: "Johann Wolfgang von Goethe" },
  { text: "Common sense is not so common.", attr: "Voltaire" },
  { text: "Judge a man by his questions rather than his answers.", attr: "Voltaire" },
  { text: "The more I read, the more I acquire, the more certain I am that I know nothing.", attr: "Voltaire" },
  { text: "It is forbidden to kill; therefore all murderers are punished unless they kill in large numbers and to the sound of trumpets.", attr: "Voltaire" },
  { text: "To learn who rules over you, simply find out who you are not allowed to criticize.", attr: "Voltaire" },
  { text: "God is a comedian playing to an audience too afraid to laugh.", attr: "Voltaire" },
  { text: "Every man is guilty of all the good he did not do.", attr: "Voltaire" },
  { text: "It is not enough to conquer; one must know how to seduce.", attr: "Voltaire" },
  { text: "Think for yourself and let others enjoy the privilege of doing so too.", attr: "Voltaire" },
  { text: "The ends justify the means.", attr: "Niccolò Machiavelli" },
  { text: "It is better to be feared than loved, if you cannot be both.", attr: "Niccolò Machiavelli" },
  { text: "Never was anything great achieved without danger.", attr: "Niccolò Machiavelli" },
  { text: "Where the willingness is great, the difficulties cannot be great.", attr: "Niccolò Machiavelli" },
  { text: "The promise given was a necessity of the past: the word broken is a necessity of the present.", attr: "Niccolò Machiavelli" },
  { text: "Men are driven by two principal impulses, either by love or by fear.", attr: "Niccolò Machiavelli" },
  { text: "It is better to act and repent than not to act and regret.", attr: "Niccolò Machiavelli" },
  { text: "The lion cannot protect himself from traps, and the fox cannot defend himself from wolves. One must be both a fox and a lion.", attr: "Niccolò Machiavelli" },
  { text: "It is not the strongest of the species that survives, but the one most responsive to change.", attr: "Charles Darwin" },
  { text: "A man who dares to waste one hour of time has not discovered the value of life.", attr: "Charles Darwin" },
  { text: "I am not apt to follow blindly the lead of other men.", attr: "Charles Darwin" },
  { text: "The highest possible stage in moral culture is when we recognise that we ought to control our thoughts.", attr: "Charles Darwin" },
  { text: "If I have seen further it is by standing on the shoulders of giants.", attr: "Isaac Newton" },
  { text: "What we know is a drop, what we don't know is an ocean.", attr: "Isaac Newton" },
  { text: "Tact is the knack of making a point without making an enemy.", attr: "Isaac Newton" },
  { text: "To every action there is always opposed an equal reaction.", attr: "Isaac Newton" },
  { text: "Learning never exhausts the mind.", attr: "Leonardo da Vinci" },
  { text: "Simplicity is the ultimate sophistication.", attr: "Leonardo da Vinci" },
  { text: "It had long since come to my attention that people of accomplishment rarely sat back and let things happen to them.", attr: "Leonardo da Vinci" },
  { text: "The noblest pleasure is the joy of understanding.", attr: "Leonardo da Vinci" },
  { text: "Nothing strengthens authority so much as silence.", attr: "Leonardo da Vinci" },
  { text: "I have been impressed with the urgency of doing. Knowing is not enough; we must apply.", attr: "Leonardo da Vinci" },
  { text: "The greatest deception men suffer is from their own opinions.", attr: "Leonardo da Vinci" },
  { text: "Where the spirit does not work with the hand, there is no art.", attr: "Leonardo da Vinci" },
  { text: "As a well-spent day brings happy sleep, so a life well spent brings happy death.", attr: "Leonardo da Vinci" },
  { text: "Study without desire spoils the memory, and it retains nothing that it takes in.", attr: "Leonardo da Vinci" },
  { text: "The greater danger for most of us lies not in setting our aim too high and falling short, but in setting our aim too low and achieving our mark.", attr: "Michelangelo" },
  { text: "Lord, grant that I may always desire more than I can accomplish.", attr: "Michelangelo" },
  { text: "The marble not yet carved can hold the form of every thought the greatest artist has.", attr: "Michelangelo" },
  { text: "If people knew how hard I worked to get my mastery, it wouldn't seem so wonderful at all.", attr: "Michelangelo" },
  { text: "A man paints with his brains and not with his hands.", attr: "Michelangelo" },
  { text: "I saw the angel in the marble and carved until I set him free.", attr: "Michelangelo" },
  { text: "The greatest thing in the world is to know how to belong to oneself.", attr: "Michel de Montaigne" },
  { text: "On the highest throne in the world, we still sit only on our own bottom.", attr: "Michel de Montaigne" },
  { text: "Every man carries the full form of the human condition within him.", attr: "Michel de Montaigne" },
  { text: "The most certain sign of wisdom is cheerfulness.", attr: "Michel de Montaigne" },
  { text: "Nothing is so firmly believed as that which we least know.", attr: "Michel de Montaigne" },
  { text: "Knowledge is power.", attr: "Francis Bacon" },
  { text: "A wise man will make more opportunities than he finds.", attr: "Francis Bacon" },
  { text: "Read not to contradict and confute, nor to believe and take for granted, but to weigh and consider.", attr: "Francis Bacon" },
  { text: "The remedy is worse than the disease.", attr: "Francis Bacon" },
  { text: "Wonder is the seed of knowledge.", attr: "Francis Bacon" },
  { text: "In order for the light to shine so brightly, the darkness must be present.", attr: "Francis Bacon" },
  { text: "Prosperity is not without many fears and distastes; and adversity is not without comforts and hopes.", attr: "Francis Bacon" },
  { text: "I think, therefore I am.", attr: "René Descartes" },
  { text: "The reading of all good books is like a conversation with the finest men of past centuries.", attr: "René Descartes" },
  { text: "Divide each difficulty into as many parts as is feasible and necessary to resolve it.", attr: "René Descartes" },
  { text: "It is not enough to have a good mind. The main thing is to use it well.", attr: "René Descartes" },
  { text: "Everyone thinks of changing the world, but no one thinks of changing himself.", attr: "Leo Tolstoy" },
  { text: "All great literature is one of two stories; a man goes on a journey or a stranger comes to town.", attr: "Leo Tolstoy" },
  { text: "The two most powerful warriors are patience and time.", attr: "Leo Tolstoy" },
  { text: "Happy families are all alike; every unhappy family is unhappy in its own way.", attr: "Leo Tolstoy" },
  { text: "If you want to be happy, be.", attr: "Leo Tolstoy" },
  { text: "The sole meaning of life is to serve humanity.", attr: "Leo Tolstoy" },
  { text: "War is so unjust and ugly that all who wage it must try to stifle the voice of conscience within themselves.", attr: "Leo Tolstoy" },
  { text: "The soul is healed by being with children.", attr: "Fyodor Dostoyevsky" },
  { text: "Pain and suffering are always inevitable for a large intelligence and a deep heart.", attr: "Fyodor Dostoyevsky" },
  { text: "To love someone means to see them as God intended them.", attr: "Fyodor Dostoyevsky" },
  { text: "The man who lies to himself and listens to his own lie comes to a point that he cannot distinguish the truth within him.", attr: "Fyodor Dostoyevsky" },
  { text: "Beauty will save the world.", attr: "Fyodor Dostoyevsky" },
  { text: "It takes something more than intelligence to act intelligently.", attr: "Fyodor Dostoyevsky" },
  { text: "The secret of getting ahead is getting started.", attr: "Mark Twain" },
  { text: "It ain't what you don't know that gets you into trouble. It's what you know for sure that just ain't so.", attr: "Mark Twain" },
  { text: "Courage is resistance to fear, mastery of fear — not absence of fear.", attr: "Mark Twain" },
  { text: "If you tell the truth, you don't have to remember anything.", attr: "Mark Twain" },
  { text: "The man who does not read has no advantage over the man who cannot read.", attr: "Mark Twain" },
  { text: "Whenever you find yourself on the side of the majority, it is time to pause and reflect.", attr: "Mark Twain" },
  { text: "The two most important days in your life are the day you are born and the day you find out why.", attr: "Mark Twain" },
  { text: "Continuous improvement is better than delayed perfection.", attr: "Mark Twain" },
  { text: "In the beginning of a change the patriot is a scarce man, and brave, and hated and scorned. When his cause succeeds, the timid join him, for then it costs nothing to be a patriot.", attr: "Mark Twain" },
  { text: "Go confidently in the direction of your dreams. Live the life you have imagined.", attr: "Henry David Thoreau" },
  { text: "Not until we are lost do we begin to understand ourselves.", attr: "Henry David Thoreau" },
  { text: "It is not enough to be busy. So are the ants. The question is: what are we busy about?", attr: "Henry David Thoreau" },
  { text: "If you have built castles in the air, your work need not be lost; that is where they should be. Now put the foundations under them.", attr: "Henry David Thoreau" },
  { text: "Our life is frittered away by detail. Simplify, simplify.", attr: "Henry David Thoreau" },
  { text: "I went to the woods because I wished to live deliberately.", attr: "Henry David Thoreau" },
  { text: "All of humanity's problems stem from man's inability to sit quietly in a room alone.", attr: "Blaise Pascal" },
  { text: "The heart has its reasons which reason knows not.", attr: "Blaise Pascal" },
  { text: "Kind words do not cost much. Yet they accomplish much.", attr: "Blaise Pascal" },
  { text: "In faith there is enough light for those who want to believe and enough shadows to blind those who don't.", attr: "Blaise Pascal" },
  { text: "We are generally the better persuaded by the reasons we discover ourselves than by those given to us by others.", attr: "Blaise Pascal" },
  { text: "Talent hits a target no one else can hit. Genius hits a target no one else can see.", attr: "Arthur Schopenhauer" },
  { text: "The more unintelligent a man is, the less mysterious existence seems to him.", attr: "Arthur Schopenhauer" },
  { text: "We forfeit three-fourths of ourselves in order to be like other people.", attr: "Arthur Schopenhauer" },
  { text: "Compassion is the basis of morality.", attr: "Arthur Schopenhauer" },
  { text: "A man can do what he wants, but not want what he wants.", attr: "Arthur Schopenhauer" },
  { text: "Nothing great in the world was accomplished without passion.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "We learn from history that we do not learn from history.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "The truth is the whole.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "Only one man ever understood me, and he didn't understand me.", attr: "Georg Wilhelm Friedrich Hegel" },
  { text: "Act only according to that maxim whereby you can at the same time will that it should become a universal law.", attr: "Immanuel Kant" },
  { text: "We are not rich by what we possess but by what we can do without.", attr: "Immanuel Kant" },
  { text: "Science is organized knowledge. Wisdom is organized life.", attr: "Immanuel Kant" },
  { text: "Morality is not the doctrine of how we may make ourselves happy, but how we may make ourselves worthy of happiness.", attr: "Immanuel Kant" },
  { text: "Two things awe me most: the starry sky above me and the moral law within me.", attr: "Immanuel Kant" },
  { text: "Politics is the art of the possible, the attainable — the art of the next best.", attr: "Otto von Bismarck" },
  { text: "Laws are like sausages — it is best not to see them being made.", attr: "Otto von Bismarck" },
  { text: "The secret of politics? Make a good treaty with Russia.", attr: "Otto von Bismarck" },
  { text: "A statesman must wait until he hears the steps of God sounding through events, then leap up and grasp the hem of His garment.", attr: "Otto von Bismarck" },
  { text: "The whole art of war consists in getting at what is on the other side of the hill.", attr: "Duke of Wellington" },
  { text: "Educate men without religion and you make them but clever devils.", attr: "Duke of Wellington" },
  { text: "There is no such thing as a little country. The greatness of a people is no more determined by their number than the greatness of a man is determined by his height.", attr: "Duke of Wellington" },
  { text: "I am not an adventurer by choice but by fate.", attr: "Vincent van Gogh" },
  { text: "Great things are done by a series of small things brought together.", attr: "Vincent van Gogh" },
  { text: "What would life be if we had no courage to attempt anything?", attr: "Vincent van Gogh" },
  { text: "I feel that there is nothing more truly artistic than to love people.", attr: "Vincent van Gogh" },
  { text: "Normality is a paved road: it is comfortable to walk, but no flowers grow.", attr: "Vincent van Gogh" },
  { text: "The fishermen know that the sea is dangerous and the storm terrible, but they have never found these dangers sufficient reason for remaining ashore.", attr: "Vincent van Gogh" },
  { text: "Don't tell me the moon is shining; show me the glint of light on broken glass.", attr: "Anton Chekhov" },
  { text: "Any idiot can face a crisis — it's this day-to-day living that wears you out.", attr: "Anton Chekhov" },
  { text: "Knowledge is of no value unless you put it into practice.", attr: "Anton Chekhov" },
  { text: "We shall find peace. We shall hear angels. We shall see the sky sparkling with diamonds.", attr: "Anton Chekhov" },
  { text: "A thousand words leave not the same deep impression as does a single deed.", attr: "Henrik Ibsen" },
  { text: "The strongest man in the world is he who stands most alone.", attr: "Henrik Ibsen" },
  { text: "Never wear your best trousers when you go out to fight for freedom and truth.", attr: "Henrik Ibsen" },

function loadQuote() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var diff = now - start;
  var oneDay = 1000 * 60 * 60 * 24;
  var dayOfYear = Math.floor(diff / oneDay); // 1-365, unique per day
  var idx = (dayOfYear - 1) % QUOTES.length;
  var q = QUOTES[idx];
  document.getElementById('quote-text').textContent = '"' + q.text + '"';
  document.getElementById('quote-attr').textContent = '— ' + q.attr;
}




const BUILDINGS = [
  {n:"Bagsværd Church",c:"Bagsværd",co:"Denmark",y:1976,ar:"Jørn Utzon",w:"Bagsværd Church sits quietly in a Copenhagen suburb, its corrugated concrete exterior giving almost no indication of what lies within. The interior is dominated by a continuous shell-like ceiling that billows and folds like clouds, flooding the nave with diffuse northern light. Utzon described the design as a collision between the universal — the cloud ceiling derived from ancient Chinese pavilion forms — and the local modest Danish parish. The building took nearly ten years to complete and became Utzon's most personal work after his departure from the Sydney Opera House. It is one of the most spatially surprising rooms in twentieth century architecture, and among the least visited.",d:"The undulating ceiling is formed from prefabricated concrete shell segments that overlap and interlock, each piece slightly different, creating an effect of movement despite being entirely static.",lat:55.7576,lng:12.4578,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Bagsvaard_Kirke_Interior.jpg/800px-Bagsvaard_Kirke_Interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Bagsvaard_Kirke_Exterior.JPG/800px-Bagsvaard_Kirke_Exterior.JPG","https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Birkeh%C3%B8j_church_interior.jpg/800px-Birkeh%C3%B8j_church_interior.jpg"]},
  {n:"Salk Institute",c:"La Jolla",co:"USA",y:1965,ar:"Louis Kahn",w:"The Salk Institute compresses a meditation on science and nature into two mirror-image laboratory buildings flanking a central travertine courtyard. The courtyard is bisected by a single channel of water aimed precisely at the Pacific horizon, achieving a spatial clarity that most architecture only approximates. Kahn's use of teak, concrete, and travertine ages beautifully and with purpose, each material chosen for its response to the California light. Jonas Salk gave Kahn extraordinary creative latitude, asking only that the building be worthy of a visit from Picasso. The result is arguably the finest research building ever constructed.",d:"A narrow water channel bisects the travertine courtyard aimed precisely at the Pacific so that at the equinoxes the setting sun aligns with it perfectly, the horizon bisecting the space in a single line of fire.",lat:32.873,lng:-117.2365,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Salk_Institute_4.jpg/800px-Salk_Institute_4.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Salk_Institute_courtyard.jpg/800px-Salk_Institute_courtyard.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Salk-Institute.jpg/800px-Salk-Institute.jpg"]},
  {n:"Kimbell Art Museum",c:"Fort Worth",co:"USA",y:1972,ar:"Louis Kahn",w:"The Kimbell Art Museum is among the most resolved art museums ever built, a building in which every structural and material decision serves the experience of looking at art. Kahn used cycloid concrete vaults to create galleries with natural light entering along a silver reflector that bounces diffuse illumination across the curved ceilings. The interiors are simultaneously monumental and intimate, the travertine floors and white oak furniture giving warmth to what could easily have been a cold exercise in geometry. The building was completed the same year as the nearby Amon Carter Museum but surpassed it in every measure of architectural quality. No changes have ever felt necessary, which is perhaps the highest compliment a museum can receive.",d:"A narrow slot in each vault admits daylight onto a polished aluminum reflector, distributing it as a soft silver wash across the concrete ceiling rather than creating harsh pools of direct sunlight that would damage works on paper.",lat:32.7497,lng:-97.3659,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Kimbell_Art_Museum_Louis_Kahn.jpg/800px-Kimbell_Art_Museum_Louis_Kahn.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Kimbell_Art_Museum_interior.jpg/800px-Kimbell_Art_Museum_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Kimbell_Art_Museum_portico.jpg/800px-Kimbell_Art_Museum_portico.jpg"]},
  {n:"Brion Cemetery",c:"San Vito d'Altivole",co:"Italy",y:1978,ar:"Carlo Scarpa",w:"Carlo Scarpa spent the final decade of his life designing this family cemetery in the Veneto, and the depth of attention is visible in every joint, corner, and threshold. Water, concrete, mosaic, and grass are woven into a landscape of quiet grief that unfolds across a triangular perimeter site. The arcosolium — the great arched tomb of the Brion family — is approached through a sequence of carefully framed views that defer arrival through a series of thresholds. Scarpa himself died before the cemetery was complete and was buried there at the family's invitation, making it also his own resting place. It is one of the rare cases in architecture where the program and the architect's biography have fused into a single inseparable meaning.",d:"A pair of interlocking circles, Scarpa's recurring motif, appears in railings, walls, and the great arched tomb throughout the site, encoding the union of living and dead in a form derived from traditional Japanese family crests.",lat:45.8028,lng:12.0193,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Brion_cemetery_scarpa.jpg/800px-Brion_cemetery_scarpa.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Brion_tomb.jpg/800px-Brion_tomb.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Carlo_scarpa_brion.jpg/800px-Carlo_scarpa_brion.jpg"]},
  {n:"Therme Vals",c:"Vals",co:"Switzerland",y:1996,ar:"Peter Zumthor",w:"Zumthor's thermal bath is cut into a Swiss alpine hillside, its grass roof reading as landscape from above so the building appears not to have been added to the site at all. Inside, a series of pools and chambers are carved from locally quarried Valser quartzite, a grey-green stone with horizontal striations that read like geological strata. The experience is deliberately slow and sensory — there is no spectacle, only the accumulation of material and light over time. Zumthor designed all fittings, lighting, and even the towels, creating a total environment of unusual coherence. It is one of the few contemporary buildings that succeeds in making bathing a genuinely architectural experience.",d:"Each layer of quartzite in the walls is separated by a thin shadow gap rather than a mortar joint, so the stone surfaces appear to float rather than stack, dissolving the apparent mass of 60,000 tons into something weightless.",lat:46.6222,lng:9.177,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Therme_Vals_pool.jpg/800px-Therme_Vals_pool.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vals_thermal_baths_exterior.jpg/800px-Vals_thermal_baths_exterior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Therme_vals_stone.jpg/800px-Therme_vals_stone.jpg"]},
  {n:"Jewish Museum Berlin",c:"Berlin",co:"Germany",y:2001,ar:"Daniel Libeskind",w:"Libeskind's Jewish Museum is among the most emotionally exact buildings of its generation, its form derived from a fractured Star of David traced in the plan of a Berlin neighborhood. The zinc-clad exterior is slashed with diagonal windows that admit light at angles unrelated to the rooms inside, creating a persistent disorientation that is the building's core argument. Voids — concrete shafts cutting vertically through the entire museum — represent the absence of Berlin's Jewish population and cannot be entered, only glimpsed through small windows. The museum was opened empty for two years with no exhibits, and hundreds of thousands visited finding the building itself sufficient. It remains the most visited Jewish museum in the world.",d:"The voids are concrete shafts cutting through every floor; they cannot be occupied, only glimpsed, and their darkness is total even in full daylight — presence expressed through absolute absence.",lat:52.5029,lng:13.3945,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Jewish_Museum_Berlin_exterior.jpg/800px-Jewish_Museum_Berlin_exterior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/JMB_void.jpg/800px-JMB_void.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Jewish_Museum_Berlin_interior.jpg/800px-Jewish_Museum_Berlin_interior.jpg"]},
  {n:"Chapel of Notre Dame du Haut",c:"Ronchamp",co:"France",y:1955,ar:"Le Corbusier",w:"Ronchamp is the most puzzling building of the twentieth century, made by an architect who had spent thirty years arguing for rational clarity. The thick concrete walls splay inward and outward at seemingly arbitrary angles, the roof lifts off the walls on hidden supports, and the south facade is punctuated by colored glass windows of varying sizes set into the deep wall like jewels. Le Corbusier said he wanted to create a vessel of silence, a building that could hold the ineffable rather than express the logical. The building has been the subject of more sustained critical analysis than almost any other work of the century, and still resists explanation. It is simultaneously one of the greatest and most controversial buildings in the world.",d:"The roof appears to float above the south wall because a narrow band of light separates them — the massive concrete shell sits on hidden supports rather than resting on the wall, making the heaviest element appear weightless.",lat:47.703,lng:6.8217,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Ronchamp.jpg/800px-Ronchamp.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Notre-Dame_du_Haut_de_Ronchamp_interior.jpg/800px-Notre-Dame_du_Haut_de_Ronchamp_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Ronchamp_south_facade.jpg/800px-Ronchamp_south_facade.jpg"]},
  {n:"Paimio Sanatorium",c:"Paimio",co:"Finland",y:1933,ar:"Alvar Aalto",w:"Aalto designed Paimio with the specific ergonomics of tuberculosis recovery in mind — the orientation of rooms, the position of windows, and the design of furniture all respond to the physiological needs of patients confined to bed. The famous Paimio chair curves to allow maximum chest expansion, one of the first purpose-designed therapeutic furniture pieces. The building is organized so that every ward room faces south with a balcony for outdoor rest cures, with service functions banished to a separate wing to protect patient areas from noise and traffic. It was completed when Aalto was only 32 and established him as the leading figure in Nordic Modernism. The building has been operating continuously as a hospital for nearly a century.",d:"The washbasin Aalto designed for patient rooms has no flat surface — water runs silently down a curved slope into the drain so that patients sleeping nearby are never disturbed by dripping or splashing during the night.",lat:60.4553,lng:22.6903,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Paimio_sanatorium.jpg/800px-Paimio_sanatorium.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Paimio_interior.jpg/800px-Paimio_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Paimio_Sanatorium_Aalto.jpg/800px-Paimio_Sanatorium_Aalto.jpg"]},
  {n:"National Museum of Roman Art",c:"Mérida",co:"Spain",y:1986,ar:"Rafael Moneo",w:"Moneo constructed a new Roman museum directly above the ruins of Emerita Augusta, threading the archaeology through the building rather than burying it beneath a slab. The nave is modelled on a Roman basilica, with thin brick arches carrying natural light from high clerestory windows down to the ruins visible through glass floors below. The building is serious about its program in a way that contemporary museums rarely are — it does not compete with the artifacts but serves them with architectural intelligence. The brick arches are built from Roman-format brick with raked joints deliberately close to the Roman originals two millennia below. It was the building that established Moneo's international reputation and led directly to the Pritzker Prize.",d:"The arches are built from thin Roman-format brick with raked joints deliberately close to the Roman originals visible through the glass floors below, collapsing the distance between 2000 AD and 100 AD into a single material continuity.",lat:38.917,lng:-6.3411,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Museo_Nacional_de_Arte_Romano.jpg/800px-Museo_Nacional_de_Arte_Romano.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/MNAR_interior.jpg/800px-MNAR_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Mnar_merida_arches.jpg/800px-Mnar_merida_arches.jpg"]},
  {n:"Sendai Mediatheque",c:"Sendai",co:"Japan",y:2001,ar:"Toyo Ito",w:"Ito's mediatheque is a transparent glass building whose structure is not a conventional column-and-beam grid but a forest of thirteen irregular steel tubes of varying diameter and curvature. The tubes carry vertical circulation, mechanical services, and structural loads, leaving the floor plates entirely open and free of any intermediate support. At night the building glows from within, its structural system fully visible to the street as a constantly shifting pattern of shadows and reflections. The building was seriously damaged in the 2011 Tōhoku earthquake and was temporarily converted into a disaster relief centre, demonstrating the social value of its open interior. It is one of the most genuinely original structural and spatial inventions of the twenty-first century.",d:"The 13 structural tubes each have a different diameter and twist angle derived from analysis of seaweed moving in current, so the building's structure is simultaneously precise engineering and organic form.",lat:38.2609,lng:140.8693,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Sendai_Mediatheque.jpg/800px-Sendai_Mediatheque.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Sendai_Mediatheque_interior.jpg/800px-Sendai_Mediatheque_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Sendai_mediatheque_night.jpg/800px-Sendai_mediatheque_night.jpg"]},
  {n:"Yokohama International Port Terminal",c:"Yokohama",co:"Japan",y:2002,ar:"Foreign Office Architects",w:"The Yokohama terminal folds the ground plane of the city into a pier that is simultaneously public park, circulation landscape, and cruise terminal, blurring the boundary between building and infrastructure. There are no conventional columns — the structure is a folded steel plate system that distributes loads through a continuous surface rather than discrete members. The movement of ships and passengers is choreographed through the sectional complexity of the building, with arrivals and departures separated vertically and horizontally without signage. The timber deck surface extends from the quay into the terminal and back out to the park, treating the entire building as a single continuous ground. It was the winning entry in an international competition won by a practice that had never built a building.",d:"The floor, walls, and roof are a continuous surface of folded steel and timber decking — there is no structural hierarchy, only topology, and the building can be read as landscape as easily as architecture.",lat:35.4437,lng:139.6381,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Yokohama_osanbashi_pier.jpg/800px-Yokohama_osanbashi_pier.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Osanbashi_pier_interior.jpg/800px-Osanbashi_pier_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Osanbashi_pier_roof.jpg/800px-Osanbashi_pier_roof.jpg"]},
  {n:"Casa Malaparte",c:"Capri",co:"Italy",y:1942,ar:"Adalberto Libera",w:"Perched on a rocky promontory 32 meters above the Tyrrhenian Sea, Casa Malaparte is as much landscape intervention as building, its horizontal form reading as a continuation of the cliffs below it. The roof is a broad concrete terrace with a curved wind-screen wall that catches the light differently through the day and serves no function other than to modify the experience of the sea. The writer Curzio Malaparte was closely involved in the design, and there has been sustained debate about how much of the building is his rather than Libera's. Jean-Luc Godard filmed Contempt there in 1963, and the scenes of Brigitte Bardot on the roof terrace have made it as famous as any cinema set. It remains privately owned and is accessible only by boat or a long coastal path.",d:"The trapezoidal staircase on the landward facade leads directly to the roof terrace and is the building's only ornament — its precise geometry against the raw volcanic rock gives it an air of ancient ceremony despite its modernity.",lat:40.5543,lng:14.2386,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Casa_Malaparte_Capri.jpg/800px-Casa_Malaparte_Capri.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Casa_malaparte_roof.jpg/800px-Casa_malaparte_roof.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Malaparte_house_staircase.jpg/800px-Malaparte_house_staircase.jpg"]},
  {n:"Unité d'Habitation",c:"Marseille",co:"France",y:1952,ar:"Le Corbusier",w:"The Unité is an attempt to build an entire city in a single building — 337 apartments, shops, a hotel, a gymnasium, and a rooftop park with a running track, nursery, and paddling pool. The building sits on massive concrete pilotis so the ground plane flows beneath it unobstructed, and the roof is populated with sculptural concrete forms housing ventilation and stair towers. Le Corbusier developed a proportional system called the Modulor — based on the dimensions of a six-foot man — that governs every dimension from wall thickness to ceiling height. The building was deeply controversial when built, accused of being inhuman in scale, but its residents have been consistently loyal and protective for over seventy years. It gave the entire postwar movement its name: Béton Brut.",d:"The pilotis are raw concrete with the plywood formwork marks still visible, a deliberate choice Le Corbusier called béton brut — rough concrete — which gave the entire postwar architectural movement its name: Brutalism.",lat:43.26,lng:5.3968,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Unite_d_habitation_Marseille.jpg/800px-Unite_d_habitation_Marseille.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Unite_habitation_roof.jpg/800px-Unite_habitation_roof.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Corbusier_unite_pilotis.jpg/800px-Corbusier_unite_pilotis.jpg"]},
  {n:"São Paulo Museum of Art",c:"São Paulo",co:"Brazil",y:1968,ar:"Lina Bo Bardi",w:"MASP hangs its entire building between two massive concrete beams to preserve the view corridor from Avenida Paulista across the Trianon valley below, a civic gesture of extraordinary generosity in a city not known for it. The collections are displayed on glass easels rather than hung on walls, so visitors can walk around works and view them from any angle, including from the back. Lina Bo Bardi was an Italian architect who emigrated to Brazil in 1946 and spent the rest of her life there, becoming one of the country's most original architectural thinkers. The building was considered scandalous when built and is now considered the finest in São Paulo. The elevated concrete beams are painted red, making the building visible from the full length of the avenue.",d:"The paintings are displayed on transparent glass panels set in concrete bases, allowing viewers to see the back of each canvas and to look through the collection rather than along a wall — making visible the normally hidden process of how art is made.",lat:-23.5613,lng:-46.6565,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/MASP_-_Museu_de_Arte_de_S%C3%A3o_Paulo.jpg/800px-MASP_-_Museu_de_Arte_de_S%C3%A3o_Paulo.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/MASP_interior.jpg/800px-MASP_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/MASP_easels.jpg/800px-MASP_easels.jpg"]},
  {n:"Farnsworth House",c:"Plano",co:"USA",y:1951,ar:"Ludwig Mies van der Rohe",w:"The Farnsworth House is a one-room glass pavilion raised above the Fox River floodplain on eight welded steel columns, its absolute minimalism making it one of the most studied houses in history. The single space contains no walls, only a freestanding service core, and the surrounding landscape serves as the house's visual boundary. Mies developed the Farnsworth over five years and the result is as close to a pure architectural idea as any building has come — a shelter that refuses to be anything other than what it is. Its client, Edith Farnsworth, ultimately sued Mies over cost overruns and accused him of designing a building that was uninhabitable; critics have been debating who was right ever since. The house was purchased by the National Trust for Historic Preservation in 2003 and is now open to the public.",d:"The house is raised 1.5 meters above grade on two rows of welded steel H-columns, and the only elements that vary from pure geometry are the travertine floor terraces, which step down in a composed sequence to meet the landscape.",lat:41.5812,lng:-88.5023,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Farnsworth_House_by_Mies_Van_Der_Rohe.jpg/800px-Farnsworth_House_by_Mies_Van_Der_Rohe.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Farnsworth_interior.jpg/800px-Farnsworth_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Farnsworth_house_exterior.jpg/800px-Farnsworth_house_exterior.jpg"]},
  {n:"Barcelona Pavilion",c:"Barcelona",co:"Spain",y:1929,ar:"Ludwig Mies van der Rohe",w:"The Barcelona Pavilion — built for the 1929 International Exposition, demolished afterward, and reconstructed in 1986 — is a sequence of marble and glass planes that define space without enclosing it, a building with no rooms, only territories suggested by the placement of walls. The materials are extraordinary: green Tinos marble, golden onyx, grey Roman travertine, and chrome-edged glass — all used in planar sheets of identical thickness. Mies designed one piece of furniture for the building, the Barcelona Chair, which became the most widely copied piece of furniture in history. The reconstruction was undertaken with such precision that every vein in every marble panel was matched to its original photographs. It remains the most influential building of the twentieth century by almost any measure.",d:"The floor, wall, and ceiling planes are all of different materials — travertine, onyx, marble, glass — but all the same thickness, so the building reads as an assemblage of equal horizontal and vertical layers with no hierarchy.",lat:41.3703,lng:2.15,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Barcelona_Pavilion.jpg/800px-Barcelona_Pavilion.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Barcelona_Pavilion_pool.jpg/800px-Barcelona_Pavilion_pool.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Mies_barcelona_interior.jpg/800px-Mies_barcelona_interior.jpg"]},
  {n:"Seagram Building",c:"New York",co:"USA",y:1958,ar:"Ludwig Mies van der Rohe",w:"The Seagram Building is the benchmark against which all corporate towers are measured, its bronze-clad steel frame and precision of detail creating a standard that has been endlessly imitated but never equaled. Mies applied non-structural I-beams to the curtain wall to express a structural logic the building could not legally reveal — the steel frame was required by code to be encased in concrete fireproofing. The building was set back 30 meters from Park Avenue, a gesture of civic generosity that transformed the character of the street and has never been replicated. Philip Johnson designed the interior, including the Four Seasons restaurant, which became the canonical power-lunch location for fifty years. The building cost six times more per square foot than any other New York tower of its era.",d:"The I-beams on the exterior carry no load — they were added after the steel frame was enclosed in concrete fireproofing — but they express the structural logic the building actually follows, making the facade an honest diagram of something the building cannot honestly show.",lat:40.7581,lng:-73.9751,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Seagram_Building_NYC.jpg/800px-Seagram_Building_NYC.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Seagram_plaza.jpg/800px-Seagram_plaza.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Seagram_Building_detail.jpg/800px-Seagram_Building_detail.jpg"]},
  {n:"Eames House",c:"Pacific Palisades",co:"USA",y:1949,ar:"Charles and Ray Eames",w:"The Eames House is built entirely from standard industrial components — steel sections and panels drawn from manufacturers' catalogues — assembled with such care that the result is one of the most personal and specific houses of the century. Charles and Ray Eames ordered the parts in 1947 and changed the design completely the night before construction began, reorganizing the structure without changing any of the components. The house is famous not only for its architecture but for how the couple inhabited it — filling every surface with collections, toys, flowers, and found objects that made the industrial shell entirely domestic. It demonstrates that standardization and individuality are not opposites but can be the same thing when sufficient intelligence is applied. It is now managed as a museum and among the most visited private houses in California.",d:"Every structural element was selected from standard manufacturer catalogues rather than specified custom — the couple chose available components and arranged them with such precision that the result is entirely distinctive despite being entirely generic.",lat:34.0497,lng:-118.5233,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Eames_House_exterior.jpg/800px-Eames_House_exterior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Eames_house_interior.jpg/800px-Eames_house_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Case_Study_House_8_Eames.jpg/800px-Case_Study_House_8_Eames.jpg"]},
  {n:"Glass House",c:"New Canaan",co:"USA",y:1949,ar:"Philip Johnson",w:"Johnson's Glass House is a single-story transparent pavilion set in a Connecticut meadow, its four glass walls creating a continuous connection between interior and exterior that makes the landscape the room's primary decoration. It is among the most resolved expressions of modernist minimalism in residential architecture, a single space with no divisions except the brick cylinder containing the bathroom. Johnson built the house for himself and lived there for fifty years, adding a sequence of guest houses, studios, and follies across the 49-acre property that documented his evolving obsessions. The house was extensively influenced by Mies van der Rohe's Farnsworth House, a debt Johnson acknowledged while also pointing out he completed his first. Johnson donated the entire estate to the National Trust for Historic Preservation on his death.",d:"The single brick cylinder containing the bathroom sits on the central axis of the glass box and is its only opaque element — its solidity is the only interruption in an otherwise perfectly transparent building, making it simultaneously functional and sculptural.",lat:41.1454,lng:-73.4939,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Glass_House_Philip_Johnson.jpg/800px-Glass_House_Philip_Johnson.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Philip_Johnson_Glass_House_interior.jpg/800px-Philip_Johnson_Glass_House_interior.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Glass_house_new_canaan.jpg/800px-Glass_house_new_canaan.jpg"]},
  {n:"Villa Savoye",c:"Poissy",co:"France",y:1931,ar:"Le Corbusier",w:"Villa Savoye is the built manifesto of Le Corbusier's five points of architecture — pilotis, free plan, free facade, horizontal windows, and roof garden — a building designed as much to illustrate a theory as to be inhabited. The white box rises from the Normandy landscape as if it had just landed, its pilotis allowing the ground plane to pass beneath it undisturbed, the grass continuing under the floor. The original clients found it uninhabitable and spent years in legal disputes over leaks and heating failures, a conflict that says as much about architectural idealism as about any failing in the building. Le Corbusier later described it as a pure form raised to the light, and the phrase captures both the building's quality and its occasional indifference to practical comfort. It is now a UNESCO World Heritage Site and one of the most visited buildings in France.",d:"The ramp connecting the three levels is given priority over the staircase — it is wider, better lit, and more ceremonially placed — expressing that movement through the building should be continuous rather than punctuated, as in a landscape rather than a conventional house.",lat:48.9401,lng:2.0205,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Villa_Savoye_2011.jpg/800px-Villa_Savoye_2011.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Villa_Savoye_interior_ramp.jpg/800px-Villa_Savoye_interior_ramp.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Villa_Savoye_pilotis.jpg/800px-Villa_Savoye_pilotis.jpg"]},
  {n:"National Assembly of Bangladesh",c:"Dhaka",co:"Bangladesh",y:1983,ar:"Louis Kahn",w:"Kahn's last major building is a parliament that uses geometric forms — circles, squares, triangles — cut through massive walls to create a play of natural light across monumental interior spaces unlike any other civic building of its era. The complex is surrounded by a lake that makes the building appear to float on water, and the approach across it is one of the most dramatic architectural experiences in Asia. The building was commissioned in 1962 but Kahn died in 1974 before its completion, found dead in Penn Station after returning from a site visit. His office completed it faithfully to his drawings. It is considered the greatest building constructed in the second half of the twentieth century by many architectural historians.",d:"The perimeter offices are separated from the central assembly hall by an ambulatory corridor lit by geometric openings in the 7-meter-thick outer walls, creating a zone of filtered natural light between the public and private realms of the building.",lat:23.7628,lng:90.3779,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/National_Assembly_Bangladesh.jpg/800px-National_Assembly_Bangladesh.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Dhaka_assembly_building.jpg/800px-Dhaka_assembly_building.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Bangladesh_national_assembly_interior.jpg/800px-Bangladesh_national_assembly_interior.jpg"]},
  {n:"Chichu Art Museum",c:"Naoshima",co:"Japan",y:2004,ar:"Tadao Ando",w:"The Chichu Art Museum is entirely underground, its galleries cut into the limestone of Naoshima island with only geometric courtyard openings in the landscape above to indicate its presence. The permanent collection contains only five works — three large Monet water lilies paintings and pieces by James Turrell and Walter De Maria — each in a room calibrated specifically to that work. The Monet room is a pure white concrete chamber that receives only skylight, calibrated so that the light on the paintings changes through the day as Monet intended his work to be seen at Giverny. Ando has said the building argues against the idea that art requires neutral white gallery space, and that each work deserves an architecture specific to it. The museum is accessible only by reservation, limited to 200 visitors per day.",d:"All natural light enters from directly above through slots and courtyards in the buried structure, so moving from room to room involves repeated transitions between total darkness and brilliant natural light — the building enacts what it contains.",lat:34.4599,lng:133.9977,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Chichu_Art_Museum_Naoshima.jpg/800px-Chichu_Art_Museum_Naoshima.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Naoshima_chichu_courtyard.jpg/800px-Naoshima_chichu_courtyard.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Chichu_museum_ando.jpg/800px-Chichu_museum_ando.jpg"]},
  {n:"Church of the Light",c:"Ibaraki",co:"Japan",y:1989,ar:"Tadao Ando",w:"Ando's Church of the Light is a minimal concrete box whose interior space is defined almost entirely by a cross cut into the east wall behind the altar, through which unfiltered daylight enters and falls across the floor and the seated congregation. The building was constructed for a very modest budget — the floor was originally packed earth — and the severity of the interior, which has no heating, was considered extreme even by Japanese standards. The congregation agreed to endure it because of the power of the light, and the building has been used continuously since completion. Ando has described it as an attempt to abstract the sacred — to remove everything until only the essential meaning remains. It is now one of the most visited contemporary buildings in Japan despite containing nothing but light and shadow.",d:"The cross is not merely decorative — it is a structural absence, a void cut entirely through the concrete wall that admits light with the precision of a surgical incision, making the spiritual symbol simultaneously a material and spatial event.",lat:34.8135,lng:135.5726,imgs:["https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Church_of_the_Light_Ando.jpg/800px-Church_of_the_Light_Ando.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Church_light_interior_ando.jpg/800px-Church_light_interior_ando.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Ibaraki_church_cross.jpg/800px-Ibaraki_church_cross.jpg"]},
